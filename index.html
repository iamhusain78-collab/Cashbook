<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#c2811b">
<title>Cashbook</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23c2811b'/%3E%3Ctext x='32' y='44' font-size='34' font-family='monospace' font-weight='bold' fill='white' text-anchor='middle'%3E%E2%82%A8%3C/text%3E%3C/svg%3E">
<style>
/* ===== tokens ===== */
:root{
  --bg:#eceef1; --surface:#ffffff; --surface-2:#f5f6f8; --raise:#ffffff;
  --ink:#15171c; --ink-2:#585e68; --ink-3:#9aa1ab; --line:#e2e5ea; --line-2:#eef0f3;
  --brand:#c2811b; --brand-press:#a96d10; --brand-ink:#7c4f08; --brand-soft:#f8eed9;
  --in:#0f9d63; --in-soft:#e6f5ee; --in-ink:#0a6b44;
  --out:#d83a3f; --out-soft:#fbe8e9; --out-ink:#a31f24;
  --r:14px; --r-sm:10px; --r-lg:22px; --pill:999px;
  --sh-1:0 1px 2px rgba(15,17,22,.05), 0 2px 8px rgba(15,17,22,.05);
  --sh-2:0 6px 24px rgba(15,17,22,.12);
  --ui:-apple-system,system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
  --maxw:540px;
}
html[data-theme="dark"]{
  --bg:#0d0f13; --surface:#161922; --surface-2:#1d212b; --raise:#1d212b;
  --ink:#eef1f6; --ink-2:#a6adb9; --ink-3:#6a7280; --line:#262b36; --line-2:#1f242e;
  --brand:#e0a541; --brand-press:#c98f30; --brand-ink:#f0c878; --brand-soft:#2b2415;
  --in:#34bd82; --in-soft:#11271d; --in-ink:#6fe0ad;
  --out:#f2696e; --out-soft:#2a1416; --out-ink:#ffa1a4;
  --sh-1:0 1px 2px rgba(0,0,0,.4); --sh-2:0 8px 30px rgba(0,0,0,.55);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  background:var(--bg); color:var(--ink); font-family:var(--ui);
  font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
.num{font-family:var(--mono); font-variant-numeric:tabular-nums; letter-spacing:-.01em}
button{font-family:inherit; color:inherit; cursor:pointer; border:0; background:none}
input,textarea,select{font-family:inherit; font-size:16px; color:var(--ink)}
h1,h2,h3{margin:0; font-weight:750; letter-spacing:-.02em}
::-webkit-scrollbar{width:0;height:0}

/* ===== app shell ===== */
#app{max-width:var(--maxw); margin:0 auto; min-height:100%; display:flex; flex-direction:column;
  background:var(--bg); position:relative;
  padding-bottom:calc(78px + env(safe-area-inset-bottom));}
#topbar{
  position:sticky; top:0; z-index:30; display:flex; align-items:center; gap:8px;
  padding:calc(10px + env(safe-area-inset-top)) 12px 10px; background:var(--bg);
  border-bottom:1px solid transparent; transition:border-color .2s;
}
#topbar.scrolled{border-color:var(--line)}
.book-sel{display:flex; align-items:center; gap:10px; padding:6px 10px 6px 8px; border-radius:var(--pill);
  background:var(--surface); box-shadow:var(--sh-1); min-width:0; flex:1; text-align:left;}
.book-dot{width:30px;height:30px;border-radius:9px;flex:none;display:grid;place-items:center;
  font-size:15px;font-weight:800;color:#fff}
.book-meta{min-width:0;flex:1}
.book-name{font-weight:700; font-size:14.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.book-sub{font-size:11.5px; color:var(--ink-3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.chev{color:var(--ink-3); font-size:12px; flex:none}
.top-actions{display:flex; gap:6px; flex:none}
.iconbtn{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;color:var(--ink-2);
  background:var(--surface); box-shadow:var(--sh-1); font-size:18px}
.iconbtn:active{transform:scale(.94)}
.iconbtn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

#screen{flex:1; padding:6px 12px 18px}

/* ===== home: balance band ===== */
.band{background:var(--surface); border-radius:var(--r-lg); padding:18px 18px 16px; box-shadow:var(--sh-1);
  position:relative; overflow:hidden; margin:8px 0 14px}
.band::after{content:""; position:absolute; right:-40px; top:-40px; width:140px; height:140px;
  background:radial-gradient(circle at center, var(--brand-soft), transparent 70%); opacity:.9}
.band .lbl{font-size:12px; color:var(--ink-2); font-weight:600; letter-spacing:.02em; text-transform:uppercase}
.band .bal{font-size:40px; font-weight:800; margin-top:2px; line-height:1.05; position:relative}
.band .bal.neg{color:var(--out)}
.band .cur{font-size:14px; color:var(--ink-3); font-weight:600; margin-right:6px; letter-spacing:0}
.flowrow{display:flex; gap:10px; margin-top:16px; position:relative}
.flow{flex:1; background:var(--surface-2); border-radius:var(--r); padding:10px 12px}
.flow .ft{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--ink-2); font-weight:600}
.flow .fv{font-size:17px; font-weight:750; margin-top:3px}
.dotin{width:8px;height:8px;border-radius:50%;background:var(--in)}
.dotout{width:8px;height:8px;border-radius:50%;background:var(--out)}
.flow.in .fv{color:var(--in-ink)} .flow.out .fv{color:var(--out-ink)}

.scopebar{display:flex; gap:6px; margin:0 0 12px}
.scopebar button{flex:1; padding:8px 4px; border-radius:var(--pill); font-size:12.5px; font-weight:650;
  background:var(--surface); color:var(--ink-2); box-shadow:var(--sh-1)}
.scopebar button.on{background:var(--ink); color:var(--bg)}

/* ===== search ===== */
.searchwrap{display:flex; gap:8px; align-items:center; margin:2px 0 14px}
.search{flex:1; display:flex; align-items:center; gap:8px; background:var(--surface); border-radius:var(--pill);
  padding:0 14px; box-shadow:var(--sh-1)}
.search input{flex:1; border:0; background:none; padding:11px 0; outline:none}
.search .si{color:var(--ink-3); font-size:15px}
.filterbtn{position:relative; width:44px;height:44px;border-radius:13px; background:var(--surface);
  box-shadow:var(--sh-1); display:grid; place-items:center; color:var(--ink-2); flex:none}
.filterbtn.active{color:var(--brand-ink); background:var(--brand-soft)}
.fbadge{position:absolute; top:-4px; right:-4px; background:var(--brand); color:#fff; font-size:10px; font-weight:800;
  min-width:17px;height:17px;border-radius:9px;display:grid;place-items:center; padding:0 4px}

/* ===== ledger feed ===== */
.daygroup{margin-bottom:14px}
.dayhdr{display:flex; justify-content:space-between; align-items:baseline; padding:0 4px 8px}
.dayhdr .dd{font-size:12.5px; font-weight:700; color:var(--ink-2)}
.dayhdr .db{font-size:12px; color:var(--ink-3)}
.daycard{background:var(--surface); border-radius:var(--r); box-shadow:var(--sh-1); overflow:hidden}
.row{display:flex; align-items:center; gap:12px; padding:12px 14px; position:relative}
.row+.row{border-top:1px solid var(--line-2)}
.row:active{background:var(--surface-2)}
.rico{width:40px;height:40px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:17px}
.rico.in{background:var(--in-soft); color:var(--in-ink)}
.rico.out{background:var(--out-soft); color:var(--out-ink)}
.rmain{flex:1; min-width:0}
.rcat{font-weight:650; font-size:14.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.rnote{font-size:12.5px; color:var(--ink-3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px}
.rnote .clip{color:var(--ink-3)}
.rright{text-align:right; flex:none}
.ramt{font-weight:750; font-size:15px}
.ramt.in{color:var(--in-ink)} .ramt.out{color:var(--out-ink)}
.rrun{font-size:11.5px; color:var(--ink-3); margin-top:2px}
.rtime{font-size:11px;color:var(--ink-3)}

/* ===== empty ===== */
.empty{text-align:center; padding:46px 24px; color:var(--ink-3)}
.empty .em{font-size:40px; margin-bottom:10px; opacity:.8}
.empty h3{color:var(--ink-2); font-size:16px; margin-bottom:5px}
.empty p{font-size:13.5px; margin:0 auto; max-width:240px}

/* ===== bottom action bar ===== */
#actionbar{position:fixed; left:0; right:0; bottom:0; z-index:30; display:flex; align-items:center; gap:12px;
  max-width:var(--maxw); margin:0 auto; padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  background:linear-gradient(to top, var(--bg) 70%, transparent);}
.ab-bal{flex:1; min-width:0; padding-left:4px}
.ab-k{display:block; font-size:11px; color:var(--ink-3); font-weight:600; text-transform:uppercase; letter-spacing:.03em}
.ab-v{font-size:19px; font-weight:800}
.ab-v.neg{color:var(--out)}
.btn-primary{background:var(--brand); color:#fff; font-weight:750; font-size:15px; padding:14px 22px;
  border-radius:16px; box-shadow:0 6px 18px color-mix(in srgb, var(--brand) 40%, transparent); display:flex; align-items:center; gap:7px}
.btn-primary:active{transform:translateY(1px); background:var(--brand-press)}

/* ===== scrim + bottom sheet ===== */
#scrim{position:fixed; inset:0; background:rgba(10,12,16,.45); opacity:0; pointer-events:none; z-index:40;
  transition:opacity .22s; backdrop-filter:blur(2px)}
#scrim.show{opacity:1; pointer-events:auto}
#sheet{position:fixed; left:0; right:0; bottom:0; z-index:50; max-width:var(--maxw); margin:0 auto;
  background:var(--surface); border-radius:22px 22px 0 0; box-shadow:var(--sh-2);
  transform:translateY(110%); transition:transform .28s cubic-bezier(.4,1.2,.4,1);
  max-height:88vh; display:flex; flex-direction:column; padding-bottom:env(safe-area-inset-bottom)}
#sheet.show{transform:translateY(0)}
.sheet-grip{width:38px;height:4px;border-radius:3px;background:var(--line);margin:8px auto 2px}
.sheet-head{display:flex; align-items:center; justify-content:space-between; padding:8px 18px 10px}
.sheet-head h2{font-size:18px}
.sheet-body{overflow-y:auto; padding:2px 18px 8px}
.sheet-foot{padding:12px 18px calc(16px + env(safe-area-inset-bottom)); border-top:1px solid var(--line-2)}
.sheet-foot:empty{display:none; padding:0; border:0}

/* ===== menu list ===== */
.mlist{display:flex; flex-direction:column}
.mitem{display:flex; align-items:center; gap:14px; padding:14px 6px; text-align:left; width:100%; font-size:15px; font-weight:550}
.mitem+.mitem{border-top:1px solid var(--line-2)}
.mitem .mi{width:36px;height:36px;border-radius:11px;background:var(--surface-2);display:grid;place-items:center;
  flex:none; font-size:17px; color:var(--ink-2)}
.mitem .marrow{margin-left:auto; color:var(--ink-3)}
.mitem.danger{color:var(--out)} .mitem.danger .mi{background:var(--out-soft); color:var(--out)}
.mitem .msub{font-size:12px; color:var(--ink-3); font-weight:500}

/* ===== forms ===== */
.field{margin:12px 0}
.field>label{display:block; font-size:12.5px; font-weight:650; color:var(--ink-2); margin-bottom:6px}
.inp{width:100%; background:var(--surface-2); border:1.5px solid transparent; border-radius:var(--r-sm);
  padding:12px 13px; outline:none; transition:border-color .15s}
.inp:focus{border-color:var(--brand)}
textarea.inp{resize:vertical; min-height:64px}
.inp-pre{display:flex; align-items:center; background:var(--surface-2); border:1.5px solid transparent; border-radius:var(--r-sm); overflow:hidden}
.inp-pre:focus-within{border-color:var(--brand)}
.inp-pre .pre{padding:12px 0 12px 13px; color:var(--ink-3); font-weight:650; font-size:14px}
.inp-pre input{flex:1; border:0; background:none; padding:12px 13px; outline:none; font-family:var(--mono); font-weight:600}
.row2{display:flex; gap:10px}
.row2>*{flex:1}
.btn{width:100%; padding:13px; border-radius:13px; font-weight:700; font-size:15px; text-align:center}
.btn-fill{background:var(--brand); color:#fff} .btn-fill:active{background:var(--brand-press)}
.btn-in{background:var(--in); color:#fff} .btn-out{background:var(--out); color:#fff}
.btn-ghost{background:var(--surface-2); color:var(--ink)}
.btn-line{background:transparent; box-shadow:inset 0 0 0 1.5px var(--line); color:var(--ink)}
.btn:active{transform:translateY(1px)}
.btn[disabled]{opacity:.45; pointer-events:none}

.chips{display:flex; gap:8px; flex-wrap:wrap}
.chip{padding:8px 13px; border-radius:var(--pill); background:var(--surface-2); font-size:13px; font-weight:600; color:var(--ink-2)}
.chip.on{background:var(--ink); color:var(--bg)}
.chip.in.on{background:var(--in); color:#fff} .chip.out.on{background:var(--out); color:#fff}

.swatches{display:flex; gap:10px; flex-wrap:wrap}
.sw{width:34px;height:34px;border-radius:10px; position:relative}
.sw.on::after{content:"✓"; position:absolute; inset:0; display:grid; place-items:center; color:#fff; font-weight:800; font-size:15px}

.seg{display:flex; background:var(--surface-2); border-radius:var(--pill); padding:4px}
.seg button{flex:1; padding:9px 4px; border-radius:var(--pill); font-size:13px; font-weight:650; color:var(--ink-2)}
.seg button.on{background:var(--surface); color:var(--ink); box-shadow:var(--sh-1)}
.seg.io button.on.in{background:var(--in); color:#fff} .seg.io button.on.out{background:var(--out); color:#fff}

/* ===== entry pad (signature) ===== */
#pad{position:fixed; inset:0; z-index:60; background:var(--surface); display:flex; flex-direction:column;
  transform:translateY(100%); transition:transform .3s cubic-bezier(.33,1,.4,1); max-width:var(--maxw); margin:0 auto}
#pad.show{transform:translateY(0)}
.pad-top{display:flex; align-items:center; justify-content:space-between; padding:calc(12px + env(safe-area-inset-top)) 16px 6px}
.pad-top .px{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;background:var(--surface-2);color:var(--ink-2);font-size:18px}
.pad-top .pt{font-size:14px; font-weight:700; color:var(--ink-2)}
.pad-seg{padding:8px 16px 4px}
.pad-amt{padding:14px 20px 6px; text-align:center}
.pad-amt .pc{font-size:14px; color:var(--ink-3); font-weight:650; vertical-align:middle; margin-right:8px}
.pad-amt .pv{font-size:46px; font-weight:800; letter-spacing:-.02em}
.pad-amt.in .pv{color:var(--in-ink)} .pad-amt.out .pv{color:var(--out-ink)}
.pad-amt .ph{color:var(--ink-3); font-weight:700}
.pad-meta{display:flex; gap:8px; padding:6px 16px 4px; overflow-x:auto}
.metachip{display:flex; align-items:center; gap:6px; padding:8px 12px; border-radius:var(--pill); background:var(--surface-2);
  font-size:13px; font-weight:600; color:var(--ink-2); white-space:nowrap; flex:none}
.metachip.set{color:var(--ink); box-shadow:inset 0 0 0 1.5px var(--brand)}
.pad-note{padding:6px 16px}
.pad-note input{width:100%; background:var(--surface-2); border:0; border-radius:var(--r-sm); padding:11px 13px; outline:none}
.pad-quick{display:flex; gap:8px; padding:6px 16px 2px; overflow-x:auto}
.pad-quick .chip{flex:none}
.pad-grid{margin-top:auto; padding:8px 14px calc(12px + env(safe-area-inset-bottom)); display:grid;
  grid-template-columns:repeat(4,1fr); gap:8px}
.key{height:54px; border-radius:14px; background:var(--surface-2); font-size:21px; font-weight:600; display:grid; place-items:center}
.key:active{background:var(--line); transform:scale(.97)}
.key.util{font-size:15px; color:var(--ink-2); font-weight:700}
.key.save{grid-column:span 4; height:54px; color:#fff; font-size:16px; font-weight:750; margin-top:2px}
.key.save.in{background:var(--in)} .key.save.out{background:var(--out)}
.key.save:active{filter:brightness(.94)}
.key.save[disabled]{opacity:.4; pointer-events:none}

/* ===== filter panel ===== */
.fpanel{background:var(--surface); border-radius:var(--r); box-shadow:var(--sh-1); padding:14px; margin-bottom:14px}
.fpanel .flbl{font-size:12px; font-weight:650; color:var(--ink-2); margin:10px 0 6px}
.fpanel .flbl:first-child{margin-top:0}

/* ===== reports ===== */
.rep-seg{margin-bottom:14px}
.statrow{display:flex; gap:10px; margin-bottom:14px}
.stat{flex:1; background:var(--surface); border-radius:var(--r); box-shadow:var(--sh-1); padding:13px 14px}
.stat .sk{font-size:11.5px; color:var(--ink-2); font-weight:600; display:flex; align-items:center; gap:6px}
.stat .sv{font-size:18px; font-weight:800; margin-top:4px}
.stat.in .sv{color:var(--in-ink)} .stat.out .sv{color:var(--out-ink)}
.netcard{background:var(--surface); border-radius:var(--r); box-shadow:var(--sh-1); padding:16px; margin-bottom:14px; text-align:center}
.netcard .nk{font-size:12px; color:var(--ink-2); font-weight:600; text-transform:uppercase; letter-spacing:.03em}
.netcard .nv{font-size:32px; font-weight:800; margin-top:3px}
.netcard .nv.neg{color:var(--out)} .netcard .nv.pos{color:var(--in-ink)}
.card{background:var(--surface); border-radius:var(--r); box-shadow:var(--sh-1); padding:16px; margin-bottom:14px}
.card h3{font-size:14px; margin-bottom:14px}
.chart{display:flex; align-items:flex-end; gap:10px; height:150px; padding-top:6px}
.cbar{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; min-width:0}
.cbar .bars{display:flex; align-items:flex-end; gap:3px; height:120px; width:100%; justify-content:center}
.cbar .bb{width:11px; border-radius:4px 4px 0 0; min-height:2px}
.cbar .bb.in{background:var(--in)} .cbar .bb.out{background:var(--out)}
.cbar .bl{font-size:10.5px; color:var(--ink-3); white-space:nowrap}
.brk{display:flex; flex-direction:column; gap:12px}
.brkrow .bt{display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px}
.brkrow .bt .bn{font-weight:600} .brkrow .bt .ba{font-weight:700; font-family:var(--mono)}
.track{height:8px; background:var(--surface-2); border-radius:6px; overflow:hidden}
.track .fillb{height:100%; border-radius:6px}

/* ===== toast / lightbox ===== */
#toast{position:fixed; left:50%; bottom:96px; transform:translate(-50%,20px); z-index:80; background:var(--ink);
  color:var(--bg); padding:11px 18px; border-radius:var(--pill); font-size:13.5px; font-weight:600; opacity:0;
  pointer-events:none; transition:all .25s; max-width:90%; box-shadow:var(--sh-2)}
#toast.show{opacity:1; transform:translate(-50%,0)}
#lightbox{position:fixed; inset:0; z-index:90; background:rgba(8,9,12,.94); display:none; align-items:center; justify-content:center}
#lightbox.show{display:flex}
#lightbox img{max-width:94%; max-height:84%; border-radius:12px}
#lightX{position:absolute; top:calc(16px + env(safe-area-inset-top)); right:18px; width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.14); color:#fff; font-size:20px; display:grid; place-items:center}

/* ===== print ===== */
#printArea{display:none}
@media print{
  body *{visibility:hidden}
  #printArea, #printArea *{visibility:visible}
  #printArea{display:block; position:absolute; inset:0; padding:24px; background:#fff; color:#000; font-family:var(--ui)}
  .pa-h{display:flex; justify-content:space-between; border-bottom:2px solid #000; padding-bottom:10px; margin-bottom:14px}
  .pa-h h1{font-size:20px} .pa-meta{font-size:12px; text-align:right; color:#333}
  .pa-sum{display:flex; gap:20px; margin-bottom:16px; font-size:13px}
  .pa-sum b{display:block; font-size:16px}
  table.pa-t{width:100%; border-collapse:collapse; font-size:11.5px}
  table.pa-t th,table.pa-t td{border-bottom:1px solid #ccc; padding:6px 8px; text-align:left}
  table.pa-t td.r,table.pa-t th.r{text-align:right; font-family:var(--mono)}
  table.pa-t thead th{background:#f0f0f0; font-weight:700}
}
@media (prefers-reduced-motion: reduce){*{transition:none !important; animation:none !important}}
.spin{display:inline-block;width:18px;height:18px;border:2.5px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <header id="topbar">
    <button id="bookBtn" class="book-sel" aria-label="Switch cashbook">
      <span class="book-dot" id="bookDot">₨</span>
      <span class="book-meta"><span class="book-name" id="bookName">Cashbook</span><span class="book-sub" id="bookSub">Loading…</span></span>
      <span class="chev">▾</span>
    </button>
    <div class="top-actions">
      <button id="reportsBtn" class="iconbtn" aria-label="Reports">
        <svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>
      </button>

<script>
"use strict";
/* ============================================================ helpers */
const $=(id)=>document.getElementById(id);
const $$=(sel,root=document)=>Array.from(root.querySelectorAll(sel));
const esc=(s)=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const uid=()=> (crypto.randomUUID? crypto.randomUUID() : "id-"+Date.now()+"-"+Math.random().toString(16).slice(2));
const nowISO=()=> new Date().toISOString();
function todayISO(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}

/* money: integer minor units (paisa) */
const grp=(n)=> Number(n).toLocaleString("en-US");
function fmtMinor(minor){
  const neg=minor<0; let v=Math.abs(Math.round(minor));
  const r=Math.floor(v/100), p=v%100;
  return (neg?"-":"")+grp(r)+"."+String(p).padStart(2,"0");
}
function parseAmountToMinor(amt){
  if(!amt) return 0;
  let [i,f=""]=String(amt).split(".");
  i=(i.replace(/\D/g,"")||"0"); f=(f.replace(/\D/g,"")+"00").slice(0,2);
  return Number(i)*100 + Number(f);
}
function parseSignedMinor(str){
  if(str==null) return 0; str=String(str).trim(); if(!str) return 0;
  const neg=/^-/.test(str);
  const m=parseAmountToMinor(str.replace(/^[-+]/,""));
  return neg? -m : m;
}
function fmtTyped(amt){
  if(!amt) return "0";
  let [i,f]=amt.split(".");
  let gi = grp((i||"0").replace(/\D/g,"")||"0");
  return amt.includes(".") ? gi+"."+(f||"") : gi;
}

/* dates */
const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function dayLabel(iso){
  const t=todayISO();
  if(iso===t) return "Today";
  const y=new Date(); y.setDate(y.getDate()-1);
  const yi=y.getFullYear()+"-"+String(y.getMonth()+1).padStart(2,"0")+"-"+String(y.getDate()).padStart(2,"0");
  if(iso===yi) return "Yesterday";
  const [Y,M,D]=iso.split("-").map(Number); const d=new Date(Y,M-1,D);
  return DOW[d.getDay()]+", "+D+" "+MON[M-1]+" "+Y;
}
function shortDate(iso){const [Y,M,D]=iso.split("-").map(Number);return D+" "+MON[M-1]+" "+Y;}
function entryTime(createdISO){
  if(!createdISO) return "";
  const d=new Date(createdISO); if(isNaN(d)) return "";
  let h=d.getHours(),m=d.getMinutes(); const ap=h<12?"AM":"PM"; h=h%12||12;
  return h+":"+String(m).padStart(2,"0")+" "+ap;
}

/* ============================================================ database (IndexedDB) */
const DB_NAME="cashbook_db", DB_VERSION=1;
let _db=null;
const DEFAULT_CATS=[
  ["Payment received","IN"],["Freight income","IN"],["Advance received","IN"],
  ["Fuel / diesel","OUT"],["Driver / staff","OUT"],["Adda / commission","OUT"],
  ["Repair / parts","OUT"],["Toll / challan","OUT"],["Office / misc","OUT"],
  ["Cash adjustment","BOTH"]
];
function openDB(){
  return new Promise((res,rej)=>{
    const rq=indexedDB.open(DB_NAME,DB_VERSION);
    rq.onupgradeneeded=(e)=>{
      const db=rq.result;
      if(!db.objectStoreNames.contains("cashbooks")) db.createObjectStore("cashbooks",{keyPath:"id"});
      if(!db.objectStoreNames.contains("categories")) db.createObjectStore("categories",{keyPath:"id"});
      if(!db.objectStoreNames.contains("meta")) db.createObjectStore("meta",{keyPath:"k"});
      if(!db.objectStoreNames.contains("entries")){
        const s=db.createObjectStore("entries",{keyPath:"id"});
        s.createIndex("by_book","book_id",{unique:false});
      }
    };
    rq.onsuccess=async ()=>{ _db=rq.result; await seedIfEmpty(); res(_db); };
    rq.onerror=()=>rej(rq.error);
  });
}
function tx(store,mode="readonly"){return _db.transaction(store,mode).objectStore(store);}
function reqP(r){return new Promise((res,rej)=>{r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function getAll(store){return reqP(tx(store).getAll());}
function getOne(store,id){return reqP(tx(store).get(id));}
function putOne(store,obj){return reqP(tx(store,"readwrite").put(obj));}
function delOne(store,id){return reqP(tx(store,"readwrite").delete(id));}

async function seedIfEmpty(){
  const books=await getAll("cashbooks");
  if(books.length===0){
    const id=uid(), now=nowISO();
    await putOne("cashbooks",{id,name:"My Cashbook",note:"",color:"#c2811b",opening_balance_minor:0,archived:false,created_at:now,updated_at:now});
    await putOne("meta",{k:"lastBook",v:id});
  }
  const cats=await getAll("categories");
  if(cats.length===0){
    const now=nowISO();
    for(const [name,kind] of DEFAULT_CATS){ await putOne("categories",{id:uid(),name,kind,created_at:now}); }
  }
}

/* book ops (archive-only, no hard delete) */
async function listBooks(includeArchived=false){
  const b=await getAll("cashbooks");
  b.sort((a,c)=> (a.created_at<c.created_at?-1:1));
  return includeArchived? b : b.filter(x=>!x.archived);
}
async function addBook(d){
  const now=nowISO(); const o={id:uid(),name:d.name.trim()||"Cashbook",note:d.note||"",color:d.color||"#c2811b",
    opening_balance_minor:Math.round(d.opening_balance_minor||0),archived:false,created_at:now,updated_at:now};
  await putOne("cashbooks",o); return o;
}
async function updateBook(d){
  const o=await getOne("cashbooks",d.id); if(!o) return;
  Object.assign(o,{name:d.name.trim()||o.name,note:d.note||"",color:d.color||o.color,
    opening_balance_minor:Math.round(d.opening_balance_minor||0),updated_at:nowISO()});
  await putOne("cashbooks",o); return o;
}
async function setArchived(id,flag){const o=await getOne("cashbooks",id);if(!o)return;o.archived=!!flag;o.updated_at=nowISO();await putOne("cashbooks",o);}

/* entries */
async function bookEntries(bookId){
  const all=await reqP(tx("entries").index("by_book").getAll(bookId));
  return all.filter(e=>!e.deleted);
}
async function allEntries(){ const a=await getAll("entries"); return a.filter(e=>!e.deleted); }
async function addEntry(d){
  const now=nowISO();
  const o={id:uid(),book_id:d.book_id,amount_minor:Math.round(d.amount_minor),type:d.type,
    date:d.date||todayISO(),category_id:d.category_id||null,category_name:d.category_name||"",
    note:d.note||"",ref:d.ref||"",photo:d.photo||null,transfer_id:d.transfer_id||null,
    deleted:false,created_at:now,updated_at:now};
  await putOne("entries",o); return o;
}
async function updateEntry(d){
  const o=await getOne("entries",d.id); if(!o) return;
  Object.assign(o,{amount_minor:Math.round(d.amount_minor),type:d.type,date:d.date,
    category_id:d.category_id||null,category_name:d.category_name||"",note:d.note||"",ref:d.ref||"",
    photo:(d.photo!==undefined?d.photo:o.photo),updated_at:nowISO()});
  await putOne("entries",o); return o;
}
async function softDeleteEntry(id){const o=await getOne("entries",id);if(!o)return;o.deleted=true;o.updated_at=nowISO();await putOne("entries",o);
  if(o.transfer_id){ // delete the paired side too
    const all=await getAll("entries");
    for(const e of all){ if(e.transfer_id===o.transfer_id && e.id!==o.id && !e.deleted){ e.deleted=true; e.updated_at=nowISO(); await putOne("entries",e); } }
  }
}
async function addTransfer(fromId,toId,minor,date,note){
  const tid=uid();
  const fromBook=await getOne("cashbooks",fromId), toBook=await getOne("cashbooks",toId);
  await addEntry({book_id:fromId,amount_minor:minor,type:"OUT",date,category_name:"Transfer",
    note:(note?note+" — ":"")+"To "+(toBook?toBook.name:"book"),transfer_id:tid});
  await addEntry({book_id:toId,amount_minor:minor,type:"IN",date,category_name:"Transfer",
    note:(note?note+" — ":"")+"From "+(fromBook?fromBook.name:"book"),transfer_id:tid});
}

/* categories (true delete + snapshot preserved on entries) */
async function listCategories(){const c=await getAll("categories");c.sort((a,b)=>a.name.localeCompare(b.name));return c;}
async function addCategory(name,kind){const o={id:uid(),name:name.trim(),kind:kind||"BOTH",created_at:nowISO()};await putOne("categories",o);return o;}
async function updateCategory(id,name,kind){const o=await getOne("categories",id);if(!o)return;o.name=name.trim();o.kind=kind;await putOne("categories",o);return o;}
async function deleteCategory(id){
  await delOne("categories",id);
  const all=await getAll("entries");
  for(const e of all){ if(e.category_id===id){ e.category_id=null; await putOne("entries",e); } }
}

/* meta */
async function metaGet(k,def){const o=await getOne("meta",k);return o?o.v:def;}
async function metaSet(k,v){await putOne("meta",{k,v});}

/* ============================================================ computations */
function bookBalance(book,entries){
  let b=(book.opening_balance_minor||0);
  for(const e of entries) b+= e.type==="IN"? e.amount_minor : -e.amount_minor;
  return b;
}
function sumTotals(entries){
  let i=0,o=0; for(const e of entries){ if(e.type==="IN") i+=e.amount_minor; else o+=e.amount_minor; }
  return {inMinor:i,outMinor:o,net:i-o};
}
function sortChrono(entries){
  return entries.slice().sort((a,b)=> a.date<b.date?-1 : a.date>b.date?1 : (a.created_at<b.created_at?-1:1));
}
function runningBalances(book,entries){
  const map={}; let b=(book.opening_balance_minor||0);
  for(const e of sortChrono(entries)){ b+= e.type==="IN"? e.amount_minor : -e.amount_minor; map[e.id]=b; }
  return map;
}
function inPeriod(iso,filter){
  if(filter.period==="ALL"||!filter.period) return true;
  const t=todayISO();
  if(filter.period==="TODAY") return iso===t;
  if(filter.period==="MONTH"){ return iso.slice(0,7)===t.slice(0,7); }
  if(filter.period==="CUSTOM"){
    if(filter.from && iso<filter.from) return false;
    if(filter.to && iso>filter.to) return false;
    return true;
  }
  return true;
}
function filterEntries(entries,filter){
  const q=(filter.q||"").trim().toLowerCase();
  return entries.filter(e=>{
    if(filter.type&&filter.type!=="ALL" && e.type!==filter.type) return false;
    if(filter.cat&&filter.cat!=="ALL"){ if(filter.cat==="NONE"){ if(e.category_id||e.category_name) return false; } else if(e.category_id!==filter.cat) return false; }
    if(!inPeriod(e.date,filter)) return false;
    if(q){
      const hay=((e.category_name||"")+" "+(e.note||"")+" "+(e.ref||"")).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}
function activeFilterCount(f){
  let n=0; if(f.type&&f.type!=="ALL")n++; if(f.cat&&f.cat!=="ALL")n++;
  if(f.period&&f.period!=="ALL")n++; return n;
}

/* ============================================================ app state */
const state={
  view:"home",
  bookId:null,
  showArchived:false,
  filter:{q:"",type:"ALL",cat:"ALL",period:"ALL",from:"",to:""},
  showFilters:false,
  dark:false,
  rep:{scope:"book",period:"MONTH",mode:"OUT"},
  cache:{book:null,entries:[],runMap:{},cats:[]}
};
let _photoCb=null;

/* ============================================================ chrome / overlays */
function showChrome(on){ $("topbar").style.display=on?"":"none"; $("actionbar").style.display=on?"":"none"; }
function scrim(on){ $("scrim").classList.toggle("show",on); }
function openSheet(title,bodyHTML,footHTML){
  $("sheetTitle").textContent=title;
  $("sheetBody").innerHTML=bodyHTML;
  $("sheetFoot").innerHTML=footHTML||"";
  $("sheet").setAttribute("aria-hidden","false");
  $("sheet").classList.add("show"); scrim(true);
}
function closeSheet(){ $("sheet").classList.remove("show"); $("sheet").setAttribute("aria-hidden","true"); if(!$("pad").classList.contains("show")) scrim(false); }
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove("show"),2200); }
function openLight(src){ $("lightImg").src=src; $("lightbox").classList.add("show"); }
function closeLight(){ $("lightbox").classList.remove("show"); $("lightImg").src=""; }

function confirmDialog(title,msg,opts={}){
  return new Promise(res=>{
    const ov=document.createElement("div");
    ov.style.cssText="position:fixed;inset:0;z-index:95;display:flex;align-items:center;justify-content:center;padding:28px;background:rgba(10,12,16,.5);backdrop-filter:blur(2px)";
    ov.innerHTML=`<div style="background:var(--surface);border-radius:18px;max-width:340px;width:100%;padding:20px;box-shadow:var(--sh-2)">
      <h3 style="font-size:17px;margin-bottom:6px">${esc(title)}</h3>
      <p style="color:var(--ink-2);font-size:14px;margin:0 0 18px;line-height:1.5">${esc(msg)}</p>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" data-no style="flex:1">${esc(opts.cancel||"Cancel")}</button>
        <button class="btn ${opts.danger?'btn-out':'btn-fill'}" data-yes style="flex:1">${esc(opts.ok||"Confirm")}</button>
      </div></div>`;
    document.body.appendChild(ov);
    const done=(v)=>{ ov.remove(); res(v); };
    ov.querySelector("[data-no]").onclick=()=>done(false);
    ov.querySelector("[data-yes]").onclick=()=>done(true);
    ov.onclick=(e)=>{ if(e.target===ov) done(false); };
  });
}

/* shared photo picker */
function pickPhoto(cb){ _photoCb=cb; $("photoInput").value=""; $("photoInput").click(); }
$("photoInput").addEventListener("change",async (e)=>{
  const f=e.target.files&&e.target.files[0]; if(!f||!_photoCb) return;
  try{ const data=await readImageScaled(f); _photoCb(data); }catch(err){ toast("Could not read image"); }
  _photoCb=null;
});
function readImageScaled(file,max=1100,quality=.7){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=()=>{ const img=new Image();
      img.onload=()=>{ let {width:w,height:h}=img; if(w>h&&w>max){h=h*max/w;w=max;} else if(h>=w&&h>max){w=w*max/h;h=max;}
        const c=document.createElement("canvas"); c.width=Math.round(w); c.height=Math.round(h);
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL("image/jpeg",quality)); };
      img.onerror=rej; img.src=fr.result; };
    fr.onerror=rej; fr.readAsDataURL(file);
  });
}

/* ============================================================ data load + top */
async function loadCurrent(){
  let book=state.bookId? await getOne("cashbooks",state.bookId):null;
  if(!book||book.archived){
    const bs=await listBooks(false);
    book=bs[0]|| (await listBooks(true))[0] || null;
    state.bookId=book?book.id:null;
    if(book) await metaSet("lastBook",book.id);
  }
  const entries= book? await bookEntries(book.id):[];
  const runMap= book? runningBalances(book,entries):{};
  const cats= await listCategories();
  state.cache={book,entries,runMap,cats};
  return state.cache;
}
function refreshTop(){
  const b=state.cache.book; if(!b) return;
  $("bookDot").textContent=(b.name||"C").trim().charAt(0).toUpperCase();
  $("bookDot").style.background=b.color||"#c2811b";
  $("bookName").textContent=b.name;
  const bal=bookBalance(b,state.cache.entries);
  $("bookSub").textContent="Balance ₨ "+fmtMinor(bal);
  const ab=$("abBal"); ab.textContent="₨ "+fmtMinor(bal); ab.classList.toggle("neg",bal<0);
}

/* ============================================================ render router */
async function render(){
  await loadCurrent();
  if(state.view==="reports"){ showChrome(false); renderReports(); return; }
  showChrome(true); refreshTop(); renderHome();
}

/* ============================================================ HOME */
function renderHome(){
  const {book,entries,runMap}=state.cache;
  const f=state.filter;
  if(!book){ $("screen").innerHTML=`<div class="empty"><div class="em">📓</div><h3>No cashbook</h3><p>Create one from the menu to begin.</p></div>`; return; }
  const periodLbl={ALL:"All time",TODAY:"Today",MONTH:"This month",CUSTOM:"Custom"}[f.period]||"All time";
  const scoped=filterEntries(entries,{period:f.period,from:f.from,to:f.to}); // for the flow band (period only)
  const flow=sumTotals(scoped);
  const bal=bookBalance(book,entries);

  let html=`
  <div class="band">
    <div class="lbl">Balance</div>
    <div class="bal num ${bal<0?'neg':''}"><span class="cur">₨</span>${fmtMinor(bal)}</div>
    <div class="flowrow">
      <div class="flow in"><div class="ft"><span class="dotin"></span>Cash in · ${esc(periodLbl)}</div><div class="fv num" id="flowIn">${fmtMinor(flow.inMinor)}</div></div>
      <div class="flow out"><div class="ft"><span class="dotout"></span>Cash out · ${esc(periodLbl)}</div><div class="fv num" id="flowOut">${fmtMinor(flow.outMinor)}</div></div>
    </div>
  </div>
  <div class="scopebar">
    ${[["ALL","All"],["MONTH","Month"],["TODAY","Today"]].map(([k,l])=>`<button data-scope="${k}" class="${f.period===k?'on':''}">${l}</button>`).join("")}
    <button data-scope="CUSTOM" class="${f.period==='CUSTOM'?'on':''}">Range</button>
  </div>
  <div class="searchwrap">
    <div class="search"><span class="si">🔍</span><input id="searchBox" placeholder="Search notes, category, ref…" value="${esc(f.q)}" inputmode="search"></div>
    <button class="filterbtn ${activeFilterCount(f)?'active':''}" id="filterBtn">⚙${activeFilterCount(f)?`<span class="fbadge">${activeFilterCount(f)}</span>`:""}</button>
  </div>
  <div id="filterHost"></div>
  <div id="feedHost"></div>`;
  $("screen").innerHTML=html;

  $("searchBox").addEventListener("input",(e)=>{ state.filter.q=e.target.value; repaintFeed(); });
  $$("[data-scope]").forEach(b=>b.onclick=()=>{ const k=b.dataset.scope;
    if(k==="CUSTOM"){ state.filter.period="CUSTOM"; state.showFilters=true; renderHome(); }
    else { state.filter.period=k; renderHome(); } });
  $("filterBtn").onclick=()=>{ state.showFilters=!state.showFilters; renderFilterPanel(); };
  if(state.showFilters) renderFilterPanel();
  repaintFeed();
}

function renderFilterPanel(){
  const host=$("filterHost"); if(!host) return;
  const f=state.filter, cats=state.cache.cats;
  if(!state.showFilters){ host.innerHTML=""; return; }
  host.innerHTML=`<div class="fpanel">
    <div class="flbl">Type</div>
    <div class="seg" id="fType">
      ${[["ALL","All"],["IN","Cash in"],["OUT","Cash out"]].map(([k,l])=>`<button data-t="${k}" class="${f.type===k?'on':''} ${k==='IN'?'in':k==='OUT'?'out':''}">${l}</button>`).join("")}
    </div>
    <div class="flbl">Category</div>
    <select class="inp" id="fCat">
      <option value="ALL">All categories</option>
      <option value="NONE" ${f.cat==='NONE'?'selected':''}>Uncategorized</option>
      ${cats.map(c=>`<option value="${c.id}" ${f.cat===c.id?'selected':''}>${esc(c.name)}</option>`).join("")}
    </select>
    ${f.period==="CUSTOM"?`<div class="flbl">Date range</div>
      <div class="row2"><input type="date" class="inp" id="fFrom" value="${esc(f.from)}"><input type="date" class="inp" id="fTo" value="${esc(f.to)}"></div>`:""}
    <div class="row2" style="margin-top:14px">
      <button class="btn btn-ghost" id="fClear">Clear filters</button>
      <button class="btn btn-fill" id="fDone">Done</button>
    </div>
  </div>`;
  $$("#fType [data-t]").forEach(b=>b.onclick=()=>{ state.filter.type=b.dataset.t; renderFilterPanel(); repaintFeed(); });
  $("fCat").onchange=(e)=>{ state.filter.cat=e.target.value; repaintFeed(); };
  if($("fFrom")) $("fFrom").onchange=(e)=>{ state.filter.from=e.target.value; repaintFeed(); refreshFlow(); };
  if($("fTo")) $("fTo").onchange=(e)=>{ state.filter.to=e.target.value; repaintFeed(); refreshFlow(); };
  $("fClear").onclick=()=>{ state.filter={q:state.filter.q,type:"ALL",cat:"ALL",period:"ALL",from:"",to:""}; state.showFilters=false; renderHome(); };
  $("fDone").onclick=()=>{ state.showFilters=false; renderHome(); };
}

function refreshFlow(){
  const f=state.filter; const scoped=filterEntries(state.cache.entries,{period:f.period,from:f.from,to:f.to});
  const flow=sumTotals(scoped);
  if($("flowIn")) $("flowIn").textContent=fmtMinor(flow.inMinor);
  if($("flowOut")) $("flowOut").textContent=fmtMinor(flow.outMinor);
}

function repaintFeed(){
  const host=$("feedHost"); if(!host) return;
  const {book,entries,runMap}=state.cache;
  const vis=filterEntries(entries,state.filter);
  if(vis.length===0){
    const any=entries.length>0;
    host.innerHTML=`<div class="empty"><div class="em">${any?'🔍':'🧾'}</div><h3>${any?'Nothing matches':'No entries yet'}</h3><p>${any?'Try clearing the search or filters.':'Tap “New entry” to record your first cash in or out.'}</p></div>`;
    return;
  }
  // newest first, grouped by day
  vis.sort((a,b)=> a.date<b.date?1 : a.date>b.date?-1 : (a.created_at<b.created_at?1:-1));
  const groups=[]; let cur=null;
  for(const e of vis){ if(!cur||cur.date!==e.date){ cur={date:e.date,items:[]}; groups.push(cur); } cur.items.push(e); }
  host.innerHTML=groups.map(g=>{
    const t=sumTotals(g.items);
    const rows=g.items.map(e=>{
      const isIn=e.type==="IN"; const cat=e.category_name|| (e.category_id?"Category":"Uncategorized");
      const sub=[e.note,e.ref?("#"+e.ref):""].filter(Boolean).join("  ·  ");
      const run=runMap[e.id];
      return `<div class="row" data-entry="${e.id}">
        <div class="rico ${isIn?'in':'out'}">${isIn?'↓':'↑'}</div>
        <div class="rmain">
          <div class="rcat">${esc(cat)}${e.photo?' <span class="clip">📎</span>':''}</div>
          ${sub?`<div class="rnote">${esc(sub)}</div>`:`<div class="rnote">${esc(entryTime(e.created_at))}</div>`}
        </div>
        <div class="rright">
          <div class="ramt ${isIn?'in':'out'}">${isIn?'+':'−'} ${fmtMinor(e.amount_minor)}</div>
          <div class="rrun num">${fmtMinor(run)}</div>
        </div>
      </div>`;
    }).join("");
    const net=t.net;
    return `<div class="daygroup">
      <div class="dayhdr"><span class="dd">${esc(dayLabel(g.date))}</span>
        <span class="db num">${net>=0?'+':'−'} ${fmtMinor(net)}</span></div>
      <div class="daycard">${rows}</div></div>`;
  }).join("");
  $$("#feedHost [data-entry]").forEach(el=>el.onclick=()=> openEntryEditor(el.dataset.entry));
  refreshFlow();
}

/* ============================================================ ENTRY PAD (signature) */
let padState=null;
function minorToAmtStr(m){ m=Math.abs(Math.round(m)); const r=Math.floor(m/100),p=m%100; return p? r+"."+String(p).padStart(2,"0") : String(r); }
function catsForType(type){ return state.cache.cats.filter(c=> c.kind===type || c.kind==="BOTH"); }

function openEntryEditor(id){
  const e=state.cache.entries.find(x=>x.id===id); if(!e) return;
  openPad(e.type,e);
}
async function openNewEntry(){
  const last=await metaGet("lastType","OUT");
  openPad(last||"OUT",null);
}
function openPad(type,entry){
  padState={
    editId: entry? entry.id:null,
    type: type,
    amt: entry? minorToAmtStr(entry.amount_minor):"",
    catId: entry? entry.category_id:null,
    catName: entry? (entry.category_name||""):"",
    date: entry? entry.date: todayISO(),
    note: entry? (entry.note||""):"",
    ref: entry? (entry.ref||""):"",
    photo: entry? (entry.photo||null):null,
    showRef: !!(entry&&entry.ref)
  };
  buildPad();
  $("pad").classList.add("show"); $("pad").setAttribute("aria-hidden","false"); scrim(false);
}
function closePad(){ $("pad").classList.remove("show"); $("pad").setAttribute("aria-hidden","true"); $("pad").innerHTML=""; padState=null; }

function buildPad(){
  const p=padState; const io=p.type.toLowerCase();
  const keys=["1","2","3","del","4","5","6","000","7","8","9","00","dot","0","clr"];
  $("pad").innerHTML=`
    <div class="pad-top">
      <button class="px" id="padClose">✕</button>
      <div class="pt">${p.editId?'Edit entry':'New entry'}</div>
      ${p.editId?'<button class="px" id="padDel" style="color:var(--out)">🗑</button>':'<span style="width:40px"></span>'}
    </div>
    <div class="pad-seg">
      <div class="seg io" id="padIO">
        <button data-io="IN" class="in ${p.type==='IN'?'on':''}">Cash in</button>
        <button data-io="OUT" class="out ${p.type==='OUT'?'on':''}">Cash out</button>
      </div>
    </div>
    <div class="pad-amt ${io}" id="padAmtWrap">
      <span class="pc">PKR</span><span class="pv" id="padAmt"></span>
    </div>
    <div class="pad-meta">
      <label class="metachip set" style="position:relative">📅 <span id="padDateLbl"></span>
        <input type="date" id="padDate" value="${esc(p.date)}" style="position:absolute;inset:0;opacity:0"></label>
      <button class="metachip ${p.catId||p.catName?'set':''}" id="padCat">🏷 <span id="padCatLbl"></span></button>
      <button class="metachip ${p.photo?'set':''}" id="padPhoto">📎 <span id="padPhotoLbl"></span></button>
      <button class="metachip ${p.showRef?'set':''}" id="padRefChip"># Ref</button>
    </div>
    <div class="pad-note"><input id="padNote" placeholder="Add a note…" value="${esc(p.note)}"></div>
    <div class="pad-note" id="padRefWrap" style="display:${p.showRef?'block':'none'}"><input id="padRef" placeholder="Reference / bilty no." value="${esc(p.ref)}"></div>
    <div class="pad-quick" id="padQuick"></div>
    <div class="pad-grid" id="padGrid">
      ${keys.map(k=>{
        if(k==="del") return `<button class="key util" data-k="del">⌫</button>`;
        if(k==="clr") return `<button class="key util" data-k="clr">C</button>`;
        if(k==="dot") return `<button class="key" data-k=".">.</button>`;
        return `<button class="key${k.length>1?' util':''}" data-k="${k}">${k}</button>`;
      }).join("")}
      <button class="key save ${io}" id="padSave">Save ${p.type==='IN'?'cash in':'cash out'}</button>
    </div>`;
  // wire
  $("padClose").onclick=closePad;
  if($("padDel")) $("padDel").onclick=async ()=>{ if(await confirmDialog("Delete entry?","This removes the entry from the ledger.",{ok:"Delete",danger:true})){ await softDeleteEntry(p.editId); closePad(); toast("Entry deleted"); render(); } };
  $$("#padIO [data-io]").forEach(b=>b.onclick=()=>setPadType(b.dataset.io));
  $("padDate").onchange=(e)=>{ p.date=e.target.value||todayISO(); updateDateChip(); };
  $("padCat").onclick=openCatPicker;
  $("padPhoto").onclick=padPhotoTap;
  $("padRefChip").onclick=()=>{ p.showRef=!p.showRef; $("padRefWrap").style.display=p.showRef?"block":"none"; $("padRefChip").classList.toggle("set",p.showRef); if(p.showRef) $("padRef").focus(); };
  $("padNote").addEventListener("input",e=>p.note=e.target.value);
  $("padRef").addEventListener("input",e=>p.ref=e.target.value);
  $$("#padGrid .key[data-k]").forEach(b=>b.onclick=()=>pressKey(b.dataset.k));
  $("padSave").onclick=savePad;
  updateAmt(); updateDateChip(); updateCatChip(); updatePhotoChip(); renderQuick();
}
function setPadType(t){
  padState.type=t; const io=t.toLowerCase();
  $$("#padIO [data-io]").forEach(b=>b.classList.toggle("on",b.dataset.io===t));
  $("padAmtWrap").className="pad-amt "+io;
  const sv=$("padSave"); sv.className="key save "+io; sv.textContent="Save "+(t==="IN"?"cash in":"cash out");
  // clear category if not valid for type
  if(padState.catId){ const c=state.cache.cats.find(x=>x.id===padState.catId); if(c && !(c.kind===t||c.kind==="BOTH")){ padState.catId=null; padState.catName=""; } }
  updateCatChip(); renderQuick(); updateSaveState();
}
function updateAmt(){ const el=$("padAmt"); const a=padState.amt;
  el.innerHTML = a? esc(fmtTyped(a)) : `<span class="ph">0</span>`;
  updateSaveState();
}
function updateSaveState(){ const ok=parseAmountToMinor(padState.amt)>0; $("padSave").disabled=!ok; }
function pressKey(k){
  let a=padState.amt;
  if(k==="del"){ a=a.slice(0,-1); }
  else if(k==="clr"){ a=""; }
  else if(k==="."){ if(!a) a="0."; else if(!a.includes(".")) a+="."; }
  else { // digits / 00 / 000
    let next=a+k;
    if(next.includes(".")){
      if(next.split(".")[1].length>2) return;   // cap at 2 decimal places
    } else {
      next=next.replace(/^0+(?=\d)/,"");          // trim leading zeros (keep one)
    }
    if(next.replace(".","").length>13) return;    // overall digit cap
    a=next;
  }
  padState.amt=a; updateAmt();
}
function updateDateChip(){ const lbl=$("padDateLbl"); if(lbl) lbl.textContent= padState.date===todayISO()?"Today":shortDate(padState.date); }
function updateCatChip(){ const lbl=$("padCatLbl"); const has=padState.catId||padState.catName; if(lbl) lbl.textContent= has? padState.catName:"Category"; $("padCat").classList.toggle("set",!!has); }
function updatePhotoChip(){ const lbl=$("padPhotoLbl"); if(lbl) lbl.textContent= padState.photo?"Photo ✓":"Photo"; $("padPhoto").classList.toggle("set",!!padState.photo); }
function renderQuick(){
  const host=$("padQuick"); if(!host) return;
  const cats=catsForType(padState.type).slice(0,8);
  host.innerHTML=cats.map(c=>`<button class="chip ${padState.catId===c.id?(padState.type==='IN'?'in on':'out on'):''}" data-cat="${c.id}">${esc(c.name)}</button>`).join("");
  $$("#padQuick [data-cat]").forEach(b=>b.onclick=()=>{ const c=state.cache.cats.find(x=>x.id===b.dataset.cat);
    if(padState.catId===c.id){ padState.catId=null; padState.catName=""; } else { padState.catId=c.id; padState.catName=c.name; }
    updateCatChip(); renderQuick(); });
}

async function savePad(){

    note:p.note.trim(),ref:p.ref.trim(),photo:p.photo};

}

      <button class="mitem" data-m="cats"><span class="mi">🏷</span>Categories<span class="marrow">›</span></button>
      <button class="mitem" data-m="csv"><span class="mi">⤓</span><span style="flex:1">Export CSV<span class="msub" style="display:block">Current book &amp; filters</span></span></button>
      <button class="mitem" data-m="pdf"><span class="mi">🧾</span><span style="flex:1">Save PDF statement<span class="msub" style="display:block">Print → Save as PDF</span></span></button>
      <button class="mitem" data-m="backup"><span class="mi">💾</span><span style="flex:1">Backup all data<span class="msub" style="display:block">Download a .json file</span></span></button>
      <button class="mitem" data-m="restore"><span class="mi">↥</span>Restore from backup<span class="marrow">›</span></button>
      <button class="mitem" data-m="theme"><span class="mi">${dark?'☀️':'🌙'}</span>${dark?'Light theme':'Dark theme'}</button>
      <button class="mitem" data-m="about"><span class="mi">ℹ️</span>About</button>
    </div>`,"");
  const act={
    transfer:()=>openTransfer(), cats:()=>openCategories(),
    csv:()=>{closeSheet();exportCsv();}, pdf:()=>{closeSheet();printStatement();},
    backup:()=>{closeSheet();doBackup();}, restore:()=>{closeSheet();$("restoreInput").click();},
    theme:()=>{closeSheet();toggleTheme();}, about:()=>openAbout()
  };
  $$("[data-m]").forEach(b=>b.onclick=()=>act[b.dataset.m]());
}
function openAbout(){
  openSheet("About",
    `<p style="color:var(--ink-2);line-height:1.6;font-size:14px">A private, offline cashbook for daily cash in and cash out. Everything is stored on this device only — no account, no internet needed.</p>
     <p style="color:var(--ink-3);font-size:13px;margin-top:12px">Tip: use <b>Backup all data</b> regularly and keep the file safe. Reinstalling or clearing the browser will erase the ledger otherwise.</p>
     <p style="color:var(--ink-3);font-size:12px;margin-top:14px">Cashbook · stored with IndexedDB</p>`,"");
}
function toggleTheme(){
  const root=document.documentElement; const dark=root.getAttribute("data-theme")==="dark";
  root.setAttribute("data-theme",dark?"light":"dark"); metaSet("theme",dark?"light":"dark");
  document.querySelector('meta[name=theme-color]').setAttribute("content", dark? "#c2811b":"#0d0f13");
}

/* ============================================================ BACKUP / RESTORE */
function downloadFile(name,content,mime){
  const blob=new Blob([content],{type:mime}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=name; document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},800);
}
async function doBackup(){
  const data={app:"cashbook",version:1,exported_at:nowISO(),
    cashbooks:await getAll("cashbooks"), entries:await getAll("entries"), categories:await getAll("categories"), meta:await getAll("meta")};
  const d=new Date(); const stamp=d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0")+"-"+String(d.getHours()).padStart(2,"0")+String(d.getMinutes()).padStart(2,"0");
  downloadFile("cashbook-backup-"+stamp+".json", JSON.stringify(data), "application/json");
  toast("Backup downloaded");
}
$("restoreInput").addEventListener("change",async (e)=>{
  const f=e.target.files&&e.target.files[0]; if(!f) return;
  let data; try{ data=JSON.parse(await f.text()); }catch(_){ toast("Invalid backup file"); return; }
  if(!data||!Array.isArray(data.cashbooks)){ toast("Unrecognised backup"); return; }
  if(!await confirmDialog("Restore backup?","This replaces ALL current data on this device with the backup. This cannot be undone.",{ok:"Replace all",danger:true})){ e.target.value=""; return; }
  try{
    await new Promise((res,rej)=>{ const t=_db.transaction(["cashbooks","entries","categories","meta"],"readwrite");
      t.oncomplete=res; t.onerror=()=>rej(t.error);
      ["cashbooks","entries","categories","meta"].forEach(s=>t.objectStore(s).clear());
      (data.cashbooks||[]).forEach(o=>t.objectStore("cashbooks").put(o));
      (data.entries||[]).forEach(o=>t.objectStore("entries").put(o));
      (data.categories||[]).forEach(o=>t.objectStore("categories").put(o));
      (data.meta||[]).forEach(o=>t.objectStore("meta").put(o));
    });
    state.bookId=await metaGet("lastBook",null); state.filter={q:"",type:"ALL",cat:"ALL",period:"ALL",from:"",to:""};
    toast("Backup restored"); render();
  }catch(err){ toast("Restore failed"); }
  e.target.value="";
});

/* ============================================================ CSV + PDF */
function csvCell(v){ v=String(v==null?"":v); return /[",\n]/.test(v)? '"'+v.replace(/"/g,'""')+'"' : v; }
function exportCsv(){
  const {book,entries,runMap}=state.cache; if(!book){ toast("No book"); return; }
  const vis=sortChrono(filterEntries(entries,state.filter));
  const head=["Date","Time","Type","Category","Note","Reference","Amount","Balance"];
  const lines=[head.join(",")];
  for(const e of vis){
    lines.push([csvCell(e.date),csvCell(entryTime(e.created_at)),e.type==="IN"?"Cash In":"Cash Out",
      csvCell(e.category_name||""),csvCell(e.note||""),csvCell(e.ref||""),
      (e.type==="IN"?"":"-")+fmtMinor(e.amount_minor).replace(/,/g,""),
      fmtMinor(runMap[e.id]).replace(/,/g,"")].join(","));
  }
  downloadFile((book.name||"cashbook").replace(/[^a-z0-9]+/gi,"_")+".csv","\ufeff"+lines.join("\n"),"text/csv");
  toast("CSV exported");
}
function printStatement(){
  const {book,entries,runMap}=state.cache; if(!book){ toast("No book"); return; }
  const vis=sortChrono(filterEntries(entries,state.filter));
  const tot=sumTotals(vis); const bal=bookBalance(book,entries);
  const rows=vis.map(e=>`<tr><td>${esc(shortDate(e.date))}</td><td>${e.type==="IN"?"In":"Out"}</td><td>${esc(e.category_name||"")}</td><td>${esc(e.note||"")}</td><td class="r">${e.type==="IN"?"+":"−"} ${fmtMinor(e.amount_minor)}</td><td class="r">${fmtMinor(runMap[e.id])}</td></tr>`).join("");
  $("printArea").innerHTML=`
    <div class="pa-h"><div><h1>${esc(book.name)}</h1><div style="font-size:12px;color:#555">Cash statement</div></div>
      <div class="pa-meta">Generated ${shortDate(todayISO())}<br>Opening ₨ ${fmtMinor(book.opening_balance_minor||0)}</div></div>
    <div class="pa-sum"><div>Cash in<b>₨ ${fmtMinor(tot.inMinor)}</b></div><div>Cash out<b>₨ ${fmtMinor(tot.outMinor)}</b></div><div>Balance<b>₨ ${fmtMinor(bal)}</b></div></div>
    <table class="pa-t"><thead><tr><th>Date</th><th>Type</th><th>Category</th><th>Note</th><th class="r">Amount</th><th class="r">Balance</th></tr></thead><tbody>${rows||'<tr><td colspan="6">No entries</td></tr>'}</tbody></table>`;
  setTimeout(()=>window.print(),60);
}

/* ============================================================ REPORTS */
function periodEntries(entries,period){
  if(period==="ALL") return entries.slice();
  const t=todayISO(); const ym=t.slice(0,7);
  if(period==="MONTH") return entries.filter(e=>e.date.slice(0,7)===ym);
  if(period==="YEAR") return entries.filter(e=>e.date.slice(0,4)===t.slice(0,4));
  if(period==="LAST"){ const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-1); const lm=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); return entries.filter(e=>e.date.slice(0,7)===lm); }
  return entries.slice();
}
async function renderReports(){
  const r=state.rep;
  const source = r.scope==="all"? await allEntries() : state.cache.entries;
  const scoped = periodEntries(source,r.period);
  const tot=sumTotals(scoped);
  // last 6 months chart from source
  const months=[]; const d=new Date(); d.setDate(1);
  for(let i=5;i>=0;i--){ const m=new Date(d.getFullYear(),d.getMonth()-i,1); months.push({key:m.getFullYear()+"-"+String(m.getMonth()+1).padStart(2,"0"),lbl:MON[m.getMonth()]}); }
  const mdata=months.map(m=>{ const es=source.filter(e=>e.date.slice(0,7)===m.key); const s=sumTotals(es); return {...m,...s}; });
  const maxM=Math.max(1,...mdata.map(m=>Math.max(m.inMinor,m.outMinor)));
  // category breakdown by mode
  const map={}; for(const e of scoped){ if(e.type!==r.mode) continue; const k=e.category_name||"Uncategorized"; map[k]=(map[k]||0)+e.amount_minor; }
  const brk=Object.entries(map).map(([n,v])=>({n,v})).sort((a,b)=>b.v-a.v).slice(0,8);
  const maxB=Math.max(1,...brk.map(b=>b.v));
  const periodLbl={MONTH:"This month",LAST:"Last month",YEAR:"This year",ALL:"All time"}[r.period];

  $("screen").innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;padding:calc(8px + env(safe-area-inset-top)) 0 12px">
      <button class="iconbtn" id="repBack" aria-label="Back">‹</button>
      <h1 style="font-size:20px">Reports</h1>
    </div>
    <div class="seg rep-seg" id="repScope">
      <button data-s="book" class="${r.scope==='book'?'on':''}">This book</button>
      <button data-s="all" class="${r.scope==='all'?'on':''}">All books</button>
    </div>
    <div class="seg rep-seg" id="repPeriod">
      ${[["MONTH","Month"],["LAST","Last m."],["YEAR","Year"],["ALL","All"]].map(([k,l])=>`<button data-p="${k}" class="${r.period===k?'on':''}">${l}</button>`).join("")}
    </div>
    <div class="netcard"><div class="nk">Net · ${esc(periodLbl)}</div><div class="nv ${tot.net<0?'neg':'pos'} num">${tot.net>=0?'+':'−'} ₨ ${fmtMinor(tot.net)}</div></div>
    <div class="statrow">
      <div class="stat in"><div class="sk"><span class="dotin"></span>Cash in</div><div class="sv num">${fmtMinor(tot.inMinor)}</div></div>
      <div class="stat out"><div class="sk"><span class="dotout"></span>Cash out</div><div class="sv num">${fmtMinor(tot.outMinor)}</div></div>
    </div>
    <div class="card"><h3>Last 6 months</h3>
      <div class="chart">${mdata.map(m=>`<div class="cbar"><div class="bars">
        <div class="bb in" style="height:${Math.round(m.inMinor/maxM*120)}px" title="In ${fmtMinor(m.inMinor)}"></div>
        <div class="bb out" style="height:${Math.round(m.outMinor/maxM*120)}px" title="Out ${fmtMinor(m.outMinor)}"></div>
      </div><div class="bl">${m.lbl}</div></div>`).join("")}</div>
    </div>
    <div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3 style="margin:0">By category</h3>
      <div class="seg" id="repMode" style="width:auto"><button data-m="OUT" class="out ${r.mode==='OUT'?'on':''}" style="padding:6px 12px">Out</button><button data-m="IN" class="in ${r.mode==='IN'?'on':''}" style="padding:6px 12px">In</button></div></div>
      <div class="brk">${brk.length?brk.map(b=>`<div class="brkrow"><div class="bt"><span class="bn">${esc(b.n)}</span><span class="ba">₨ ${fmtMinor(b.v)}</span></div><div class="track"><div class="fillb" style="width:${Math.round(b.v/maxB*100)}%;background:var(--${r.mode==='IN'?'in':'out'})"></div></div></div>`).join(""):'<p style="color:var(--ink-3);margin:0">No '+(r.mode==='IN'?'cash in':'cash out')+' in this period.</p>'}</div>
    </div>`;
  $("repBack").onclick=()=>{ state.view="home"; render(); };
  $$("#repScope [data-s]").forEach(b=>b.onclick=()=>{ state.rep.scope=b.dataset.s; renderReports(); });
  $$("#repPeriod [data-p]").forEach(b=>b.onclick=()=>{ state.rep.period=b.dataset.p; renderReports(); });
  $$("#repMode [data-m]").forEach(b=>b.onclick=()=>{ state.rep.mode=b.dataset.m; renderReports(); });
}

/* ============================================================ boot */
async function boot(){
  await openDB();
  const theme=await metaGet("theme","light");
  document.documentElement.setAttribute("data-theme",theme);
  document.querySelector('meta[name=theme-color]').setAttribute("content", theme==="dark"?"#0d0f13":"#c2811b");
  state.bookId=await metaGet("lastBook",null);
  $("bookBtn").onclick=openBookSheet;
  $("reportsBtn").onclick=()=>{ state.view="reports"; render(); };
  $("menuBtn").onclick=openMenu;
  $("addBtn").onclick=openNewEntry;
  $("sheetX").onclick=closeSheet;
  $("scrim").onclick=()=>{ closeSheet(); };
  $("lightX").onclick=closeLight;
  $("lightbox").onclick=(e)=>{ if(e.target.id==="lightbox") closeLight(); };
  window.addEventListener("scroll",()=>{ $("topbar").classList.toggle("scrolled",window.scrollY>4); },{passive:true});
  await render();
  if("serviceWorker" in navigator){ try{ await navigator.serviceWorker.register("sw.js"); }catch(_){} }
}
boot();
</script>
