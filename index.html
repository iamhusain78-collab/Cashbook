<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f1828">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Cashbook</title>
<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root{
  --ink:#0f1828;          /* deep slate — the signature surface */
  --ink-2:#16223a;
  --ink-soft:#243453;
  --paper:#f5f6f8;        /* calm cool paper background */
  --surface:#ffffff;
  --surface-2:#fbfbfc;
  --line:#e8eaef;         /* hairline */
  --line-strong:#d7dbe3;
  --t1:#0e1422;           /* primary text */
  --t2:#5b6576;           /* secondary */
  --t3:#959dab;           /* muted */
  --on-ink:#eef2f8;
  --on-ink-2:#9fb0c9;
  --in:#0f7a52;           /* cash in — reserved */
  --in-bg:#e7f4ee;
  --in-ink:#7fe3b6;
  --out:#cc3340;          /* cash out — reserved */
  --out-bg:#fcebec;
  --out-ink:#ff9aa2;
  --gold:#c9a24a;         /* warm accent — snackbar action, stat pip */
  --radius:18px;
  --radius-sm:12px;
  --radius-lg:26px;
  --shadow-sm:0 1px 2px rgba(16,24,40,.05),0 1px 3px rgba(16,24,40,.04);
  --shadow-md:0 6px 16px rgba(16,24,40,.08),0 2px 6px rgba(16,24,40,.05);
  --shadow-lg:0 20px 48px rgba(15,24,40,.22);
  --ease:cubic-bezier(.22,.61,.36,1);
  --ease-back:cubic-bezier(.34,1.56,.64,1);
  --mono:ui-monospace,"Roboto Mono","SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",system-ui,sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
  --nav-h:64px;
}
:root{--gold:#c9a24a;}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:var(--sans);
  background:var(--paper);
  color:var(--t1);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow:hidden;
  overscroll-behavior:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;font-size:16px;color:inherit;}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
::selection{background:var(--ink);color:#fff;}

/* ============================================================
   APP SHELL
   ============================================================ */
.app-shell{
  position:fixed;inset:0;display:flex;flex-direction:column;
  max-width:560px;margin:0 auto;background:var(--paper);
}
.view-port{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--nav-h) + var(--safe-b) + 16px);scroll-behavior:smooth;}
.view{display:none;animation:viewIn .34s var(--ease);}
.view.active{display:block;}
@keyframes viewIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* top bar */
.topbar{
  position:sticky;top:0;z-index:30;padding-top:var(--safe-t);
  background:linear-gradient(var(--paper) 78%, rgba(245,246,248,0));
  display:flex;align-items:center;gap:10px;padding-left:18px;padding-right:14px;
  height:calc(58px + var(--safe-t));
}
.topbar h1{font-size:22px;font-weight:740;letter-spacing:-.02em;margin:0;}
.topbar .sub{font-size:12.5px;color:var(--t3);font-weight:560;margin-top:1px;}
.topbar .spacer{flex:1;}
.icon-btn{
  width:42px;height:42px;border-radius:13px;display:grid;place-items:center;
  background:var(--surface);box-shadow:var(--shadow-sm);color:var(--t1);
  transition:transform .15s var(--ease),background .2s;
}
.icon-btn:active{transform:scale(.9);background:var(--surface-2);}
.icon-btn svg{width:21px;height:21px;}
.icon-btn .dot{position:absolute;top:9px;right:9px;width:8px;height:8px;border-radius:50%;
  background:var(--out);border:2px solid var(--surface);}

.page{padding:4px 18px 0;}

/* ============================================================
   BALANCE HERO — the signature element
   ============================================================ */
.hero{
  position:relative;border-radius:var(--radius-lg);overflow:hidden;
  background:radial-gradient(120% 140% at 84% -10%,#22335a 0%,var(--ink-2) 42%,var(--ink) 100%);
  color:var(--on-ink);padding:22px 22px 20px;box-shadow:var(--shadow-md);
  margin-top:2px;
}
.hero .glow{position:absolute;top:-60px;right:-40px;width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,162,74,.22),transparent 65%);pointer-events:none;}
.hero .label{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--on-ink-2);font-weight:640;}
.hero .bal{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:42px;font-weight:680;
  line-height:1.05;margin-top:8px;letter-spacing:-.02em;display:flex;align-items:baseline;gap:6px;}
.hero .bal .sign{font-size:26px;opacity:.7;}
.hero .bal.neg{color:#ffc7cb;}
.hero .scope{font-size:12.5px;color:var(--on-ink-2);margin-top:7px;font-weight:540;}
.hero .split{display:flex;gap:10px;margin-top:18px;position:relative;z-index:1;}
.hero .split .cell{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.07);
  border-radius:14px;padding:11px 13px;}
.hero .split .cap{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--on-ink-2);font-weight:600;
  display:flex;align-items:center;gap:6px;}
.hero .split .cap i{width:7px;height:7px;border-radius:50%;display:inline-block;}
.hero .split .v{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:18px;font-weight:620;margin-top:5px;}
.tin{color:var(--in-ink);} .tout{color:var(--out-ink);}
.din{background:var(--in-ink);} .dout{background:var(--out-ink);}

/* mini sparkbar inside hero */
.flowbar{height:7px;border-radius:6px;overflow:hidden;display:flex;background:rgba(255,255,255,.08);margin-top:16px;position:relative;z-index:1;}
.flowbar .seg-in{background:linear-gradient(90deg,#1aa06a,#2ec98a);}
.flowbar .seg-out{background:linear-gradient(90deg,#e0545f,#ff7b85);}

/* ============================================================
   SECTION + CARDS
   ============================================================ */
.section-h{display:flex;align-items:center;justify-content:space-between;margin:24px 2px 12px;}
.section-h h2{font-size:16px;font-weight:700;letter-spacing:-.01em;margin:0;}
.section-h .link{font-size:13px;font-weight:620;color:var(--t2);padding:6px 8px;border-radius:9px;}
.section-h .link:active{background:var(--line);}

.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.stat{background:var(--surface);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow-sm);}
.stat .k{font-size:12px;color:var(--t3);font-weight:600;display:flex;align-items:center;gap:7px;}
.stat .k .pip{width:9px;height:9px;border-radius:3px;}
.stat .v{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:22px;font-weight:640;margin-top:7px;letter-spacing:-.01em;}
.stat.in .v{color:var(--in);} .stat.out .v{color:var(--out);}

.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;}

/* book chips on dashboard */
.book-rail{display:flex;gap:11px;overflow-x:auto;padding:2px 18px 4px;margin:0 -18px;scrollbar-width:none;}
.book-rail::-webkit-scrollbar{display:none;}
.book-chip{flex:0 0 auto;min-width:150px;background:var(--surface);border-radius:var(--radius);padding:14px 15px;
  box-shadow:var(--shadow-sm);border:1px solid var(--line);transition:transform .15s var(--ease);}
.book-chip:active{transform:scale(.97);}
.book-chip .top{display:flex;align-items:center;gap:9px;}
.book-chip .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:16px;}
.book-chip .nm{font-size:13.5px;font-weight:660;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.book-chip .bal{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:20px;font-weight:640;margin-top:11px;}
.book-chip .meta{font-size:11.5px;color:var(--t3);margin-top:3px;font-weight:540;}

/* ============================================================
   ENTRY LIST
   ============================================================ */
.day-group{margin-top:4px;}
.day-head{display:flex;align-items:center;justify-content:space-between;padding:16px 4px 8px;position:sticky;top:0;z-index:5;
  background:linear-gradient(var(--paper) 70%,rgba(245,246,248,.4));}
.day-head .d{font-size:12.5px;font-weight:680;color:var(--t2);letter-spacing:.01em;}
.day-head .s{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:12.5px;font-weight:600;color:var(--t3);}

.entry{display:flex;align-items:center;gap:13px;padding:13px 15px;background:var(--surface);
  position:relative;user-select:none;transition:background .15s;}
.entry:not(:last-child){border-bottom:1px solid var(--line);}
.entry:active{background:var(--surface-2);}
.entry .ic{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;font-size:19px;flex:0 0 auto;}
.entry .body{flex:1;min-width:0;}
.entry .cat{font-size:15px;font-weight:660;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.entry .note{font-size:12.5px;color:var(--t3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:540;}
.entry .amt{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:16px;font-weight:640;flex:0 0 auto;white-space:nowrap;}
.entry .amt.in{color:var(--in);} .entry .amt.out{color:var(--out);}
.entry .check{width:24px;height:24px;border-radius:8px;border:2px solid var(--line-strong);flex:0 0 auto;
  display:grid;place-items:center;transition:all .18s var(--ease-back);}
.entry.sel .check{background:var(--ink);border-color:var(--ink);}
.entry.sel{background:#eef2fa;}
.entry .check svg{width:14px;height:14px;color:#fff;opacity:0;transform:scale(.5);transition:.18s var(--ease-back);}
.entry.sel .check svg{opacity:1;transform:none;}
.select-mode .entry .arrowdot{display:none;}

/* swipe layer */
.swipe-wrap{position:relative;overflow:hidden;}
.swipe-wrap:not(:last-child){border-bottom:1px solid var(--line);}
.swipe-actions{position:absolute;inset:0;display:flex;justify-content:flex-end;}
.swipe-actions .sa{width:74px;display:grid;place-items:center;color:#fff;font-size:12px;font-weight:640;gap:4px;}
.swipe-actions .sa svg{width:20px;height:20px;}
.sa.edit{background:#3a4a6b;} .sa.del{background:var(--out);}
.swipe-wrap .entry{transition:transform .26s var(--ease);will-change:transform;}

/* ============================================================
   EMPTY STATES
   ============================================================ */
.empty{text-align:center;padding:46px 30px;}
.empty .art{width:84px;height:84px;border-radius:24px;margin:0 auto 18px;display:grid;place-items:center;
  background:linear-gradient(145deg,#eef1f6,#fff);box-shadow:var(--shadow-sm);color:var(--ink-soft);}
.empty .art svg{width:38px;height:38px;}
.empty h3{font-size:17px;font-weight:700;margin:0 0 6px;}
.empty p{font-size:14px;color:var(--t2);margin:0 auto;max-width:260px;line-height:1.5;}
.empty .cta{margin-top:18px;display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:#fff;
  font-weight:640;font-size:14px;padding:12px 20px;border-radius:14px;box-shadow:var(--shadow-md);}
.empty .cta:active{transform:scale(.96);}

/* ============================================================
   BOTTOM NAV + FAB
   ============================================================ */
.nav{position:fixed;bottom:0;left:0;right:0;max-width:560px;margin:0 auto;z-index:40;
  height:calc(var(--nav-h) + var(--safe-b));padding-bottom:var(--safe-b);
  background:rgba(255,255,255,.86);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);
  border-top:1px solid var(--line);display:flex;align-items:stretch;}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--t3);font-size:10.5px;font-weight:620;transition:color .2s;position:relative;}
.nav button svg{width:23px;height:23px;transition:transform .25s var(--ease-back);}
.nav button.on{color:var(--ink);}
.nav button.on svg{transform:translateY(-1px);}
.nav button.on::before{content:"";position:absolute;top:8px;width:34px;height:30px;border-radius:10px;
  background:#eef2fa;z-index:-1;animation:navpop .3s var(--ease-back);}
@keyframes navpop{from{transform:scale(.6);opacity:0}to{transform:none;opacity:1}}
.nav .fabslot{flex:0 0 66px;}

.fab{position:fixed;bottom:calc(var(--safe-b) + 6px);left:50%;transform:translateX(-50%);
  width:52px;height:52px;border-radius:17px;z-index:45;
  background:linear-gradient(160deg,#1c2c4b,var(--ink));color:#fff;display:grid;place-items:center;
  box-shadow:0 6px 16px rgba(15,24,40,.34),0 2px 6px rgba(15,24,40,.26);
  transition:transform .2s var(--ease-back);}
.fab svg{width:26px;height:26px;}
.fab:active{transform:translateX(-50%) scale(.9) rotate(90deg);}

/* ============================================================
   SHEETS / MODALS
   ============================================================ */
.scrim{position:fixed;inset:0;background:rgba(13,20,34,.42);z-index:60;opacity:0;pointer-events:none;
  transition:opacity .3s var(--ease);backdrop-filter:blur(2px);}
.scrim.show{opacity:1;pointer-events:auto;}
.sheet{position:fixed;left:0;right:0;bottom:0;max-width:560px;margin:0 auto;z-index:61;
  background:var(--surface);border-radius:26px 26px 0 0;box-shadow:var(--shadow-lg);
  transform:translateY(101%);transition:transform .38s var(--ease);
  max-height:94vh;display:flex;flex-direction:column;padding-bottom:var(--safe-b);}
.sheet.show{transform:none;}
.sheet .grip{width:38px;height:5px;border-radius:3px;background:var(--line-strong);margin:10px auto 4px;flex:0 0 auto;}
.sheet-head{display:flex;align-items:center;gap:12px;padding:6px 20px 12px;flex:0 0 auto;}
.sheet-head h3{font-size:18px;font-weight:720;margin:0;flex:1;letter-spacing:-.01em;}
.sheet-head .x{width:34px;height:34px;border-radius:11px;background:var(--paper);display:grid;place-items:center;color:var(--t2);}
.sheet-head .x:active{transform:scale(.9);}
#sheetInner{display:flex;flex-direction:column;flex:1 1 auto;min-height:0;}
.sheet-body{overflow-y:auto;flex:1 1 auto;min-height:0;padding:0 20px 20px;-webkit-overflow-scrolling:touch;}

.dialog{position:fixed;left:20px;right:20px;top:50%;max-width:380px;margin:0 auto;z-index:61;
  background:var(--surface);border-radius:24px;box-shadow:var(--shadow-lg);padding:24px;
  transform:translateY(-46%) scale(.94);opacity:0;pointer-events:none;transition:.3s var(--ease-back);}
.dialog.show{transform:translateY(-50%) scale(1);opacity:1;pointer-events:auto;}
.dialog h3{font-size:18px;font-weight:720;margin:0 0 8px;}
.dialog p{font-size:14.5px;color:var(--t2);line-height:1.5;margin:0 0 20px;}
.dialog .row{display:flex;gap:10px;}
.dialog .row button{flex:1;padding:13px;border-radius:13px;font-weight:660;font-size:14.5px;transition:transform .15s;}
.dialog .row button:active{transform:scale(.96);}
.btn-ghost{background:var(--paper);color:var(--t1);}
.btn-solid{background:var(--ink);color:#fff;}
.btn-danger{background:var(--out);color:#fff;}

/* ============================================================
   ENTRY EDITOR
   ============================================================ */
.type-toggle{display:flex;background:var(--paper);border-radius:15px;padding:5px;gap:5px;margin-bottom:6px;}
.type-toggle button{flex:1;padding:12px;border-radius:11px;font-weight:680;font-size:14.5px;color:var(--t2);
  transition:all .22s var(--ease);display:flex;align-items:center;justify-content:center;gap:7px;}
.type-toggle button svg{width:17px;height:17px;}
.type-toggle button.on-in{background:var(--in);color:#fff;box-shadow:0 4px 12px rgba(15,122,82,.3);}
.type-toggle button.on-out{background:var(--out);color:#fff;box-shadow:0 4px 12px rgba(204,51,64,.3);}

.amount-display{text-align:center;padding:14px 0 4px;}
.amount-display .lab{font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);font-weight:640;}
.amount-display .val{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:46px;font-weight:680;
  letter-spacing:-.02em;margin-top:4px;transition:color .25s;min-height:54px;}
.amount-display .val.in{color:var(--in);} .amount-display .val.out{color:var(--out);}
.amount-display .val.zero{color:var(--t3);}

.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:10px 0 6px;}
.key{height:54px;border-radius:15px;background:var(--paper);font-family:var(--mono);font-size:23px;font-weight:600;
  display:grid;place-items:center;transition:transform .1s,background .15s;color:var(--t1);}
.key:active{transform:scale(.93);background:var(--line);}
.key.fn{background:transparent;color:var(--t2);}
.key.fn svg{width:24px;height:24px;}

.field{margin-top:14px;}
.field .fl{font-size:12.5px;font-weight:640;color:var(--t2);margin-bottom:8px;display:block;}
.picker-btn{width:100%;display:flex;align-items:center;gap:12px;padding:13px 15px;background:var(--paper);
  border-radius:14px;font-size:15px;font-weight:560;color:var(--t1);transition:background .15s;}
.picker-btn:active{background:var(--line);}
.picker-btn .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:16px;flex:0 0 auto;}
.picker-btn .ch{margin-left:auto;color:var(--t3);}
.picker-btn input{background:none;border:none;outline:none;flex:1;width:100%;}
textarea.note-in{width:100%;background:var(--paper);border:none;border-radius:14px;padding:13px 15px;
  font-size:15px;resize:none;min-height:54px;outline:none;line-height:1.45;}
.save-bar{padding:14px 20px calc(14px + var(--safe-b));border-top:1px solid var(--line);background:var(--surface);flex:0 0 auto;}
.save-btn{width:100%;padding:16px;border-radius:16px;background:var(--ink);color:#fff;font-weight:700;font-size:16px;
  transition:transform .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.save-btn:active{transform:scale(.98);}
.save-btn.dis{opacity:.4;pointer-events:none;}

/* --- redesigned entry editor --- */
.ed-amount{text-align:center;padding:2px 0 0;}
.ed-amount .lab{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);font-weight:700;}
.ed-amount .val{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:34px;font-weight:700;
  letter-spacing:-.02em;line-height:1.05;margin-top:2px;transition:color .2s;min-height:38px;}
.ed-amount .val.in{color:var(--in);} .ed-amount .val.out{color:var(--out);} .ed-amount .val.zero{color:var(--t3);}
.ed-sec{font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--t3);margin:12px 2px 8px;}
.cat-row{display:flex;gap:8px;overflow-x:auto;padding:1px 0 3px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.cat-row::-webkit-scrollbar{display:none;}
.cat-pick{flex:0 0 auto;display:inline-flex;align-items:center;gap:7px;padding:9px 13px;border-radius:13px;
  background:var(--paper);font-size:14px;font-weight:600;color:var(--t1);border:1.6px solid transparent;
  white-space:nowrap;transition:transform .12s;}
.cat-pick:active{transform:scale(.94);}
.cat-pick .e{font-size:15px;}
.cat-pick.add{color:var(--t2);font-weight:560;}
.meta-row{display:flex;gap:10px;margin-top:8px;}
.meta-pill{flex:1;min-width:0;display:flex;align-items:center;gap:9px;padding:10px 13px;background:var(--paper);
  border-radius:13px;font-size:13.5px;font-weight:580;color:var(--t1);transition:background .15s;}
.meta-pill:active{background:var(--line);}
.meta-pill .e{font-size:15px;flex:0 0 auto;}
.meta-pill .tx{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.meta-pill .k{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);font-weight:700;display:block;margin-bottom:1px;}
.note-toggle{display:inline-flex;align-items:center;gap:7px;margin-top:10px;padding:9px 13px;border-radius:12px;
  background:var(--paper);font-size:13.5px;font-weight:600;color:var(--t2);}
.note-toggle svg{width:16px;height:16px;}
.ed-amount{text-align:center;padding:8px 0 6px;cursor:text;}
.amt-wrap{position:relative;display:inline-block;min-width:60%;}
.amt-hidden{position:absolute;inset:0;width:100%;height:100%;opacity:0;border:none;background:none;
  text-align:center;font-size:16px;color:transparent;caret-color:transparent;}
.amt-hint{font-size:12px;color:var(--t3);font-weight:540;margin-top:6px;min-height:15px;}
.field-row{display:flex;align-items:center;width:100%;gap:10px;margin-top:10px;padding:13px 15px;border-radius:14px;
  background:var(--paper);border:1.5px solid var(--line);text-align:left;transition:background .15s;}
.field-row:active{background:var(--line);}
.field-row .fr-v{flex:1;min-width:0;font-size:15px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:9px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.field-row .fr-ph{color:var(--t3);font-weight:540;}
.field-row .fr-ic{flex:0 0 auto;color:var(--t3);display:flex;}
.field-row .fr-ic svg{width:20px;height:20px;}
.fr-emoji{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:16px;flex:0 0 auto;background:var(--line);}
.field-input{display:block;width:100%;margin-top:10px;padding:14px 15px;border-radius:14px;background:var(--paper);
  border:1.5px solid var(--line);font-size:15.5px;font-weight:560;color:var(--t1);}
.field-input::placeholder{color:var(--t3);font-weight:500;}
.field-input:focus{border-color:var(--ink-soft);background:var(--surface);outline:none;}
.field-input.err{border-color:var(--out);}
.ed-lbl{font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--t3);margin:16px 2px 0;}
.ed-lbl .req{color:var(--out);}
.note-row{width:100%;margin-top:9px;padding:14px 15px;border-radius:14px;background:var(--paper);
  border:1.5px solid var(--line);font-size:15.5px;font-weight:560;color:var(--t1);line-height:1.3;}
.note-row::placeholder{color:var(--t3);font-weight:500;}
.note-row:focus{border-color:var(--ink-soft);background:var(--surface);outline:none;}

/* chips for category/date pick */
.chip-grid{display:flex;flex-wrap:wrap;gap:9px;}
.opt-chip{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:13px;background:var(--paper);
  font-size:14px;font-weight:580;transition:all .15s;border:1.5px solid transparent;}
.opt-chip:active{transform:scale(.95);}
.opt-chip.on{border-color:var(--ink);background:#eef2fa;font-weight:660;}
.opt-chip .ic{font-size:16px;}

.date-quick{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:14px;}
.date-quick::-webkit-scrollbar{display:none;}
.date-quick .opt-chip{flex:0 0 auto;}

/* ============================================================
   ANALYTICS
   ============================================================ */
.seg{display:flex;background:var(--surface);border-radius:13px;padding:4px;gap:4px;box-shadow:var(--shadow-sm);margin-bottom:4px;}
.seg button{flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:620;color:var(--t2);transition:.2s;}
.seg button.on{background:var(--ink);color:#fff;}

.chart-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:18px;margin-top:14px;}
.chart-card h3{font-size:15px;font-weight:700;margin:0 0 2px;}
.chart-card .cc-sub{font-size:12.5px;color:var(--t3);margin-bottom:14px;font-weight:540;}
.donut-wrap{display:flex;align-items:center;gap:18px;}
.donut-center{font-family:var(--mono);font-variant-numeric:tabular-nums;}
.legend{flex:1;display:flex;flex-direction:column;gap:9px;min-width:0;}
.legend .li{display:flex;align-items:center;gap:9px;font-size:13px;}
.legend .li .sw{width:11px;height:11px;border-radius:4px;flex:0 0 auto;}
.legend .li .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:560;}
.legend .li .vv{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:620;font-size:12.5px;}
.legend .li .pc{font-size:11px;color:var(--t3);width:34px;text-align:right;}

.cat-bars{display:flex;flex-direction:column;gap:13px;}
.cat-bar .top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
.cat-bar .top .nm{font-weight:580;display:flex;gap:7px;align-items:center;}
.cat-bar .top .vv{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:620;}
.cat-bar .track{height:9px;border-radius:6px;background:var(--paper);overflow:hidden;}
.cat-bar .fill{height:100%;border-radius:6px;transition:width .6s var(--ease);}

svg.chart{width:100%;display:block;overflow:visible;}
.bar-rect{transition:height .5s var(--ease),y .5s var(--ease);}

/* analytics */
.an-period{display:flex;gap:8px;overflow-x:auto;margin-top:12px;padding-bottom:3px;scrollbar-width:none;}
.an-period::-webkit-scrollbar{display:none;}
.an-period button{flex:0 0 auto;padding:9px 14px;border-radius:11px;background:var(--surface);font-size:13px;
  font-weight:600;color:var(--t2);box-shadow:var(--shadow-sm);transition:transform .12s;}
.an-period button:active{transform:scale(.94);}
.an-period button.on{background:var(--ink);color:#fff;}
.an-summary{margin-top:14px;background:radial-gradient(120% 140% at 84% -10%,#22335a 0%,var(--ink-2) 42%,var(--ink) 100%);
  color:var(--on-ink);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-md);}
.an-summary .k{font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--on-ink-2);font-weight:640;}
.an-summary .net{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:33px;font-weight:680;
  margin-top:6px;letter-spacing:-.02em;display:flex;align-items:baseline;gap:6px;}
.an-summary .net.neg{color:#ffc7cb;}
.an-summary .rate{font-size:12.5px;color:var(--on-ink-2);margin-top:6px;font-weight:540;}
.an-io{display:flex;gap:10px;margin-top:16px;}
.an-io .io{flex:1;min-width:0;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.07);
  border-radius:13px;padding:11px 12px;display:flex;align-items:center;gap:10px;}
.an-io .ico{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-weight:800;font-size:15px;flex:0 0 auto;}
.an-io .io.in .ico{background:rgba(46,201,138,.16);color:var(--in-ink);}
.an-io .io.out .ico{background:rgba(255,123,133,.16);color:var(--out-ink);}
.an-io .kk{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--on-ink-2);font-weight:640;}
.an-io .vv{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:16px;font-weight:660;margin-top:2px;}
.an-io .io.in .vv{color:var(--in-ink);} .an-io .io.out .vv{color:var(--out-ink);}
.insights{display:flex;flex-direction:column;gap:1px;background:var(--line);border-radius:var(--radius);overflow:hidden;margin-top:14px;}
.insight{background:var(--surface);padding:13px 15px;display:flex;align-items:center;gap:12px;}
.insight .ii{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:16px;flex:0 0 auto;}
.insight .it{flex:1;min-width:0;}
.insight .it .l{font-size:11.5px;color:var(--t3);font-weight:580;}
.insight .it .b{font-size:14.5px;font-weight:640;color:var(--t1);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.insight .iv{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:14.5px;font-weight:680;flex:0 0 auto;}

/* ============================================================
   SEARCH + FILTER
   ============================================================ */
.search-box{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:15px;padding:0 14px;
  box-shadow:var(--shadow-sm);height:48px;margin-top:2px;}
.search-box svg{width:20px;height:20px;color:var(--t3);flex:0 0 auto;}
.search-box input{flex:1;border:none;background:none;outline:none;font-size:15.5px;height:100%;}
.search-box .clr{color:var(--t3);font-size:13px;padding:6px;}

.filter-pill{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:12px;background:var(--surface);
  box-shadow:var(--shadow-sm);font-size:13px;font-weight:620;transition:.15s;white-space:nowrap;}
.filter-pill svg{width:16px;height:16px;}
.filter-pill.act{background:var(--ink);color:#fff;}
.filter-pill .badge{background:var(--out);color:#fff;border-radius:8px;font-size:10px;padding:1px 5px;font-weight:700;}
.filter-rail{display:flex;gap:9px;overflow-x:auto;padding:12px 18px;margin:0 -18px;scrollbar-width:none;}
.filter-rail::-webkit-scrollbar{display:none;}

.range-row{display:flex;gap:10px;align-items:center;}
.range-row input{flex:1;background:var(--paper);border:none;border-radius:13px;padding:13px 14px;outline:none;
  font-family:var(--mono);font-variant-numeric:tabular-nums;}
.range-row span{color:var(--t3);font-size:13px;}

/* ============================================================
   SELECTION ACTION BAR
   ============================================================ */
.selbar{position:fixed;bottom:calc(var(--safe-b) + 14px);left:14px;right:14px;max-width:532px;margin:0 auto;z-index:50;
  background:var(--ink);color:#fff;border-radius:20px;box-shadow:var(--shadow-lg);padding:9px 8px;
  display:flex;align-items:center;gap:3px;transform:translateY(140%);transition:transform .35s var(--ease-back);}
.selbar.show{transform:none;}
.selbar .cnt{font-weight:680;font-size:13px;flex:1;min-width:0;padding:0 4px;overflow:hidden;}
.selbar .cnt span{white-space:nowrap;}
.selbar .cnt small{display:block;font-size:11px;color:var(--on-ink-2);font-weight:500;white-space:nowrap;}
.selbar button{width:42px;height:44px;flex:0 0 auto;border-radius:13px;display:grid;place-items:center;color:#fff;
  transition:background .15s;}
.selbar button:active{background:rgba(255,255,255,.12);}
.selbar button svg{width:20px;height:20px;}
.selbar button.danger:active{background:rgba(204,51,64,.5);}

/* ============================================================
   SNACKBAR
   ============================================================ */
.snack{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 16px);left:16px;right:16px;max-width:528px;margin:0 auto;
  z-index:80;background:var(--ink-2);color:#fff;border-radius:15px;padding:14px 16px;display:flex;align-items:center;gap:12px;
  box-shadow:var(--shadow-lg);transform:translateY(160%);opacity:0;pointer-events:none;
  transition:transform .4s var(--ease-back),opacity .25s ease;}
.snack.show{transform:none;opacity:1;pointer-events:auto;}
.snack .msg{flex:1;font-size:14px;font-weight:540;}
.snack .act{font-weight:700;color:var(--gold);font-size:14px;padding:6px 10px;border-radius:9px;}
.snack .act:active{background:rgba(255,255,255,.1);}

/* ============================================================
   MANAGE LISTS (cashbooks / categories)
   ============================================================ */
.mlist{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;margin-top:4px;}
.mrow{display:flex;align-items:center;gap:13px;padding:14px 15px;}
.mrow:not(:last-child){border-bottom:1px solid var(--line);}
.mrow .ic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:18px;flex:0 0 auto;}
.mrow .info{flex:1;min-width:0;}
.mrow .nm{font-size:15px;font-weight:620;}
.mrow .mt{font-size:12px;color:var(--t3);margin-top:2px;font-weight:520;}
.mrow .tools{display:flex;gap:2px;}
.mrow .tool{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:var(--t2);}
.mrow .tool:active{background:var(--paper);}
.mrow .tool svg{width:18px;height:18px;}
.mrow.arch{opacity:.55;}

.addrow{display:flex;align-items:center;gap:10px;padding:15px;color:var(--ink);font-weight:660;font-size:14.5px;}
.addrow .ic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;background:#eef2fa;}

.settings-group{margin-top:14px;}
.srow{display:flex;align-items:center;gap:13px;padding:15px;background:var(--surface);transition:background .15s;}
.srow:not(:last-child){border-bottom:1px solid var(--line);}
.srow:active{background:var(--surface-2);}
.srow .ic{width:38px;height:38px;border-radius:11px;background:var(--paper);display:grid;place-items:center;color:var(--ink-soft);flex:0 0 auto;}
.srow .ic svg{width:19px;height:19px;}
.srow .info{flex:1;}
.srow .t{font-size:15px;font-weight:600;}
.srow .d{font-size:12.5px;color:var(--t3);margin-top:2px;}
.srow .ch{color:var(--t3);}

/* color / icon pick grids */
.swatch-grid{display:flex;flex-wrap:wrap;gap:11px;}
.swatch{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;transition:transform .15s var(--ease-back);}
.swatch:active{transform:scale(.88);}
.swatch.on{box-shadow:0 0 0 3px var(--surface),0 0 0 5px currentColor;}
.swatch svg{width:18px;height:18px;color:#fff;opacity:0;}
.swatch.on svg{opacity:1;}
.icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
.ipick{height:46px;border-radius:12px;background:var(--paper);display:grid;place-items:center;font-size:21px;transition:.15s;border:1.5px solid transparent;}
.ipick.on{border-color:var(--ink);background:#eef2fa;}
.ipick:active{transform:scale(.9);}
.txt-in{width:100%;background:var(--paper);border:none;border-radius:14px;padding:14px 15px;font-size:16px;outline:none;}

/* misc */
.spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--ink);border-radius:50%;
  animation:spin .8s linear infinite;margin:60px auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.fadein{animation:fade .4s var(--ease);}
@keyframes fade{from{opacity:0}to{opacity:1}}
.toggle{width:48px;height:28px;border-radius:16px;background:var(--line-strong);position:relative;transition:background .25s;flex:0 0 auto;}
.toggle.on{background:var(--in);}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;
  transition:transform .25s var(--ease-back);box-shadow:var(--shadow-sm);}
.toggle.on::after{transform:translateX(20px);}

@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;}}

/* ============================================================
   PRINT / PDF
   ============================================================ */
#printRoot{display:none;}
@media print{
  body{overflow:visible;background:#fff;}
  .app-shell,.nav,.fab,.scrim,.sheet,.snack,.selbar,.dialog{display:none!important;}
  #printRoot{display:block!important;}
  @page{margin:14mm 12mm;}
}
.pdf{font-family:var(--sans);color:#11192a;max-width:760px;margin:0 auto;}
.pdf .ph{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid var(--ink);padding-bottom:16px;}
.pdf .ph .brand{font-size:25px;font-weight:780;letter-spacing:-.02em;line-height:1.12;}
.pdf .ph .brand small{display:block;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#9aa0ab;font-weight:700;margin-bottom:7px;}
.pdf .ph .meta{text-align:right;font-size:11.5px;color:#6b7280;line-height:1.75;}
.pdf .summ{display:flex;gap:12px;margin:22px 0;}
.pdf .summ .b{flex:1;border:1px solid #e6e8ec;border-radius:14px;padding:14px 16px;background:#fafbfc;}
.pdf .summ .b .k{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:#9aa0ab;font-weight:700;}
.pdf .summ .b .v{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:20px;font-weight:680;margin-top:7px;letter-spacing:-.01em;}
.pdf .summ .b.net{background:linear-gradient(160deg,#1c2c4b,var(--ink));border-color:var(--ink);}
.pdf .summ .b.net .k{color:rgba(255,255,255,.6);}
.pdf .summ .b.net .v{color:#fff;}
.pdf table{width:100%;border-collapse:collapse;font-size:12px;}
.pdf th{text-align:left;font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:#9aa0ab;font-weight:700;
  border-bottom:1.5px solid #d8dbe0;padding:9px 8px;}
.pdf td{padding:11px 8px;border-bottom:1px solid #eef0f3;vertical-align:top;}
.pdf td .pri{font-weight:660;font-size:12.5px;}
.pdf td .sub{font-size:10px;color:#9aa0ab;margin-top:2px;}
.pdf td.dt{white-space:nowrap;color:#6b7280;font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:11px;}
.pdf td.num,.pdf th.num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums;white-space:nowrap;}
.pdf tr.in td.amt{color:#0f7a52;font-weight:680;}
.pdf tr.out td.amt{color:#cc3340;font-weight:680;}
.pdf tbody tr:nth-child(even){background:#fbfcfd;}
.pdf .pf{margin-top:22px;border-top:1px solid #e6e8ec;padding-top:12px;font-size:10px;color:#aab0ba;display:flex;justify-content:space-between;letter-spacing:.02em;}
.pdf .receipt{max-width:360px;margin:24px auto;border:1px solid #e6e8ec;border-radius:20px;overflow:hidden;}
.pdf .receipt .rh{background:linear-gradient(160deg,#1c2c4b,var(--ink));color:#fff;padding:24px;text-align:center;}
.pdf .receipt .rh .rt{font-size:10px;letter-spacing:.18em;text-transform:uppercase;opacity:.65;font-weight:700;}
.pdf .receipt .rh .ra{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:36px;font-weight:680;margin-top:8px;}
.pdf .receipt .rh .rn{font-size:13.5px;opacity:.9;margin-top:9px;font-weight:560;line-height:1.4;}
.pdf .receipt .rb{padding:18px 22px;}
.pdf .receipt .rr{display:flex;justify-content:space-between;gap:16px;padding:11px 0;border-bottom:1px dashed #e6e8ec;font-size:13px;}
.pdf .receipt .rr:last-child{border:none;}
.pdf .receipt .rr .l{color:#9aa0ab;font-weight:560;}
.pdf .receipt .rr .v{font-weight:640;text-align:right;}
</style>
</head>
<body>

<div class="app-shell">
  <div class="view-port" id="viewport">

    <section class="view active" id="view-home">
      <div class="topbar">
        <div>
          <h1 id="greet">Overview</h1>
          <div class="sub" id="greetSub">All cashbooks</div>
        </div>
        <div class="spacer"></div>
        <button class="icon-btn" style="position:relative" onclick="UI.openSearch()" aria-label="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
        </button>
        <button class="icon-btn" onclick="UI.go('more')" aria-label="More">

          <span id="bookIcon" style="font-size:18px">📒</span>
          <span style="display:flex;flex-direction:column;align-items:flex-start;line-height:1.15">
            <strong id="bookName" style="font-size:16px;font-weight:720">Personal</strong>

          </span>

        </button>
        <div class="spacer"></div>
        <button class="icon-btn" onclick="UI.openSearch()" aria-label="Search">

        <button class="icon-btn" onclick="Export.cashbookPDF(Store.activeBook, Filters.count()>0)" aria-label="Export this cashbook">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 3v12M8 7l4-4 4 4"/><path d="M5 15v4h14v-4"/></svg>
        </button>

    <section class="view" id="view-stats">
      <div class="topbar">
        <div><h1>Analytics</h1><div class="sub" id="statsScope">All cashbooks</div></div>
        <div class="spacer"></div>
        <button class="icon-btn" id="statsFilterBtn" style="position:relative" onclick="UI.openFilters()" aria-label="Filters">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 5h16M7 12h10M10 19h4"/></svg>
        </button>
      </div>
      <div class="page" id="statsContent"></div>
    </section>

    <!-- ===================== MORE ===================== -->
    <section class="view" id="view-more">
      <div class="topbar"><div><h1>More</h1><div class="sub">Manage &amp; export</div></div></div>
      <div class="page" id="moreContent"></div>
    </section>

  </div>

  <!-- NAV -->

<script>
/* ============================================================
   CASHBOOK  —  offline PWA  (single file)
   Architecture: IndexedDB store, in-memory cache, view router.
   Money: whole integers only, grouped, no symbol, no decimals.
   ============================================================ */
'use strict';

/* ---------- tiny helpers ---------- */
const $  = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const uid=()=> (crypto.randomUUID?crypto.randomUUID():'id-'+Date.now()+'-'+Math.random().toString(36).slice(2));
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function haptic(ms=8){try{navigator.vibrate&&navigator.vibrate(ms);}catch(e){}}

/* ---------- money ---------- */
const fmt = n => Math.round(n||0).toLocaleString('en-US',{maximumFractionDigits:0});
const fmtSigned = n => (n<0?'-':'')+fmt(Math.abs(n));
function parseAmount(str){const d=String(str).replace(/[^0-9]/g,'');return d?parseInt(d,10):0;}

/* ---------- dates ---------- */
const pad2 = n=>String(n).padStart(2,'0');
const ymd = d=>d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());
const today = ()=>ymd(new Date());
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function dParts(iso){const[y,m,d]=iso.split('-').map(Number);return new Date(y,m-1,d);}
function ddmmyyyy(iso){const[y,m,d]=iso.split('-');return `${d}/${m}/${y}`;}
function dateLabel(iso){
  const t=today(); const dd=dParts(iso);
  if(iso===t)return'Today';
  const y=new Date();y.setDate(y.getDate()-1);
  if(iso===ymd(y))return'Yesterday';
  const now=new Date();
  return `${dd.getDate()} ${MON[dd.getMonth()]}${dd.getFullYear()!==now.getFullYear()?' '+dd.getFullYear():''}`;
}
function dateFull(iso){const d=dParts(iso);return `${DOW[d.getDay()]}, ${d.getDate()} ${MON[d.getMonth()]} ${d.getFullYear()}`;}
function dateDoc(iso){const d=dParts(iso);return `${d.getDate()} ${MON[d.getMonth()]} ${d.getFullYear()}`;}

/* ============================================================
   DATABASE  (IndexedDB)
   ============================================================ */
const DB={
  _db:null,
  open(){
    return new Promise((res,rej)=>{
      const r=indexedDB.open('cashbook',1);
      r.onupgradeneeded=e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains('cashbooks'))db.createObjectStore('cashbooks',{keyPath:'id'});
        if(!db.objectStoreNames.contains('categories'))db.createObjectStore('categories',{keyPath:'id'});
        if(!db.objectStoreNames.contains('entries')){const s=db.createObjectStore('entries',{keyPath:'id'});s.createIndex('book','cashbookId');s.createIndex('date','date');}
        if(!db.objectStoreNames.contains('meta'))db.createObjectStore('meta',{keyPath:'k'});
      };
      r.onsuccess=e=>{this._db=e.target.result;res();};
      r.onerror=e=>rej(e.target.error);
    });
  },
  _tx(store,mode){return this._db.transaction(store,mode).objectStore(store);},
  all(store){return new Promise((res,rej)=>{const rq=this._tx(store,'readonly').getAll();rq.onsuccess=()=>res(rq.result);rq.onerror=()=>rej(rq.error);});},
  put(store,v){return new Promise((res,rej)=>{const rq=this._tx(store,'readwrite').put(v);rq.onsuccess=()=>res(v);rq.onerror=()=>rej(rq.error);});},
  del(store,id){return new Promise((res,rej)=>{const rq=this._tx(store,'readwrite').delete(id);rq.onsuccess=()=>res();rq.onerror=()=>rej(rq.error);});},
  bulkPut(store,arr){return new Promise((res,rej)=>{const tx=this._db.transaction(store,'readwrite');const os=tx.objectStore(store);arr.forEach(v=>os.put(v));tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});},
  bulkDel(store,ids){return new Promise((res,rej)=>{const tx=this._db.transaction(store,'readwrite');const os=tx.objectStore(store);ids.forEach(id=>os.delete(id));tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});},
  getMeta(k,def){return new Promise(res=>{const rq=this._tx('meta','readonly').get(k);rq.onsuccess=()=>res(rq.result?rq.result.v:def);rq.onerror=()=>res(def);});},
  setMeta(k,v){return this.put('meta',{k,v});}
};

/* ============================================================
   PALETTES
   ============================================================ */
const COLORS=['#0f7a52','#cc3340','#2f6df0','#7c4dff','#e6852b','#0aa5b1','#d4317c','#5a6b7f','#c9a24a','#3a8f3a','#9333ea','#1f2a44'];
const BOOK_ICONS=['📒','💼','🏠','💰','✈️','🛒','🚚','🏦','🎓','❤️','🍽️','🔧'];
const CAT_ICONS=['🛒','🍽️','🚗','⛽','🏠','💡','📱','🎁','💊','🎬','👕','✈️','🎓','🔧','💼','🏦','📦','💵','🤝','🪙','🚚','🧾','☕','🛠️'];

/* ============================================================
   STORE  (in-memory cache + mutations)
   ============================================================ */
const Store={
  books:[],cats:[],entries:[],activeBook:null,onboarded:false,

  async load(){
    [this.books,this.cats,this.entries]=await Promise.all([DB.all('cashbooks'),DB.all('categories'),DB.all('entries')]);
    this.onboarded=await DB.getMeta('onboarded',false);
    if(!this.books.length){await this.seed();}
    this.books.sort((a,b)=>a.order-b.order);
    this.activeBook=await DB.getMeta('activeBook',null);
    if(!this.activeBook||!this.books.find(b=>b.id===this.activeBook)){
      const first=this.books.find(b=>!b.archived)||this.books[0];this.activeBook=first?first.id:null;
    }
  },
  async seed(){
    const bid=uid();
    const book={id:bid,name:'Personal',icon:'📒',color:'#0f7a52',order:0,archived:false,createdAt:Date.now()};
    await DB.put('cashbooks',book);this.books=[book];
    this.cats=[];
    await DB.setMeta('activeBook',bid);
  },

  book(id){return this.books.find(b=>b.id===id);},
  cat(id){return this.cats.find(c=>c.id===id);},
  catName(id){const c=this.cat(id);return c?c.name:'';},

  bookEntries(bid){return this.entries.filter(e=>e.cashbookId===bid);},
  balanceOf(bid){return this.bookEntries(bid).reduce((s,e)=>s+(e.type==='in'?e.amount:-e.amount),0);},

  async saveEntry(e){
    const ex=this.entries.find(x=>x.id===e.id);
    if(ex){Object.assign(ex,e,{updatedAt:Date.now()});await DB.put('entries',ex);}
    else{e.id=e.id||uid();e.createdAt=Date.now();e.updatedAt=Date.now();this.entries.push(e);await DB.put('entries',e);}
  },
  async delEntries(ids){this.entries=this.entries.filter(e=>!ids.includes(e.id));await DB.bulkDel('entries',ids);},
  async restoreEntries(arr){this.entries.push(...arr);await DB.bulkPut('entries',arr);},

  async saveBook(b){const ex=this.book(b.id);if(ex)Object.assign(ex,b);else{b.id=b.id||uid();b.order=this.books.length;b.createdAt=Date.now();this.books.push(b);}await DB.put('cashbooks',b);},
  async delBook(id){const ids=this.bookEntries(id).map(e=>e.id);await this.delEntries(ids);this.books=this.books.filter(b=>b.id!==id);await DB.del('cashbooks',id);if(this.activeBook===id){const f=this.books.find(b=>!b.archived)||this.books[0];this.activeBook=f?f.id:null;await DB.setMeta('activeBook',this.activeBook);}},
  async reorderBook(id,dir){const a=this.books.slice().sort((x,y)=>x.order-y.order);const i=a.findIndex(b=>b.id===id);const j=i+dir;if(j<0||j>=a.length)return;[a[i].order,a[j].order]=[a[j].order,a[i].order];await DB.bulkPut('cashbooks',[a[i],a[j]]);this.books.sort((x,y)=>x.order-y.order);},

  async saveCat(c){const ex=this.cat(c.id);if(ex)Object.assign(ex,c);else{c.id=c.id||uid();c.order=this.cats.length;this.cats.push(c);}await DB.put('categories',c);},
  async delCat(id){this.cats=this.cats.filter(c=>c.id!==id);await DB.del('categories',id);},
};

/* ============================================================
   FILTERS  (shared across book / dashboard / analytics / export)
   ============================================================ */
const Filters={
  state:{range:'all',from:null,to:null,type:'all',cats:[],min:null,max:null,bookId:null,q:''},
  reset(){this.state={range:'all',from:null,to:null,type:'all',cats:[],min:null,max:null,bookId:null,q:''};},
  count(){let n=0;const s=this.state;if(s.range!=='all')n++;if(s.type!=='all')n++;if(s.cats.length)n++;if(s.min!=null||s.max!=null)n++;if(s.bookId)n++;return n;},
  dateBounds(){
    const s=this.state,now=new Date();let from=null,to=null;
    if(s.range==='month'){from=new Date(now.getFullYear(),now.getMonth(),1);to=new Date(now.getFullYear(),now.getMonth()+1,0);}
    else if(s.range==='lastmonth'){from=new Date(now.getFullYear(),now.getMonth()-1,1);to=new Date(now.getFullYear(),now.getMonth(),0);}
    else if(s.range==='year'){from=new Date(now.getFullYear(),0,1);to=new Date(now.getFullYear(),11,31);}
    else if(s.range==='7d'){to=now;from=new Date(now);from.setDate(now.getDate()-6);}
    else if(s.range==='custom'){from=s.from?dParts(s.from):null;to=s.to?dParts(s.to):null;}
    return{from:from?ymd(from):null,to:to?ymd(to):null};
  },
  apply(list,{ignoreBook=false,ignoreSearch=false}={}){
    const s=this.state,b=this.dateBounds();
    return list.filter(e=>{
      if(!ignoreBook&&s.bookId&&e.cashbookId!==s.bookId)return false;
      if(s.type!=='all'&&e.type!==s.type)return false;
      if(s.cats.length&&!s.cats.includes(e.categoryId))return false;
      if(b.from&&e.date<b.from)return false;
      if(b.to&&e.date>b.to)return false;
      if(s.min!=null&&e.amount<s.min)return false;
      if(s.max!=null&&e.amount>s.max)return false;
      if(!ignoreSearch&&s.q){
        const q=s.q.toLowerCase();
        const hay=(Store.catName(e.categoryId)+' '+(e.note||'')+' '+e.amount+' '+e.date+' '+(Store.book(e.cashbookId)||{}).name).toLowerCase();
        if(!hay.includes(q))return false;
      }
      return true;
    });
  }
};

/* ============================================================
   SVG CHARTS
   ============================================================ */
const Chart={
  arc(cx,cy,r,a0,a1){
    const p=(a)=>[cx+r*Math.cos(a),cy+r*Math.sin(a)];
    const[x0,y0]=p(a0),[x1,y1]=p(a1);const big=a1-a0>Math.PI?1:0;
    return `M${x0} ${y0}A${r} ${r} 0 ${big} 1 ${x1} ${y1}`;
  },
  donut(data,total){ // data: [{label,value,color}]
    const size=128,cx=64,cy=64,r=50,sw=18;
    if(!total){return `<svg class="chart" viewBox="0 0 ${size} ${size}" style="width:128px;height:128px;flex:0 0 auto"><circle cx="64" cy="64" r="50" fill="none" stroke="var(--line)" stroke-width="${sw}"/></svg>`;}
    let a=-Math.PI/2;let seg='';
    data.forEach(d=>{
      const frac=d.value/total;const a1=a+frac*Math.PI*2;
      if(frac>0)seg+=`<path d="${this.arc(cx,cy,r,a,Math.min(a1,a+Math.PI*1.9999))}" fill="none" stroke="${d.color}" stroke-width="${sw}" stroke-linecap="butt"/>`;
      a=a1;
    });
    return `<svg class="chart" viewBox="0 0 ${size} ${size}" style="width:128px;height:128px;flex:0 0 auto">${seg}</svg>`;
  },
  groupedBars(months){ // months:[{label,in,out}]
    const W=320,H=150,pad=22,bw=12,gap=5;
    const max=Math.max(1,...months.map(m=>Math.max(m.in,m.out)));
    const n=months.length;const slot=(W)/n;
    let bars='',labels='';
    months.forEach((m,i)=>{
      const x=i*slot+slot/2;
      const hIn=(m.in/max)*(H-pad);const hOut=(m.out/max)*(H-pad);
      bars+=`<rect class="bar-rect" x="${x-bw-gap/2}" y="${H-pad-hIn}" width="${bw}" height="${hIn}" rx="3" fill="#1aa06a"/>`;
      bars+=`<rect class="bar-rect" x="${x+gap/2}" y="${H-pad-hOut}" width="${bw}" height="${hOut}" rx="3" fill="#e0545f"/>`;
      labels+=`<text x="${x}" y="${H-6}" font-size="9" fill="#959dab" text-anchor="middle" font-weight="600">${m.label}</text>`;
    });
    return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:150px"><line x1="0" y1="${H-pad}" x2="${W}" y2="${H-pad}" stroke="var(--line)"/>${bars}${labels}</svg>`;
  },
  line(points,color){ // points:[{label,value}]
    const W=320,H=140,pad=10;
    if(points.length<2)points=points.concat(points);
    const vals=points.map(p=>p.value);
    const mn=Math.min(0,...vals),mx=Math.max(1,...vals);const rng=mx-mn||1;
    const step=(W-pad*2)/(points.length-1);
    const xy=points.map((p,i)=>[pad+i*step,pad+(H-pad*2)*(1-(p.value-mn)/rng)]);
    const d=xy.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
    const area=d+` L${xy[xy.length-1][0]} ${H-pad} L${xy[0][0]} ${H-pad} Z`;
    const zeroY=pad+(H-pad*2)*(1-(0-mn)/rng);
    const labels=points.map((p,i)=>i%Math.ceil(points.length/5||1)===0?`<text x="${xy[i][0]}" y="${H-1}" font-size="8.5" fill="#959dab" text-anchor="middle">${p.label}</text>`:'').join('');
    return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:148px">
      <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity=".22"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
      <line x1="0" y1="${zeroY}" x2="${W}" y2="${zeroY}" stroke="var(--line)" stroke-dasharray="3 3"/>
      <path d="${area}" fill="url(#lg)"/>
      <path d="${d}" fill="none" stroke="${color}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
      ${labels}
    </svg>`;
  }
};

/* ============================================================
   RENDER:  helpers
   ============================================================ */
function tintCard(color){return `style="background:${color}1a;color:${color}"`;}
function catIconHTML(cat,size){const c=cat||{icon:'📦',color:'#5a6b7f'};return `<span class="ic" style="background:${c.color}1f;color:${c.color}">${c.icon}</span>`;}

function entrySummary(list){
  let inc=0,exp=0;list.forEach(e=>e.type==='in'?inc+=e.amount:exp+=e.amount);
  return{inc,exp,net:inc-exp,count:list.length};
}

/* ============================================================
   RENDER:  DASHBOARD
   ============================================================ */
function renderHome(){
  const c=$('#homeContent');
  const all=Filters.apply(Store.entries,{ignoreBook:true});
  const s=entrySummary(all);
  const totalBal=Store.books.filter(b=>!b.archived).reduce((t,b)=>t+Store.balanceOf(b.id),0);
  const hr=new Date().getHours();
  $('#greet').textContent= hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
  const fcount=Filters.count();
  $('#greetSub').textContent= fcount?`${fcount} filter${fcount>1?'s':''} active`:'All cashbooks';

  const inPct=s.inc+s.exp?Math.round(s.inc/(s.inc+s.exp)*100):50;
  let html=`
    <div class="hero">
      <div class="glow"></div>
      <div class="label">Total balance</div>
      <div class="bal num ${totalBal<0?'neg':''}">${totalBal<0?'<span class="sign">−</span>':''}${fmt(Math.abs(totalBal))}</div>
      <div class="scope">${Store.books.filter(b=>!b.archived).length} active cashbook${Store.books.filter(b=>!b.archived).length!==1?'s':''}</div>
      <div class="flowbar"><div class="seg-in" style="width:${inPct}%"></div><div class="seg-out" style="width:${100-inPct}%"></div></div>
      <div class="split">
        <div class="cell"><div class="cap"><i class="din"></i>Cash in</div><div class="v tin num">${fmt(s.inc)}</div></div>
        <div class="cell"><div class="cap"><i class="dout"></i>Cash out</div><div class="v tout num">${fmt(s.exp)}</div></div>
      </div>
    </div>`;

  // cashbook rail
  const active=Store.books.filter(b=>!b.archived);
  html+=`<div class="section-h"><h2>Cashbooks</h2><button class="link" onclick="UI.go('more');setTimeout(()=>Manage.books(),120)">Manage</button></div>`;
  html+=`<div class="book-rail">`;
  active.forEach(b=>{
    const bal=Store.balanceOf(b.id);const cnt=Store.bookEntries(b.id).length;
    html+=`<button class="book-chip" onclick="UI.openBook('${b.id}')">
      <div class="top"><span class="ic" style="background:${b.color}1f;color:${b.color}">${b.icon}</span><span class="nm">${esc(b.name)}</span></div>
      <div class="bal num" style="color:${bal<0?'var(--out)':'var(--t1)'}">${fmtSigned(bal)}</div>
      <div class="meta">${cnt} ${cnt===1?'entry':'entries'}</div>
    </button>`;
  });
  html+=`<button class="book-chip" style="min-width:118px;display:grid;place-items:center;color:var(--ink)" onclick="Manage.editBook()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px"><path d="M12 5v14M5 12h14"/></svg>
    <span style="font-size:13px;font-weight:640;margin-top:8px">New book</span></button>`;
  html+=`</div>`;

  // recent activity
  const recent=[...all].sort((a,b)=>b.date<a.date?-1:b.date>a.date?1:b.createdAt-a.createdAt).slice(0,6);
  html+=`<div class="section-h"><h2>Recent activity</h2>${recent.length?'<button class="link" onclick="UI.go(\'book\')">View book</button>':''}</div>`;
  if(recent.length){
    html+=`<div class="card">`;
    recent.forEach(e=>{const cat=Store.cat(e.categoryId);const bk=Store.book(e.cashbookId);const cn=Store.catName(e.categoryId);
      html+=`<div class="entry" onclick="Editor.open('${e.id}')">
        ${catIconHTML(cat)}
        <div class="body"><div class="cat">${esc(e.note||cn||'Entry')}</div>
        <div class="note">${esc((bk?bk.name:'')+(cn&&e.note?' · '+cn:''))}</div></div>
        <div class="amt ${e.type}">${e.type==='in'?'+':'−'}${fmt(e.amount)}</div>
      </div>`;});
    html+=`</div>`;
  }else{
    html+=emptyState('ledger','No entries yet','Add your first cash in or out to see it here.','Add entry','Editor.open()');
  }
  c.innerHTML=html;
}

/* ============================================================
   RENDER:  BOOK
   ============================================================ */
function renderBook(){
  const bk=Store.book(Store.activeBook);
  if(!bk){$('#bookContent').innerHTML=emptyState('book','No cashbook','Create a cashbook to start.','New cashbook','Manage.editBook()');return;}
  $('#bookIcon').textContent=bk.icon;$('#bookName').textContent=bk.name;
  const bal=Store.balanceOf(bk.id);
  $('#bookBal').textContent=fmtSigned(bal);$('#bookBal').style.color=bal<0?'var(--out)':'var(--t3)';
  updateFilterBadge();

  const list=Filters.apply(Store.bookEntries(bk.id),{ignoreBook:true})
    .sort((a,b)=> a.date<b.date?1:a.date>b.date?-1:b.createdAt-a.createdAt);
  const s=entrySummary(list);

  let html=`
    <div class="hero" style="background:radial-gradient(120% 140% at 84% -10%,${bk.color}cc 0%,#16223a 55%,var(--ink) 100%)">
      <div class="glow"></div>
      <div class="label">${esc(bk.name)} balance</div>
      <div class="bal num ${bal<0?'neg':''}">${bal<0?'<span class="sign">−</span>':''}${fmt(Math.abs(bal))}</div>
      <div class="split">
        <div class="cell"><div class="cap"><i class="din"></i>In</div><div class="v tin num">${fmt(s.inc)}</div></div>
        <div class="cell"><div class="cap"><i class="dout"></i>Out</div><div class="v tout num">${fmt(s.exp)}</div></div>
        <div class="cell"><div class="cap">Entries</div><div class="v num" style="color:#fff">${fmt(list.length)}</div></div>
      </div>
    </div>`;

  if(Filters.count()){
    html+=`<div style="margin-top:12px"><button class="filter-pill act" onclick="UI.openFilters()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 5h16M7 12h10M10 19h4"/></svg>${Filters.count()} filter${Filters.count()>1?'s':''} · <span class="num">${list.length}</span> shown</button> <button class="filter-pill" onclick="Filters.reset();UI.refresh()">Clear</button></div>`;
  }

  if(!list.length){
    html+=Store.bookEntries(bk.id).length
      ? emptyState('search','No matches','No entries match your filters or search.','Clear filters','Filters.reset();UI.refresh()')
      : emptyState('ledger','This book is empty','Tap the + button to record your first entry.','Add entry','Editor.open()');
    $('#bookContent').innerHTML=html;return;
  }

  // group by date with daily totals
  const groups={};list.forEach(e=>{(groups[e.date]=groups[e.date]||[]).push(e);});
  const dates=Object.keys(groups).sort((a,b)=>a<b?1:-1);
  html+=`<div style="margin-top:6px">`;
  dates.forEach(dt=>{
    const day=groups[dt];const dnet=day.reduce((t,e)=>t+(e.type==='in'?e.amount:-e.amount),0);
    html+=`<div class="day-group"><div class="day-head"><span class="d">${dateLabel(dt)}</span><span class="s num">${fmtSigned(dnet)}</span></div><div class="card">`;
    day.forEach(e=>html+=swipeEntry(e));
    html+=`</div></div>`;
  });
  html+=`</div>`;
  $('#bookContent').innerHTML=html;
  bindSwipes($('#bookContent'));
}

function swipeEntry(e){
  const cat=Store.cat(e.categoryId);

  return `<div class="swipe-wrap" data-id="${e.id}">
    <div class="swipe-actions"><div class="sa edit" data-act="edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20h4l10-10-4-4L4 16z"/></svg>Edit</div><div class="sa del" data-act="del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg>Delete</div></div>

/* swipe + tap + long-press gesture binding */
function bindSwipes(root){
  $$('.swipe-wrap',root).forEach(w=>{
    const entry=$('.entry',w);const id=w.dataset.id;
    let sx=0,sy=0,dx=0,open=false,moved=false,lp=null,dragging=false,lpFired=false;
    const W=148;
    const reset=a=>{entry.style.transform=a?'':'translateX(0)';open=false;};
    entry.addEventListener('touchstart',ev=>{
      if(Sel.active){return;}
      sx=ev.touches[0].clientX;sy=ev.touches[0].clientY;dx=0;moved=false;dragging=false;lpFired=false;
      lp=setTimeout(()=>{lpFired=true;haptic(14);Sel.start(id);},480);
    },{passive:true});
    entry.addEventListener('touchmove',ev=>{
      if(Sel.active)return;
      const cx=ev.touches[0].clientX,cy=ev.touches[0].clientY;
      if(Math.abs(cx-sx)>8||Math.abs(cy-sy)>8){clearTimeout(lp);}
      if(!dragging&&Math.abs(cx-sx)>Math.abs(cy-sy)&&Math.abs(cx-sx)>10){dragging=true;}
      if(dragging){moved=true;dx=Math.min(0,cx-sx+(open?-W:0));dx=Math.max(dx,-W);entry.style.transform=`translateX(${dx}px)`;}
    },{passive:true});
    entry.addEventListener('touchend',ev=>{
      clearTimeout(lp);
      if(lpFired){lpFired=false;return;}
      if(Sel.active){Sel.toggle(id);return;}
      if(dragging){if(dx<-W*0.45){entry.style.transform=`translateX(${-W}px)`;open=true;}else reset();return;}
      if(!moved){Editor.open(id);}
    },{passive:true});
    // action taps
    $$('.sa',w).forEach(b=>b.addEventListener('click',ev=>{
      ev.stopPropagation();const act=b.dataset.act;reset();
      if(act==='edit')Editor.open(id);
      if(act==='del')Actions.deleteEntries([id]);
    }));
  });
}

let statsScope='all'; // all | active
let statsPeriod='6m'; // month | 3m | 6m | year | all
const PERIOD_LABELS={month:'This month','3m':'Last 3 months','6m':'Last 6 months',year:'This year',all:'All time'};
function periodFrom(){
  const now=new Date();const y=now.getFullYear(),m=now.getMonth();
  const iso=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  switch(statsPeriod){
    case 'month':return iso(new Date(y,m,1));
    case '3m':return iso(new Date(y,m-2,1));
    case '6m':return iso(new Date(y,m-5,1));
    case 'year':return iso(new Date(y,0,1));
    default:return null;
  }
}
function periodMonthCount(list){
  const now=new Date();
  if(statsPeriod==='month')return 1;
  if(statsPeriod==='3m')return 3;
  if(statsPeriod==='6m')return 6;
  if(statsPeriod==='year')return now.getMonth()+1;
  if(!list.length)return 1;
  const f=dParts([...list].map(e=>e.date).sort()[0]);
  return Math.min(12,Math.max(1,(now.getFullYear()-f.getFullYear())*12+(now.getMonth()-f.getMonth())+1));
}
function renderStats(){
  const c=$('#statsContent');
  let list=Filters.apply(Store.entries,{ignoreBook:true});
  const from=periodFrom();if(from)list=list.filter(e=>e.date>=from);
  $('#statsScope').textContent='All cashbooks';
  updateFilterBadge();

  let html=`<div class="an-period">${Object.keys(PERIOD_LABELS).map(k=>`<button class="${statsPeriod===k?'on':''}" onclick="statsPeriod='${k}';renderStats()">${PERIOD_LABELS[k]}</button>`).join('')}</div>`;

  if(Filters.count())html+=`<div style="margin-top:12px"><button class="filter-pill act" onclick="UI.openFilters()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 5h16M7 12h10M10 19h4"/></svg>${Filters.count()} filter${Filters.count()>1?'s':''}</button> <button class="filter-pill" onclick="Filters.reset();UI.refresh()">Clear</button></div>`;

  if(!list.length){c.innerHTML=html+emptyState('chart','Nothing to analyze','No entries in this period. Try a wider range or add some entries.','',null);return;}

  const s=entrySummary(list);
  const out=list.filter(e=>e.type==='out'),inn=list.filter(e=>e.type==='in');
  const rate= s.inc>0 ? Math.round(s.net/s.inc*100) : null;

  // KPI summary
  html+=`<div class="an-summary">
    <div class="k">Net · ${PERIOD_LABELS[statsPeriod]}</div>
    <div class="net num ${s.net<0?'neg':''}">${s.net<0?'<span style="font-size:22px">−</span>':''}${fmt(Math.abs(s.net))}</div>
    ${rate!==null?`<div class="rate">${s.net>=0?`Kept ${rate}% of the ${fmt(s.inc)} that came in`:`Spent ${fmt(s.exp-s.inc)} more than came in`}</div>`:`<div class="rate">${fmt(s.count)} entr${s.count===1?'y':'ies'}</div>`}
    <div class="an-io">
      <div class="io in"><span class="ico">↑</span><div><div class="kk">Money in</div><div class="vv num">${fmt(s.inc)}</div></div></div>
      <div class="io out"><span class="ico">↓</span><div><div class="kk">Money out</div><div class="vv num">${fmt(s.exp)}</div></div></div>
    </div>
  </div>`;

  // insights
  const mc=periodMonthCount(list);
  let big=null;out.forEach(e=>{if(!big||e.amount>big.amount)big=e;});
  const byO={};out.forEach(e=>byO[e.categoryId]=(byO[e.categoryId]||0)+e.amount);
  let topO=null;Object.entries(byO).forEach(([cid,v])=>{if(!topO||v>topO.v)topO={cid,v};});
  const byI={};inn.forEach(e=>byI[e.categoryId]=(byI[e.categoryId]||0)+e.amount);
  let topI=null;Object.entries(byI).forEach(([cid,v])=>{if(!topI||v>topI.v)topI={cid,v};});
  let rows='';
  if(s.exp>0)rows+=`<div class="insight"><div class="ii" style="background:var(--out-bg)">📉</div><div class="it"><div class="l">Average spend per month</div><div class="b">over ${mc} month${mc>1?'s':''}</div></div><div class="iv" style="color:var(--out)">${fmt(Math.round(s.exp/Math.max(1,mc)))}</div></div>`;
  if(big){const bc=Store.cat(big.categoryId);rows+=`<div class="insight"><div class="ii" style="background:${bc?bc.color+'1f':'var(--paper)'}">${bc?bc.icon:'💸'}</div><div class="it"><div class="l">Biggest single expense</div><div class="b">${esc(big.note||Store.catName(big.categoryId))}</div></div><div class="iv" style="color:var(--out)">${fmt(big.amount)}</div></div>`;}
  if(topO){const tc=Store.cat(topO.cid);rows+=`<div class="insight"><div class="ii" style="background:${tc?tc.color+'1f':'var(--paper)'}">${tc?tc.icon:'🏷️'}</div><div class="it"><div class="l">Top spending category</div><div class="b">${esc(Store.catName(topO.cid)||'Uncategorized')}</div></div><div class="iv" style="color:var(--out)">${fmt(topO.v)}</div></div>`;}
  if(topI){const tc=Store.cat(topI.cid);rows+=`<div class="insight"><div class="ii" style="background:${tc?tc.color+'1f':'var(--paper)'}">${tc?tc.icon:'💰'}</div><div class="it"><div class="l">Top income source</div><div class="b">${esc(Store.catName(topI.cid)||'Uncategorized')}</div></div><div class="iv" style="color:var(--in)">${fmt(topI.v)}</div></div>`;}
  if(rows)html+=`<div class="insights">${rows}</div>`;

  // spending & income donuts
  html+=donutCard('Where money went',out,'out');
  if(inn.length)html+=donutCard('Where money came from',inn,'in');

  // in vs out over time (only meaningful with 2+ months)
  if(mc>=2){
    const months=monthBuckets(list,mc);
    html+=`<div class="chart-card"><h3>Money in vs out</h3><div class="cc-sub">By month · last ${months.length} months</div>
      ${Chart.groupedBars(months)}
      <div style="display:flex;gap:18px;margin-top:12px;font-size:12px;color:var(--t2)">
        <span style="display:flex;align-items:center;gap:6px"><i style="width:10px;height:10px;border-radius:3px;background:#1aa06a;display:inline-block"></i>In</span>
        <span style="display:flex;align-items:center;gap:6px"><i style="width:10px;height:10px;border-radius:3px;background:#e0545f;display:inline-block"></i>Out</span>
      </div></div>`;
  }

  // balance trend
  const flow=cumulativeFlow(list);
  if(flow.length>1)html+=`<div class="chart-card"><h3>Balance trend</h3><div class="cc-sub">Running balance across the period</div>${Chart.line(flow,'#2f6df0')}</div>`;

  c.innerHTML=html;
}
function donutCard(title,list,kind){
  if(!list.length)return '';
  const by={};list.forEach(e=>{by[e.categoryId]=(by[e.categoryId]||0)+e.amount;});
  let arr=Object.entries(by).map(([cid,v])=>{const cat=Store.cat(cid);return{label:Store.catName(cid)||'Uncategorized',value:v,color:cat?cat.color:'#5a6b7f'};}).sort((a,b)=>b.value-a.value);
  const total=arr.reduce((t,a)=>t+a.value,0);
  if(arr.length>6){const top=arr.slice(0,5);const rest=arr.slice(5).reduce((t,a)=>t+a.value,0);top.push({label:'Other',value:rest,color:'#aeb6c2'});arr=top;}
  let legend='';arr.forEach(a=>legend+=`<div class="li"><span class="sw" style="background:${a.color}"></span><span class="nm">${esc(a.label)}</span><span class="vv num">${fmt(a.value)}</span><span class="pc num">${Math.round(a.value/total*100)}%</span></div>`);
  return `<div class="chart-card"><h3>${title}</h3><div class="cc-sub">${arr.length} categories · ${fmt(total)} total</div>
    <div class="donut-wrap">${Chart.donut(arr,total)}<div class="legend">${legend}</div></div></div>`;
}
function catBarsCard(title,list){
  if(!list.length)return'';
  const by={};list.forEach(e=>by[e.categoryId]=(by[e.categoryId]||0)+e.amount);
  const arr=Object.entries(by).map(([cid,v])=>({cat:Store.cat(cid),name:Store.catName(cid),v})).sort((a,b)=>b.v-a.v).slice(0,8);
  const max=Math.max(...arr.map(a=>a.v));let bars='';
  arr.forEach(a=>{const col=a.cat?a.cat.color:'#5a6b7f';bars+=`<div class="cat-bar"><div class="top"><span class="nm">${a.cat?a.cat.icon:'📦'} ${esc(a.name)}</span><span class="vv">${fmt(a.v)}</span></div><div class="track"><div class="fill" style="width:${Math.max(4,a.v/max*100)}%;background:${col}"></div></div></div>`;});
  return `<div class="chart-card"><h3>${title}</h3><div class="cc-sub">Ranked by amount</div><div class="cat-bars">${bars}</div></div>`;
}
function monthBuckets(list,n){
  const now=new Date();const buckets=[];
  for(let i=n-1;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);buckets.push({key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,label:MON[d.getMonth()],in:0,out:0});}
  const map={};buckets.forEach(b=>map[b.key]=b);
  list.forEach(e=>{const k=e.date.slice(0,7);if(map[k]){if(e.type==='in')map[k].in+=e.amount;else map[k].out+=e.amount;}});
  return buckets;
}
function cumulativeFlow(list){
  const sorted=[...list].sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);
  const byDate={};sorted.forEach(e=>byDate[e.date]=(byDate[e.date]||0)+(e.type==='in'?e.amount:-e.amount));
  let run=0;const pts=Object.keys(byDate).sort().map(d=>{run+=byDate[d];const dd=dParts(d);return{label:`${dd.getDate()}/${dd.getMonth()+1}`,value:run};});
  if(pts.length>14){const step=Math.ceil(pts.length/14);return pts.filter((_,i)=>i%step===0||i===pts.length-1);}
  return pts.length?pts:[{label:'',value:0}];
}

  refresh(){this.render(this.tab);if(this.tab!=='home')renderHome();},
  openBook(id){Store.activeBook=id;DB.setMeta('activeBook',id);this.go('book');},
  openBookPicker(){Pickers.book(id=>{Store.activeBook=id;DB.setMeta('activeBook',id);renderBook();},Store.activeBook,true);},
  openSearch(){Search.open();},

    html+=`</div><div class="addrow" onclick="UI.dismiss();Manage.editBook()"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px"><path d="M12 5v14M5 12h14"/></svg></span>New cashbook</div></div>`;

    html+=`</div><div class="addrow" style="padding-left:0" onclick="UI.dismiss();Manage.editCat(null,'${typeFilter||''}',true)"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px"><path d="M12 5v14M5 12h14"/></svg></span>New category</div></div>`;

  _pickCat(id){UI.dismiss();this._ccb&&this._ccb(id);},
