<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#6C4DF2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cashbook">
<link rel="manifest" href="manifest.json">
<title>Cashbook</title>
<style>
  :root{
    --ink:#241B3C;
    --muted:#8B86A6;
    --surface:#FFFFFF;
    --edge:#ECE8F7;
    --primary:#6C4DF2;
    --primary2:#9171FB;
    --primary-press:#5A3DE0;
    --primary-soft:rgba(108,77,242,.10);
    --pos:#0BA678;
    --pos2:#22C58B;
    --pos-soft:rgba(11,166,120,.12);
    --neg:#F0436A;
    --neg2:#FF7A98;
    --neg-soft:rgba(240,67,106,.12);
    --shadow:0 2px 6px rgba(36,27,60,.05),0 14px 30px rgba(108,77,242,.08);
    --r-card:22px;
    --ease:cubic-bezier(.22,1.25,.36,1);
    --spring:cubic-bezier(.2,1.45,.32,1);
    --ui:ui-rounded,"SF Pro Rounded","Segoe UI Variable","Segoe UI",system-ui,Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--ui);
    color:var(--ink);
    background:linear-gradient(180deg,#F4F1FF 0%,#FBF9FF 38%,#FFFFFF 100%);
    background-attachment:fixed;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    line-height:1.45;
    overscroll-behavior-y:none;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:16px;color:var(--ink)}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;letter-spacing:-.01em}
  .pos{color:var(--pos)}
  .neg{color:var(--neg)}

  /* App bar */
  .bar{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(135deg,var(--primary) 0%,var(--primary2) 100%);
    color:#fff;
    padding:calc(env(safe-area-inset-top) + 16px) 18px 18px;
    display:flex;align-items:center;gap:12px;
    border-radius:0 0 26px 26px;
    box-shadow:0 8px 26px rgba(108,77,242,.26);
  }
  .bar .back{
    width:36px;height:36px;border-radius:12px;display:none;
    align-items:center;justify-content:center;font-size:22px;color:#fff;
    background:rgba(255,255,255,.16);transition:transform .15s var(--spring),background .15s;
  }
  .bar.has-back .back{display:flex}
  .bar .titles{flex:1;min-width:0}
  .bar h1{font-size:19px;font-weight:800;margin:0;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar .sub{font-size:12.5px;color:rgba(255,255,255,.78);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar .menu{
    width:40px;height:40px;border-radius:13px;font-size:22px;color:#fff;
    display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.16);
    transition:transform .15s var(--spring),background .15s;
  }
  .bar .back:active,.bar .menu:active{transform:scale(.88);background:rgba(255,255,255,.3)}

  /* Layout */
  .wrap{max-width:680px;margin:0 auto;padding:16px 14px 130px}
  .eyebrow{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:20px 6px 10px}
  .eyebrow:first-child{margin-top:8px}

  /* Entrance choreography */
  #app>*{animation:popIn .44s var(--ease) both}
  #app>*:nth-child(1){animation-delay:.03s}
  #app>*:nth-child(2){animation-delay:.08s}
  #app>*:nth-child(3){animation-delay:.13s}
  #app>*:nth-child(4){animation-delay:.18s}
  #app>*:nth-child(5){animation-delay:.23s}
  #app>*:nth-child(6){animation-delay:.28s}
  #app>*:nth-child(n+7){animation-delay:.31s}
  @keyframes popIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}

  /* Cashbook cards */
  .cb{
    display:flex;align-items:stretch;gap:0;background:var(--surface);
    border-radius:var(--r-card);box-shadow:var(--shadow);
    margin-bottom:12px;overflow:hidden;width:100%;text-align:left;
    transition:transform .16s var(--spring),box-shadow .16s;
  }
  .cb:active{transform:scale(.98)}
  .cb .tab{width:7px;flex:none;border-radius:99px;margin:13px 0 13px 12px;background:var(--primary)}
  .cb .body{flex:1;min-width:0;padding:15px 14px 15px 13px;display:flex;align-items:center;gap:13px}
  .cb .ic{width:44px;height:44px;flex:none;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;background:linear-gradient(160deg,#F6F3FF,#FBF9FF);box-shadow:inset 0 0 0 1px var(--edge)}
  .cb .info{flex:1;min-width:0}
  .cb .nm{font-weight:750;font-size:16px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cb .ds{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cb .bal{flex:none;text-align:right;padding:8px 12px;border-radius:14px;background:var(--primary-soft)}
  .cb .bal .lab{display:block;font-size:9.5px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:var(--muted);margin-bottom:1px}
  .cb .bal .num{font-size:16px;font-weight:800;color:var(--primary)}
  .cb .bal .num.neg{color:var(--neg)}
  .cb.arch{opacity:.6}

  /* Detail summary */
  .summary{
    background:linear-gradient(165deg,#FFFFFF 0%,#FBFAFF 100%);
    border-radius:26px;box-shadow:var(--shadow);
    padding:22px 20px;margin-bottom:8px;border:1px solid var(--edge);
  }
  .summary .blab{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .summary .bbal{
    font-size:40px;font-weight:850;letter-spacing:-.025em;line-height:1.04;margin:6px 0 2px;
    background:linear-gradient(120deg,var(--primary),var(--primary2));
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
  }
  .summary .bbal.neg{background:none;-webkit-text-fill-color:var(--neg);color:var(--neg)}
  .summary .flow{display:flex;gap:10px;margin-top:16px}
  .summary .flow div{flex:1;background:#FAF8FF;border-radius:15px;padding:11px 12px}
  .summary .flow .k{font-size:10.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
  .summary .flow .v{font-size:16px;font-weight:800;margin-top:3px}

  /* Ledger rows */
  .daygroup{margin-top:16px}
  .daygroup .dh{font-size:12.5px;font-weight:800;color:var(--muted);margin:0 8px 8px;display:flex;justify-content:space-between;align-items:center}
  .daygroup .dh .num{font-size:12.5px;font-weight:800;padding:3px 9px;border-radius:99px}
  .daygroup .dh .num.pos{background:var(--pos-soft)}
  .daygroup .dh .num.neg{background:var(--neg-soft)}
  .ledger{background:var(--surface);border-radius:20px;box-shadow:var(--shadow);overflow:hidden}
  .row{display:flex;align-items:center;gap:13px;padding:14px 15px;width:100%;text-align:left;border-bottom:1px solid var(--edge);transition:background .15s}
  .row:last-child{border-bottom:none}
  .row:active{background:var(--primary-soft)}
  .row .rdot{width:12px;height:12px;border-radius:50%;flex:none;background:var(--primary);box-shadow:0 0 0 4px var(--primary-soft)}
  .row .rmain{flex:1;min-width:0}
  .row .rcat{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .rnote{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .ramt{font-size:16px;font-weight:800;text-align:right;flex:none}
  .row .rref{font-size:11px;color:var(--muted);font-weight:600}

  /* Empty states */
  .empty{text-align:center;padding:56px 24px;color:var(--muted)}
  .empty .big{font-size:62px;margin-bottom:14px;display:inline-block;animation:floaty 3.2s ease-in-out infinite}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  .empty h2{color:var(--ink);font-size:19px;margin:0 0 7px;font-weight:800}
  .empty p{margin:0 0 20px;font-size:14.5px;max-width:34ch;margin-left:auto;margin-right:auto;line-height:1.5}

  /* Buttons */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;font-weight:800;font-size:15.5px;
    padding:15px 18px;border-radius:16px;width:100%;letter-spacing:.01em;
    box-shadow:0 8px 18px rgba(108,77,242,.30);
    transition:transform .15s var(--spring),box-shadow .15s,filter .15s;
  }
  .btn:active{transform:scale(.96);box-shadow:0 4px 10px rgba(108,77,242,.26)}
  .btn.ghost{background:var(--surface);color:var(--ink);border:1.5px solid var(--edge);box-shadow:none}
  .btn.ghost:active{background:#FAF8FF}
  .btn.danger{background:linear-gradient(135deg,var(--neg),var(--neg2));box-shadow:0 8px 18px rgba(240,67,106,.30)}
  .btn.sm{width:auto;padding:10px 15px;font-size:14px;border-radius:13px}

  /* FAB */
  .fab{
    position:fixed;right:18px;bottom:calc(env(safe-area-inset-bottom) + 20px);z-index:30;
    width:62px;height:62px;border-radius:20px;
    background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;
    font-size:32px;line-height:1;display:flex;align-items:center;justify-content:center;
    box-shadow:0 12px 28px rgba(108,77,242,.46);
    animation:fabIn .55s var(--spring) .1s both;
    transition:transform .18s var(--spring),box-shadow .18s;
  }
  .fab:active{transform:scale(.86) rotate(-6deg);box-shadow:0 6px 16px rgba(108,77,242,.4)}
  @keyframes fabIn{from{opacity:0;transform:scale(.2)}to{opacity:1;transform:none}}

  /* Modal / sheet */
  .scrim{position:fixed;inset:0;z-index:50;background:rgba(36,27,60,.46);display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
  .scrim.open{display:flex}
  .sheet{
    background:var(--surface);width:100%;max-width:680px;max-height:92vh;overflow-y:auto;
    border-radius:28px 28px 0 0;padding:8px 18px calc(env(safe-area-inset-bottom) + 24px);
    box-shadow:0 -10px 40px rgba(36,27,60,.18);
    animation:sheetUp .44s var(--ease);
  }
  @keyframes sheetUp{from{transform:translateY(64px);opacity:.5}to{transform:none;opacity:1}}
  .grab{width:42px;height:5px;border-radius:99px;background:var(--edge);margin:8px auto 16px}
  .sheet h2{font-size:21px;font-weight:850;letter-spacing:-.01em;margin:0 0 18px}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:12.5px;font-weight:800;color:var(--muted);margin-bottom:7px}
  .field input,.field select,.field textarea{
    width:100%;padding:13px 14px;border:1.5px solid var(--edge);border-radius:14px;background:#FAF8FF;
    transition:border-color .15s,box-shadow .15s,background .15s;
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft);background:#fff}
  .field textarea{resize:vertical;min-height:58px}
  .field .err{color:var(--neg);font-size:12.5px;margin-top:6px;display:none;font-weight:600}
  .field.invalid .err{display:block}
  .field.invalid input,.field.invalid select{border-color:var(--neg);box-shadow:0 0 0 4px var(--neg-soft)}
  .row2{display:flex;gap:12px}
  .row2>*{flex:1}

  /* Type toggle */
  .seg{display:flex;background:#F3F0FF;border-radius:15px;padding:4px;gap:4px}
  .seg button{flex:1;padding:12px;border-radius:11px;font-weight:800;font-size:15px;color:var(--muted);transition:background .2s,color .2s,transform .2s var(--spring),box-shadow .2s}
  .seg button:active{transform:scale(.97)}
  .seg button.on[data-v="IN"]{background:linear-gradient(135deg,var(--pos),var(--pos2));color:#fff;box-shadow:0 6px 14px rgba(11,166,120,.32)}
  .seg button.on[data-v="OUT"]{background:linear-gradient(135deg,var(--neg),var(--neg2));color:#fff;box-shadow:0 6px 14px rgba(240,67,106,.30)}

  /* Swatches */
  .swatches{display:flex;flex-wrap:wrap;gap:10px}
  .swatch{width:38px;height:38px;border-radius:12px;position:relative;border:3px solid transparent;transition:transform .15s var(--spring),box-shadow .15s}
  .swatch:active{transform:scale(.88)}
  .swatch.on{transform:scale(1.1);box-shadow:0 6px 14px rgba(36,27,60,.22)}
  .swatch.on::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:900;text-shadow:0 1px 3px rgba(0,0,0,.35)}
  .icons{display:flex;flex-wrap:wrap;gap:9px}
  .icbtn{width:46px;height:46px;border-radius:13px;border:1.5px solid var(--edge);background:#FAF8FF;font-size:22px;display:flex;align-items:center;justify-content:center;transition:transform .15s var(--spring),border-color .15s,background .15s}
  .icbtn:active{transform:scale(.9)}
  .icbtn.on{border-color:var(--primary);border-width:2.5px;background:#fff;transform:scale(1.06)}

  .sheet-actions{display:flex;flex-direction:column;gap:11px;margin-top:10px}

  /* Menu list */
  .menu-list button{display:flex;align-items:center;gap:14px;width:100%;text-align:left;padding:15px 6px;border-bottom:1px solid var(--edge);font-size:16px;font-weight:650;border-radius:12px;transition:background .15s,transform .12s}
  .menu-list button:last-child{border-bottom:none}
  .menu-list button:active{background:var(--primary-soft);transform:scale(.99)}
  .menu-list .mi{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;background:#F3F0FF}
  .menu-list button.warn{color:var(--neg)}

  /* Category manage list */
  .cat-row{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--edge)}
  .cat-row:last-child{border-bottom:none}
  .cat-row .cdot{width:16px;height:16px;border-radius:6px;flex:none}
  .cat-row .cname{flex:1;font-weight:700;font-size:15px}
  .cat-row .cact{padding:8px 12px;border-radius:11px;background:#F3F0FF;font-size:13px;font-weight:700;transition:transform .12s var(--spring)}
  .cat-row .cact:active{transform:scale(.92)}
  .cat-row .cact.del{color:var(--neg);background:var(--neg-soft)}
  .pill{font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:99px}
  .pill.IN{background:var(--pos-soft);color:var(--pos)}
  .pill.OUT{background:var(--neg-soft);color:var(--neg)}

  .note{font-size:13.5px;color:var(--muted);background:#F6F3FF;border-radius:15px;padding:13px 14px;margin-top:4px;line-height:1.5}
  .about p{font-size:14px;color:var(--muted);margin:0 0 11px;line-height:1.55}
  .about strong{color:var(--ink)}

  /* Toast */
  .toast{
    position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 96px);z-index:90;
    background:var(--ink);color:#fff;padding:13px 20px;border-radius:99px;font-size:14.5px;font-weight:700;
    box-shadow:0 12px 30px rgba(36,27,60,.28);max-width:88%;text-align:center;
    opacity:0;transform:translateX(-50%) translateY(20px) scale(.95);pointer-events:none;
    transition:opacity .25s,transform .35s var(--spring);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
  <div class="bar" id="bar">
    <button class="back" id="backBtn" aria-label="Back">‹</button>
    <div class="titles">
      <h1 id="barTitle">Cashbook</h1>
      <div class="sub" id="barSub"></div>
    </div>
    <button class="menu" id="menuBtn" aria-label="Menu">⋮</button>
  </div>

  <main class="wrap" id="app"></main>

  <button class="fab" id="fab" aria-label="Add">+</button>

  <div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>
  <div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================================================
   Cashbook — offline personal ledger (PWA, IndexedDB)
   Money stored as INTEGER minor units (x100). No float in totals.
   ============================================================ */

const DB_NAME = "cashbook_db";
const DB_VERSION = 1;            // bump + add a case in upgrade() for future migrations
const MINOR = 100;               // smallest unit = 1/100 of the major unit

const COLORS = ["#6C4DF2","#0BA678","#F0436A","#F59E0B","#3B82F6","#EC4899","#14B8A6","#8B5CF6","#EF4444","#F97316"];
const CB_ICONS = ["📒","💰","🚚","🏦","🧾","🏷️","💵","📦","🛠️","🏠"];
const CAT_ICONS = ["💵","🚚","⛽","🛠️","🧾","🍽️","🏷️","📦","🏦","💼","🪙","📈","📉","🔧","🧰","💳"];

/* ---------- tiny helpers ---------- */
const $ = (id) => document.getElementById(id);
const uid = () => (crypto && crypto.randomUUID) ? crypto.randomUUID()
  : "id-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2,10);
const nowISO = () => new Date().toISOString();
function todayLocal(){
  const d = new Date();
  const p = (n)=>String(n).padStart(2,"0");
  return d.getFullYear() + "-" + p(d.getMonth()+1) + "-" + p(d.getDate());
}
function esc(s){
  return String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* ---------- money ---------- */
// parse user text -> integer minor units; returns null if invalid / <= 0
function parseMinor(text){
  if(text==null) return null;
  const t = String(text).trim().replace(/,/g,"");
  if(t === "" || !/^\d*\.?\d*$/.test(t)) return null;
  const f = Number(t);
  if(!isFinite(f) || f <= 0) return null;
  return Math.round(f * MINOR);
}
// integer minor -> grouped string, 2 decimals, no currency symbol. Pure integer math.
function fmtMinor(minor){
  const neg = minor < 0;
  let v = Math.abs(minor);
  const frac = v % MINOR;
  let intPart = (v - frac) / MINOR;
  let s = String(intPart);
  let out = "";
  while(s.length > 3){ out = "," + s.slice(-3) + out; s = s.slice(0,-3); }
  out = s + out;
  const fracStr = String(frac).padStart(2,"0");
  return (neg ? "-" : "") + out + "." + fracStr;
}
function fmtSigned(minor, type){
  const sign = type === "OUT" ? "−" : "+";
  return sign + " " + fmtMinor(Math.abs(minor));
}

/* ---------- dates ---------- */
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function prettyDate(ymd){
  const p = ymd.split("-");
  if(p.length !== 3) return ymd;
  return Number(p[2]) + " " + (MONTHS[Number(p[1])-1] || "?") + " " + p[0];
}

/* ============================================================
   DATABASE LAYER (IndexedDB) — versioned migrations
   ============================================================ */
let DB = null;

function openDB(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      const tx = e.target.transaction;
      const from = e.oldVersion;
      upgrade(db, tx, from);
    };
    req.onsuccess = () => { DB = req.result; resolve(DB); };
    req.onerror = () => reject(req.error);
    req.onblocked = () => reject(new Error("Database is busy in another tab. Close other copies and reopen."));
  });
}

// All schema changes live here, gated by version. Add `if(from < N){...}` blocks for future migrations.
function upgrade(db, tx, from){
  if(from < 1){
    // migration 0001 — initial schema
    const cb = db.createObjectStore("cashbooks", { keyPath:"id" });
    cb.createIndex("by_archived", "is_archived");

    const en = db.createObjectStore("entries", { keyPath:"id" });
    en.createIndex("by_cashbook", "cashbook_id");
    en.createIndex("by_cashbook_date", ["cashbook_id","entry_date"]);
    en.createIndex("by_category", "category_id");

    const ca = db.createObjectStore("categories", { keyPath:"id" });
    ca.createIndex("by_type", "type");
    ca.createIndex("by_type_sort", ["type","sort_order"]);

    db.createObjectStore("meta", { keyPath:"key" });

    seedDefaults(tx);
  }
}

function seedDefaults(tx){
  const store = tx.objectStore("categories");
  const t = nowISO();
  const defs = [
    ["Payment received","IN","💵","#0BA678"],
    ["Freight income","IN","🚚","#14B8A6"],
    ["Advance received","IN","🏦","#3B82F6"],
    ["Other income","IN","🪙","#8B5CF6"],
    ["Fuel","OUT","⛽","#F59E0B"],
    ["Driver / salary","OUT","💼","#6C4DF2"],
    ["Maintenance","OUT","🛠️","#EC4899"],
    ["Office / misc","OUT","🧾","#F0436A"],
    ["Other expense","OUT","📦","#EF4444"],
  ];
  defs.forEach((d, i) => {
    store.put({
      id: uid(), name:d[0], type:d[1], icon_name:d[2], visual_color:d[3],
      is_default:1, is_hidden:0, is_archived:0, sort_order:i, created_at:t, updated_at:t
    });
  });
  tx.objectStore("meta").put({ key:"created_at", value:t });
}

/* ---- promise wrappers ---- */
function txStore(name, mode){ return DB.transaction(name, mode).objectStore(name); }
function reqP(request){
  return new Promise((res, rej) => { request.onsuccess = () => res(request.result); request.onerror = () => rej(request.error); });
}
function getAll(store){ return reqP(txStore(store,"readonly").getAll()); }
function getOne(store, key){ return reqP(txStore(store,"readonly").get(key)); }
function putOne(store, value){
  return new Promise((res, rej) => {
    const tx = DB.transaction(store,"readwrite");
    tx.objectStore(store).put(value);
    tx.oncomplete = () => res(value); tx.onerror = () => rej(tx.error);
  });
}

/* ============================================================
   DATA ACCESS
   ============================================================ */
async function getCashbooks(){
  const all = await getAll("cashbooks");
  all.sort((a,b)=> (a.created_at < b.created_at ? -1 : 1));
  return all;
}
async function addCashbook(data){
  const t = nowISO();
  const rec = {
    id: uid(), name:data.name, description:data.description || null,
    color_hex:data.color_hex, icon_name:data.icon_name,
    opening_balance_minor: data.opening_balance_minor | 0,
    created_at:t, updated_at:t, is_archived:0, archived_at:null
  };
  await putOne("cashbooks", rec);
  return rec;
}
async function updateCashbook(id, patch){
  const rec = await getOne("cashbooks", id);
  if(!rec) return null;
  Object.assign(rec, patch, { updated_at: nowISO() });
  await putOne("cashbooks", rec);
  return rec;
}
async function setArchived(id, archived){
  return updateCashbook(id, { is_archived: archived?1:0, archived_at: archived ? nowISO() : null });
}

async function getEntries(cashbookId){
  const idx = txStore("entries","readonly").index("by_cashbook");
  const list = await reqP(idx.getAll(IDBKeyRange.only(cashbookId)));
  const active = list.filter(e => !e.deleted_at);
  active.sort((a,b) => {
    if(a.entry_date !== b.entry_date) return a.entry_date < b.entry_date ? 1 : -1; // newest day first
    return a.created_at < b.created_at ? 1 : -1;                                   // newest first within day
  });
  return active;
}
async function addEntry(data){
  const t = nowISO();
  const rec = {
    id: uid(), cashbook_id:data.cashbook_id, amount_minor:data.amount_minor, type:data.type,
    entry_date:data.entry_date, category_id:data.category_id,
    category_name_snapshot:data.category_name_snapshot,
    note:data.note || null, reference_number:data.reference_number || null,
    attachment_uri:null, created_at:t, updated_at:t, deleted_at:null
  };
  await putOne("entries", rec);
  return rec;
}
async function updateEntry(id, data){
  const rec = await getOne("entries", id);
  if(!rec) return null;
  Object.assign(rec, {
    amount_minor:data.amount_minor, type:data.type, entry_date:data.entry_date,
    category_id:data.category_id, category_name_snapshot:data.category_name_snapshot,
    note:data.note || null, reference_number:data.reference_number || null,
    updated_at: nowISO()
  });
  await putOne("entries", rec);
  return rec;
}
async function softDeleteEntry(id){
  const rec = await getOne("entries", id);
  if(!rec) return;
  rec.deleted_at = nowISO(); rec.updated_at = nowISO();
  await putOne("entries", rec);
}

async function getCategories(type){
  const all = await getAll("categories");
  const list = all.filter(c => !c.is_archived && (type ? c.type === type : true));
  list.sort((a,b) => a.sort_order - b.sort_order || (a.name < b.name ? -1 : 1));
  return list;
}
async function addCategory(data){
  const t = nowISO();
  const same = (await getCategories(data.type));
  const rec = {
    id: uid(), name:data.name, type:data.type, icon_name:data.icon_name, visual_color:data.visual_color,
    is_default:0, is_hidden:0, is_archived:0, sort_order: same.length, created_at:t, updated_at:t
  };
  await putOne("categories", rec);
  return rec;
}
async function updateCategory(id, patch){
  const rec = await getOne("categories", id);
  if(!rec) return null;
  Object.assign(rec, patch, { updated_at: nowISO() });
  await putOne("categories", rec); // NOTE: renaming never rewrites entry snapshots (frozen at write time)
  return rec;
}
// TRUE delete: remove the category, and null category_id on its past entries (snapshot keeps the name).
async function deleteCategory(id){
  return new Promise((res, rej) => {
    const tx = DB.transaction(["categories","entries"],"readwrite");
    tx.objectStore("categories").delete(id);
    const idx = tx.objectStore("entries").index("by_category");
    const cur = idx.openCursor(IDBKeyRange.only(id));
    cur.onsuccess = (e) => {
      const c = e.target.result;
      if(c){ const v = c.value; v.category_id = null; v.updated_at = nowISO(); c.update(v); c.continue(); }
    };
    tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error);
  });
}

/* ---- totals (pure integer) ---- */
function computeTotals(cashbook, entries){
  let inSum = 0, outSum = 0;
  for(const e of entries){ if(e.type === "IN") inSum += e.amount_minor; else outSum += e.amount_minor; }
  const balance = (cashbook.opening_balance_minor | 0) + inSum - outSum;
  return { inSum, outSum, balance };
}

/* ---- backup / restore ---- */
async function exportAll(){
  const [cashbooks, categories, entries, meta] = await Promise.all([
    getAll("cashbooks"), getAll("categories"), getAll("entries"), getAll("meta")
  ]);
  return { app:"cashbook", format:1, schema_version:DB_VERSION, exported_at:nowISO(), cashbooks, categories, entries, meta };
}
function importAll(data){
  if(!data || data.app !== "cashbook" || !Array.isArray(data.entries))
    return Promise.reject(new Error("This file is not a Cashbook backup."));
  // One transaction, all requests issued synchronously (no await in between —
  // IndexedDB auto-commits a transaction the moment control yields to the event loop).
  return new Promise((res, rej) => {
    const tx = DB.transaction(["cashbooks","categories","entries","meta"],"readwrite");
    ["cashbooks","categories","entries","meta"].forEach(n => tx.objectStore(n).clear());
    (data.cashbooks||[]).forEach(r => tx.objectStore("cashbooks").put(r));
    (data.categories||[]).forEach(r => tx.objectStore("categories").put(r));
    (data.entries||[]).forEach(r => tx.objectStore("entries").put(r));
    (data.meta||[]).forEach(r => tx.objectStore("meta").put(r));
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
    tx.onabort = () => rej(tx.error || new Error("Restore was aborted."));
  });
}

  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove("show"), 2200);
}

// Animate a balance ticking up from zero. Pure-integer formatting; honours reduced motion.
function countUp(el, to){
  if(!el) return;
  const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if(reduce){ el.textContent = fmtMinor(to); el.classList.toggle("neg", to<0); return; }
  const dur = 600, start = performance.now();
  function frame(now){
    const p = Math.min(1, (now-start)/dur);
    const e = 1 - Math.pow(1-p, 3); // easeOutCubic
    const val = Math.round(to * e);
    el.textContent = fmtMinor(val);
    el.classList.toggle("neg", val<0);
    if(p < 1) requestAnimationFrame(frame);
  }
  el.textContent = fmtMinor(0);
  requestAnimationFrame(frame);
}

/* ---------- LIST ---------- */
async function renderList(){
  state.view = "list";
  setBar("Cashbook", "Your accounts", false);
  $("fab").style.display = "flex";
  $("fab").onclick = () => openCashbookForm();

  const books = await getCashbooks();
  const active = books.filter(b => !b.is_archived);
  const archived = books.filter(b => b.is_archived);
  const app = $("app");

  if(books.length === 0){
    app.innerHTML = `<div class="empty">
      <div class="big">📒</div>
      <h2>No cashbooks yet</h2>
      <p>A cashbook is one account — a wallet, a bank, or a person you keep cash with. Make your first one to start logging cash in and out.</p>
      <button class="btn" id="firstCb">Create a cashbook</button>
    </div>`;
    $("firstCb").onclick = () => openCashbookForm();
    return;
  }

  let html = "";
  if(active.length){
    const totals = await Promise.all(active.map(async b => computeTotals(b, await getEntries(b.id)).balance));
    html += active.map((b,i) => cashbookCard(b, totals[i], false)).join("");
  } else {
    html += `<div class="note">All your cashbooks are archived. Open the menu to show them, or add a new one.</div>`;
  }
  if(state.showArchived && archived.length){
    const at = await Promise.all(archived.map(async b => computeTotals(b, await getEntries(b.id)).balance));
    html += `<div class="eyebrow">Archived</div>`;
    html += archived.map((b,i) => cashbookCard(b, at[i], true)).join("");
  }
  app.innerHTML = html;
  app.querySelectorAll("[data-open]").forEach(el => el.onclick = () => { state.cashbookId = el.dataset.open; render(); });
}

    <span class="tab" style="background:${esc(b.color_hex)}"></span>
    <span class="body">
      <span class="ic">${esc(b.icon_name||"📒")}</span>
      <span class="info">
        <span class="nm">${esc(b.name)}</span>
        <span class="ds">${esc(b.description || (archived?"Archived":"Tap to open"))}</span>

/* ---------- DETAIL ---------- */
async function renderDetail(id){
  const cb = await getOne("cashbooks", id);
  if(!cb){ state.view="list"; state.cashbookId=null; return renderList(); }
  state.view = "detail";
  setBar(cb.name, cb.is_archived ? "Archived account" : (cb.description || "Cash ledger"), true);
  $("fab").style.display = "flex";
  $("fab").onclick = () => openEntryForm(cb);

  const entries = await getEntries(id);
  const t = computeTotals(cb, entries);
  const app = $("app");

  let html = `<div class="summary">
    <div class="blab">Current balance</div>
    <div class="bbal num ${t.balance<0?'neg':''}" id="heroBal">${fmtMinor(t.balance)}</div>
    <div class="flow">
      <div><div class="k">In</div><div class="v num pos">${fmtMinor(t.inSum)}</div></div>
      <div><div class="k">Out</div><div class="v num neg">${fmtMinor(t.outSum)}</div></div>
      <div><div class="k">Opening</div><div class="v num">${fmtMinor(cb.opening_balance_minor|0)}</div></div>
    </div>
  </div>`;

  if(entries.length === 0){
    html += `<div class="empty"><div class="big">🧾</div><h2>No entries yet</h2>
      <p>Tap the + button to record your first cash in or cash out for this book.</p></div>`;
    app.innerHTML = html;
    countUp($("heroBal"), t.balance);
    return;
  }

  // group by date
  const groups = [];
  let cur = null;
  for(const e of entries){
    if(!cur || cur.date !== e.entry_date){ cur = { date:e.entry_date, items:[] }; groups.push(cur); }
    cur.items.push(e);
  }
  for(const g of groups){
    let dayNet = 0;
    g.items.forEach(e => dayNet += (e.type==="IN"? e.amount_minor : -e.amount_minor));
    html += `<div class="daygroup">
      <div class="dh"><span>${prettyDate(g.date)}</span><span class="num ${dayNet<0?'neg':'pos'}">${dayNet>=0?'+':'−'} ${fmtMinor(Math.abs(dayNet))}</span></div>
      <div class="ledger">${g.items.map(entryRow).join("")}</div>
    </div>`;
  }
  app.innerHTML = html;
  countUp($("heroBal"), t.balance);
  app.querySelectorAll("[data-entry]").forEach(el => el.onclick = () => openEntryForm(cb, el.dataset.entry));
}

function entryRow(e){
  const cat = e.category_name_snapshot || "Uncategorised";
  const bits = [];
  if(e.note) bits.push(esc(e.note));
  if(e.reference_number) bits.push('<span class="rref">#'+esc(e.reference_number)+'</span>');
  const sub = bits.length ? `<span class="rnote">${bits.join(" · ")}</span>` : "";
  return `<button class="row" data-entry="${e.id}">
    <span class="rdot" style="background:${e.type==='IN'?'var(--pos)':'var(--neg)'}"></span>
    <span class="rmain"><span class="rcat">${esc(cat)}</span>${sub}</span>
    <span class="ramt num ${e.type==='IN'?'pos':'neg'}">${fmtSigned(e.amount_minor, e.type)}</span>
  </button>`;
}

async function openEntryForm(cb, entryId){

  let type = ed ? ed.type : "OUT";
  let color = ed ? ed.visual_color : COLORS[0];
  let icon = ed ? ed.icon_name : CAT_ICONS[0];
  openSheet(`
    <h2>${ed?"Edit category":"New category"}</h2>
    <div class="field" id="f-cn"><label>Name</label>
      <input id="catName" value="${ed?esc(ed.name):""}" placeholder="e.g. Toll tax" autocomplete="off">
      <div class="err">Please enter a name.</div></div>
    ${ed ? `<div class="note">Renaming won't change entries you already saved — they keep the name they had when logged.</div>`
         : `<div class="field"><label>Type</label><div class="seg" id="catSeg">
              <button data-v="IN" type="button">Cash in</button><button data-v="OUT" type="button">Cash out</button></div></div>`}
    <div class="field"><label>Colour</label><div class="swatches" id="catColors"></div></div>
    <div class="field"><label>Icon</label><div class="icons" id="catIcons"></div></div>
    <div class="sheet-actions">
      <button class="btn" id="catSave">${ed?"Save changes":"Add category"}</button>
      <button class="btn ghost" id="catCancel">Cancel</button>
    </div>`);
  buildSwatches($("catColors"), COLORS, color, v => color=v);
  buildIcons($("catIcons"), CAT_ICONS, icon, v => icon=v);
  if(!ed){
    const seg = $("catSeg");
    const paint = () => seg.querySelectorAll("button").forEach(b => b.classList.toggle("on", b.dataset.v===type));
    paint();
    seg.querySelectorAll("button").forEach(b => b.onclick = () => { type=b.dataset.v; paint(); });
  }
  $("catCancel").onclick = openCategories;
  $("catSave").onclick = async () => {
    const name = $("catName").value.trim();
    $("f-cn").classList.toggle("invalid", !name);
    if(!name) return;
    if(ed) await updateCategory(ed.id, { name, visual_color:color, icon_name:icon });
    else await addCategory({ name, type, visual_color:color, icon_name:icon });
    toast(ed?"Saved":"Category added"); openCategories();
  };
}
async function confirmDeleteCategory(id, name){
  const idx = txStore("entries","readonly").index("by_category");
  const used = await reqP(idx.count(IDBKeyRange.only(id)));
  const msg = used > 0
    ? `Delete "${name}"? ${used} entr${used===1?"y":"ies"} used it. Those entries stay and keep the name "${name}", but will no longer be linked to a category.`
    : `Delete "${name}"?`;
  if(!confirm(msg)) return;
  await deleteCategory(id); toast("Category deleted"); openCategories(); 
}

/* ----- backup ----- */
async function doBackup(){
  try{
    const data = await exportAll();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "cashbook-backup-" + todayLocal() + ".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1500);
    closeSheet(); toast("Backup file saved");
  }catch(err){ alert("Backup failed: " + err.message); }
}
function doRestore(){
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = "application/json,.json";
  inp.onchange = () => {
    const file = inp.files && inp.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      try{
        const data = JSON.parse(reader.result);
        const counts = `${(data.cashbooks||[]).length} cashbooks and ${(data.entries||[]).length} entries`;
        if(!confirm("Restore will REPLACE everything currently in this app with the backup (" + counts + "). Continue?")) return;
        await importAll(data);
        state.view="list"; state.cashbookId=null; state.showArchived=false;
        closeSheet(); toast("Backup restored"); render();
      }catch(err){ alert("Could not restore: " + err.message); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

function openAbout(){
  openSheet(`
    <h2>About &amp; storage</h2>
    <div class="about">
      <p><strong>Cashbook</strong> keeps everything on this device only. There is no account, no server, and no internet needed once it's installed.</p>
      <p>Your data lives in this app's private storage. It stays unless you clear the browser/app data or uninstall. To be safe, <strong>back up to a file regularly</strong> — and keep that file somewhere safe (Drive, email to yourself, etc.).</p>
      <p id="persistLine">Checking storage protection…</p>
    </div>
    <div class="sheet-actions">
      <button class="btn" id="aboutBackup">Back up now</button>
      <button class="btn ghost" id="aboutClose">Close</button>
    </div>`);
  $("aboutClose").onclick = closeSheet;
  $("aboutBackup").onclick = doBackup;
  reportPersistence();
}
async function reportPersistence(){
  const line = $("persistLine"); if(!line) return;
  try{
    if(navigator.storage && navigator.storage.persisted){
      let p = await navigator.storage.persisted();
      if(!p && navigator.storage.persist) p = await navigator.storage.persist();
      line.innerHTML = p
        ? "✅ <strong>Storage protected</strong> — Android won't auto-clear this app's data to free space."
        : "⚠️ Storage protection not granted. Your data is still saved, but keep backups as your safety net.";
    } else { line.textContent = "Keep backups as your safety net — they're your guaranteed copy."; }
  }catch(e){ line.textContent = "Keep backups as your safety net — they're your guaranteed copy."; }
}

/* ============================================================
   BOOT
   ============================================================ */
async function boot(){
  try{
    await openDB();
    if(navigator.storage && navigator.storage.persist){ try{ await navigator.storage.persist(); }catch(e){} }
    await render();
  }catch(err){
    $("app").innerHTML = `<div class="empty"><div class="big">⚠️</div><h2>Couldn't open the database</h2><p>${esc(err.message||"Unknown error")}. Try reopening the app.</p></div>`;
  }
  if("serviceWorker" in navigator){
    const reg = () => navigator.serviceWorker.register("sw.js").catch(()=>{});
    if(document.readyState === "complete") reg();
    else window.addEventListener("load", reg, { once:true });
  }
}
boot();
</script>
