/* ============================================================
   ENTRY EDITOR
   ============================================================ */
const Editor={
  cur:null,_noteOpen:false,
  open(id){
    const e=id?Store.entries.find(x=>x.id===id):null;
    this.cur=e?{...e}:{id:null,type:'out',amount:0,date:today(),categoryId:null,cashbookId:Store.activeBook,note:''};
    if(!this.cur.cashbookId)this.cur.cashbookId=Store.activeBook||(Store.books[0]||{}).id;
    this._noteOpen=!!(e&&e.note);
    this.draw();
  },
  draw(){
    const c=this.cur;const bk=Store.book(c.cashbookId);const cat=Store.cat(c.categoryId);
    const valClass=c.amount?c.type:'zero';
    const canSave=c.amount&&(c.note||'').trim();
    const html=`
    <div class="sheet-head"><h3>${c.id?'Edit entry':'New entry'}</h3>
      ${c.id?`<button class="x" onclick="UI.dismiss();entryContext('${c.id}')" aria-label="Share entry"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><path d="M4 12v8a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-8"/><path d="M16 6l-4-4-4 4M12 2v14"/></svg></button>`:''}
      ${c.id?`<button class="x" style="background:var(--out-bg);color:var(--out)" onclick="Editor.del()" aria-label="Delete entry"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg></button>`:''}
      <button class="x" onclick="UI.dismiss()">✕</button></div>
    <div class="sheet-body">
      <button class="field-row" onclick="Editor.pickDate()" aria-label="Change date" style="margin-top:4px">
        <span class="fr-v" id="dateLbl">${ddmmyyyy(c.date)}</span>
        <span class="fr-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4.5" width="18" height="16.5" rx="3"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/></svg></span>
      </button>
      <input type="date" id="dateInput" value="${c.date}" max="2100-12-31" style="position:absolute;opacity:0;width:1px;height:1px;pointer-events:none" onchange="Editor.setDate(this.value)">
      <div class="type-toggle" style="margin-top:14px">
        <button class="${c.type==='in'?'on-in':''}" onclick="Editor.setType('in')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 19V5M5 12l7-7 7 7"/></svg>Cash in</button>
        <button class="${c.type==='out'?'on-out':''}" onclick="Editor.setType('out')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12l7 7 7-7"/></svg>Cash out</button>
      </div>
      <div class="ed-amount" onclick="Editor.focusAmt()">
        <div class="lab">${c.type==='in'?'Cash in':'Cash out'}</div>
        <div class="amt-wrap">
          <div class="val ${valClass} num" id="amtVal">${c.amount?fmt(c.amount):'0'}</div>
          <input id="amtInput" class="amt-hidden" inputmode="numeric" pattern="[0-9]*" maxlength="15" value="${c.amount||''}" oninput="Editor.onAmt(this.value)" aria-label="Amount">
        </div>
        <div class="amt-hint">${c.amount?'':'Tap to enter amount'}</div>
      </div>

      <div class="ed-lbl">Note <span class="req">*</span></div>
      <input class="field-input" id="noteIn" placeholder="What is this for?  e.g. KFC, Ali Transport" maxlength="200" value="${esc(c.note||'')}" oninput="Editor.onNote()">

      <button class="field-row" onclick="Editor.pickCat()">
        <span class="fr-v">${cat?`<span class="fr-emoji" style="background:${cat.color}1f">${cat.icon}</span>${esc(cat.name)}`:`<span class="fr-emoji">🏷️</span><span class="fr-ph">Choose category</span>`}</span>
        <span class="fr-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></span>
      </button>

      <button class="field-row" onclick="Editor.pickBook()">
        <span class="fr-v"><span class="fr-emoji" style="background:${bk?bk.color+'1f':'var(--line)'}">${bk?bk.icon:'📒'}</span>${bk?esc(bk.name):`<span class="fr-ph">Choose cashbook</span>`}</span>
        <span class="fr-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></span>
      </button>
    </div>
    <div class="save-bar"><button class="save-btn ${canSave?'':'dis'}" id="saveBtn" onclick="Editor.save()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" style="width:20px;height:20px"><path d="m5 13 4 4L19 7"/></svg>${c.id?'Save changes':'Add entry'}</button></div>`;
    UI.showSheet(html);
    if(!c.id&&!c.amount)setTimeout(()=>this.focusAmt(),360);
  },
  setType(t){this._grab();if(this.cur.type!==t){this.cur.type=t;const ct=Store.cat(this.cur.categoryId);if(ct&&ct.type!==t&&ct.type!=='both')this.cur.categoryId=null;}this.draw();haptic(6);},
  onAmt(v){
    const d=String(v).replace(/[^0-9]/g,'').slice(0,12);
    this.cur.amount=parseInt(d||'0',10)||0;
    const i=$('#amtInput');if(i&&i.value!==d)i.value=d;
    const el=$('#amtVal');if(el){el.textContent=this.cur.amount?fmt(this.cur.amount):'0';el.className='val num '+(this.cur.amount?this.cur.type:'zero');}
    const h=$('.amt-hint');if(h)h.textContent=this.cur.amount?'':'Tap to enter amount';
    this._validate();
  },
  onNote(){this._grab();const n=$('#noteIn');if(n)n.classList.remove('err');this._validate();},
  _validate(){const sb=$('#saveBtn');if(!sb)return;const note=(($('#noteIn')||{}).value||'').trim();sb.classList.toggle('dis',!(this.cur.amount&&note));},
  focusAmt(){const i=$('#amtInput');if(i){i.focus();const v=i.value;i.value='';i.value=v;}},
  _grab(){const n=$('#noteIn');if(n)this.cur.note=n.value;},
  pickCat(){this._grab();Pickers.category(id=>{this.cur.categoryId=id;this.draw();},this.cur.categoryId,this.cur.type);},
  pickBook(){this._grab();Pickers.book(id=>{this.cur.cashbookId=id;this.draw();},this.cur.cashbookId,false);},
  pickDate(){this._grab();const inp=$('#dateInput');if(!inp)return;try{inp.showPicker?inp.showPicker():inp.click();}catch(e){try{inp.click();}catch(_){}}},
  setDate(v){if(v){this.cur.date=v;const l=$('#dateLbl');if(l)l.textContent=ddmmyyyy(v);}},
  async save(){
    const c=this.cur;
    if(!c.amount){haptic(20);this.focusAmt();Toast.show('Enter an amount');return;}
    const n=$('#noteIn');const note=((n?n.value:c.note)||'').trim();
    if(!note){haptic(20);if(n){n.classList.add('err');n.focus();}Toast.show('A note is required');return;}
    c.note=note;
    const isNew=!c.id;
    if(!c.categoryId){const def=Store.cats.find(x=>x.type===c.type)||Store.cats[0];c.categoryId=def?def.id:null;}
    await Store.saveEntry(c);UI.dismiss();UI.refresh();haptic(12);
    Toast.show(isNew?'Entry added':'Entry updated');
  },
  del(){UI.dismiss();Actions.deleteEntries([this.cur.id]);}
};

/* ============================================================
   SELECTION MODE
   ============================================================ */
const Sel={
  active:false,ids:new Set(),
  start(id){this.active=true;this.ids=new Set([id]);document.body.classList.add('select-mode');renderBook();this.bar();},
  end(){if(!this.active)return;this.active=false;this.ids.clear();document.body.classList.remove('select-mode');$('#selbar').classList.remove('show');if(UI.tab==='book')renderBook();},
  has(id){return this.ids.has(id);},
  toggle(id){if(this.ids.has(id))this.ids.delete(id);else this.ids.add(id);if(!this.ids.size){this.end();return;}renderBook();this.bar();haptic(5);},
  bar(){
    const arr=[...this.ids].map(id=>Store.entries.find(e=>e.id===id)).filter(Boolean);
    const net=arr.reduce((t,e)=>t+(e.type==='in'?e.amount:-e.amount),0);
    $('#selCount').textContent=`${this.ids.size} selected`;
    $('#selSum').textContent=`net ${fmtSigned(net)}`;
    $('#selbar').classList.add('show');
  },
  list(){return [...this.ids].map(id=>Store.entries.find(e=>e.id===id)).filter(Boolean);},
  visibleIds(){return Filters.apply(Store.bookEntries(Store.activeBook),{ignoreBook:true}).map(e=>e.id);},
  selectAll(){
    const ids=this.visibleIds();
    const allOn=ids.length&&ids.every(id=>this.ids.has(id));
    this.ids=allOn?new Set():new Set(ids);
    if(!this.ids.size){this.end();return;}
    renderBook();this.bar();haptic(6);
  },
  del(){const ids=[...this.ids];this.end();Actions.deleteEntries(ids);},
  move(){const ids=[...this.ids];Pickers.book(async bid=>{await Actions.moveEntries(ids,bid);Sel.end();},null,false);},
  copy(){const ids=[...this.ids];Pickers.book(async bid=>{await Actions.copyEntries(ids,bid);Sel.end();},null,false);},
  exportSel(){const arr=this.list();Sel.end();Export.entriesPDF(arr,'Selected entries');},
};

/* ============================================================
   ACTIONS (delete w/ undo, move, copy)
   ============================================================ */
const Actions={
  async deleteEntries(ids){
    const snapshot=ids.map(id=>Store.entries.find(e=>e.id===id)).filter(Boolean).map(e=>({...e}));
    if(!snapshot.length)return;
    await Store.delEntries(ids);UI.refresh();haptic(12);
    Toast.show(`${snapshot.length} ${snapshot.length>1?'entries':'entry'} deleted`,'Undo',async()=>{
      await Store.restoreEntries(snapshot);UI.refresh();
    });
  },
  async moveEntries(ids,bid){
    ids.forEach(id=>{const e=Store.entries.find(x=>x.id===id);if(e)e.cashbookId=bid;});
    await DB.bulkPut('entries',ids.map(id=>Store.entries.find(e=>e.id===id)).filter(Boolean));
    UI.refresh();Toast.show('Moved to '+Store.book(bid).name);haptic(10);
  },
  async copyEntries(ids,bid){
    const copies=ids.map(id=>{const e=Store.entries.find(x=>x.id===id);if(!e)return null;return{...e,id:uid(),cashbookId:bid,createdAt:Date.now(),updatedAt:Date.now()};}).filter(Boolean);
    Store.entries.push(...copies);await DB.bulkPut('entries',copies);
    UI.refresh();Toast.show('Copied to '+Store.book(bid).name);haptic(10);
  }
};

/* ============================================================
   TOAST / SNACKBAR with undo
   ============================================================ */
const Toast={
  _t:null,
  show(msg,actLabel,actFn){
    clearTimeout(this._t);
    $('#snackMsg').textContent=msg;
    const a=$('#snackAct');
    if(actLabel){a.textContent=actLabel;a.style.display='';a.onclick=()=>{clearTimeout(this._t);this.hide();actFn&&actFn();};}
    else{a.style.display='none';}
    $('#snack').classList.add('show');
    this._t=setTimeout(()=>this.hide(),actLabel?4200:2200);
  },
  hide(){$('#snack').classList.remove('show');}
};

/* ============================================================
   SEARCH (global, instant)
   ============================================================ */
const Search={
  open(){
    const html=`<div class="sheet-head"><h3>Search</h3><button class="x" onclick="UI.dismiss()">✕</button></div>
    <div style="padding:0 20px 8px"><div class="search-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
      <input id="searchInput" placeholder="Amount, category, note, book…" autocomplete="off"><button class="clr" onclick="$('#searchInput').value='';Search.run('')">Clear</button></div></div>
    <div class="sheet-body" id="searchResults" style="padding-top:6px"><div style="color:var(--t3);text-align:center;padding:30px;font-size:14px">Type to search across all cashbooks</div></div>`;
    UI.showSheet(html);
    const inp=$('#searchInput');
    setTimeout(()=>inp.focus(),300);
    inp.addEventListener('input',()=>this.run(inp.value));
  },
  run(q){
    const res=$('#searchResults');q=q.trim().toLowerCase();
    if(!q){res.innerHTML=`<div style="color:var(--t3);text-align:center;padding:30px;font-size:14px">Type to search across all cashbooks</div>`;return;}
    const matches=Store.entries.filter(e=>{
      const hay=(Store.catName(e.categoryId)+' '+(e.note||'')+' '+e.amount+' '+e.date+' '+dateLabel(e.date)+' '+(Store.book(e.cashbookId)||{}).name).toLowerCase();
      return hay.includes(q);
    }).sort((a,b)=>a.date<b.date?1:-1).slice(0,80);
    if(!matches.length){res.innerHTML=`<div class="empty" style="padding:30px"><h3>No results</h3><p>Nothing matches “${esc(q)}”.</p></div>`;return;}
    const s=entrySummary(matches);
    let html=`<div style="font-size:12.5px;color:var(--t3);font-weight:600;margin:2px 4px 10px">${matches.length} result${matches.length>1?'s':''} · net <span class="num">${fmtSigned(s.net)}</span></div><div class="card">`;
    matches.forEach(e=>{const cat=Store.cat(e.categoryId);const bk=Store.book(e.cashbookId);
      html+=`<div class="entry" onclick="UI.dismiss();Editor.open('${e.id}')">${catIconHTML(cat)}<div class="body"><div class="cat">${esc(e.note||Store.catName(e.categoryId)||'Entry')}</div><div class="note">${esc((bk?bk.name:'')+' · '+dateLabel(e.date)+(Store.catName(e.categoryId)&&e.note?' · '+Store.catName(e.categoryId):''))}</div></div><div class="amt ${e.type}">${e.type==='in'?'+':'−'}${fmt(e.amount)}</div></div>`;});
    html+=`</div>`;res.innerHTML=html;
  }
};

/* ============================================================
   FILTER SHEET
   ============================================================ */
const FilterSheet={
  draft:null,
  open(){
    this.draft=JSON.parse(JSON.stringify(Filters.state));
    this.draw();
  },
  draw(){
    const d=this.draft;
    const ranges=[['all','All time'],['7d','Last 7 days'],['month','This month'],['lastmonth','Last month'],['year','This year'],['custom','Custom']];
    const expandCustom=d.range==='custom';
    let html=`<div class="sheet-head"><h3>Filters</h3><button class="x" onclick="UI.dismiss()">✕</button></div><div class="sheet-body">`;
    // type
    html+=`<label class="fl" style="font-size:12.5px;font-weight:640;color:var(--t2)">Type</label><div class="type-toggle" style="margin:8px 0 6px">
      <button class="${d.type==='all'?'on-in':''}" style="${d.type==='all'?'background:var(--ink);color:#fff;box-shadow:none':''}" onclick="FilterSheet.set('type','all')">All</button>
      <button class="${d.type==='in'?'on-in':''}" onclick="FilterSheet.set('type','in')">In</button>
      <button class="${d.type==='out'?'on-out':''}" onclick="FilterSheet.set('type','out')">Out</button></div>`;
    // date range
    html+=`<div class="field"><label class="fl">Date range</label><div class="chip-grid">`;
    ranges.forEach(r=>html+=`<button class="opt-chip ${d.range===r[0]?'on':''}" onclick="FilterSheet.set('range','${r[0]}')">${r[1]}</button>`);
    html+=`</div>`;
    if(expandCustom)html+=`<div class="range-row" style="margin-top:12px"><input type="date" value="${d.from||''}" onchange="FilterSheet.set('from',this.value)"><span>to</span><input type="date" value="${d.to||''}" onchange="FilterSheet.set('to',this.value)"></div>`;
    html+=`</div>`;
    // cashbook (only on dashboard/analytics scope, but always allow)
    html+=`<div class="field"><label class="fl">Cashbook</label><div class="chip-grid">
      <button class="opt-chip ${!d.bookId?'on':''}" onclick="FilterSheet.set('bookId','')">All books</button>`;
    Store.books.forEach(b=>html+=`<button class="opt-chip ${d.bookId===b.id?'on':''}" onclick="FilterSheet.set('bookId','${b.id}')"><span class="ic">${b.icon}</span>${esc(b.name)}</button>`);
    html+=`</div></div>`;
    // categories
    html+=`<div class="field"><label class="fl">Categories ${d.cats.length?`· ${d.cats.length} selected`:''}</label><div class="chip-grid">`;
    Store.cats.slice().sort((a,b)=>a.order-b.order).forEach(c=>html+=`<button class="opt-chip ${d.cats.includes(c.id)?'on':''}" onclick="FilterSheet.toggleCat('${c.id}')"><span class="ic">${c.icon}</span>${esc(c.name)}</button>`);
    html+=`</div></div>`;
    // amount range
    html+=`<div class="field"><label class="fl">Amount range</label><div class="range-row"><input inputmode="numeric" placeholder="Min" value="${d.min!=null?d.min:''}" oninput="FilterSheet.setNum('min',this.value)"><span>to</span><input inputmode="numeric" placeholder="Max" value="${d.max!=null?d.max:''}" oninput="FilterSheet.setNum('max',this.value)"></div></div>`;
    html+=`</div><div class="save-bar" style="display:flex;gap:10px"><button class="save-btn" style="background:var(--paper);color:var(--t1);flex:0 0 38%" onclick="FilterSheet.clear()">Reset</button><button class="save-btn" onclick="FilterSheet.apply()">Show results</button></div>`;
    UI.showSheet(html);
  },
  set(k,v){this.draft[k]=v===''?null:v;if(k==='range'&&v!=='custom'){this.draft.from=null;this.draft.to=null;}this.draw();},
  setNum(k,v){const n=parseAmount(v);this.draft[k]=v.trim()===''?null:n;},
  toggleCat(id){const i=this.draft.cats.indexOf(id);if(i>=0)this.draft.cats.splice(i,1);else this.draft.cats.push(id);this.draw();},
  clear(){Filters.reset();this.draft=JSON.parse(JSON.stringify(Filters.state));this.draw();},
  apply(){Filters.state=JSON.parse(JSON.stringify(this.draft));UI.dismiss();UI.refresh();haptic(8);}
};
function updateFilterBadge(){
  const n=Filters.count();
  [['#filterBtn'],['#statsFilterBtn']].forEach(([sel])=>{
    const btn=$(sel);if(!btn)return;let dot=$('.dot',btn);
    if(n&&!dot){dot=el('span','dot');btn.appendChild(dot);}else if(!n&&dot)dot.remove();
  });
}

  editBook(id){

  _drawBookEdit(){

    UI.showSheet(html);

      <div class="field"><label class="fl">Icon</label><div class="icon-grid">${CAT_ICONS.map(ic=>`<button class="ipick ${c.icon===ic?'on':''}" onclick="Manage._cset('icon','${ic}')">${ic}</button>`).join('')}</div></div>
      <div class="field"><label class="fl">Color</label><div class="swatch-grid">${COLORS.map(col=>`<button class="swatch ${c.color===col?'on':''}" style="background:${col};color:${col}" onclick="Manage._cset('color','${col}')"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="m5 13 4 4L19 7"/></svg></button>`).join('')}</div></div>

/* ============================================================
   EXPORT (PDF via print) + share image
   ============================================================ */
const Export={
  _print(html){
    $('#printRoot').innerHTML=html;
    setTimeout(()=>{window.print();},120);
  },
  _header(title,sub,range){
    return `<div class="ph"><div class="brand"><small>Cashbook · Statement</small>${esc(title)}</div><div class="meta">${esc(sub)}${range?`<br>${range}`:''}<br>Generated ${ddmmyyyy(today())}</div></div>`;
  },
  _range(list){if(!list.length)return'';const ds=list.map(e=>e.date).sort();return ds[0]===ds[ds.length-1]?ddmmyyyy(ds[0]):`${ddmmyyyy(ds[0])} – ${ddmmyyyy(ds[ds.length-1])}`;},
  _table(list){
    const sorted=[...list].sort((a,b)=>a.date<b.date?1:a.date>b.date?-1:0);
    let rows='';let run=0;
    const chrono=[...list].sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);
    const balMap=new Map();chrono.forEach(e=>{run+=e.type==='in'?e.amount:-e.amount;balMap.set(e.id,run);});
    sorted.forEach(e=>{const bk=Store.book(e.cashbookId);const c=Store.catName(e.categoryId);
      const sub=[bk?bk.name:'',c].filter(Boolean).join(' · ');
      rows+=`<tr class="${e.type}"><td class="dt">${ddmmyyyy(e.date)}</td><td><div class="pri">${esc(e.note||c||'—')}</div>${sub?`<div class="sub">${esc(sub)}</div>`:''}</td><td class="num amt">${e.type==='in'?'+':'−'}${fmt(e.amount)}</td><td class="num">${fmtSigned(balMap.get(e.id))}</td></tr>`;});
    return `<table><thead><tr><th>Date</th><th>Details</th><th class="num">Amount</th><th class="num">Balance</th></tr></thead><tbody>${rows}</tbody></table>`;
  },
  _summary(s){
    return `<div class="summ"><div class="b"><div class="k">Money in</div><div class="v" style="color:#0f7a52">${fmt(s.inc)}</div></div><div class="b"><div class="k">Money out</div><div class="v" style="color:#cc3340">${fmt(s.exp)}</div></div><div class="b net"><div class="k">Net balance</div><div class="v">${fmtSigned(s.net)}</div></div><div class="b"><div class="k">Entries</div><div class="v">${fmt(s.count)}</div></div></div>`;
  },
  cashbookPDF(bookId,filtered){
    const bk=Store.book(bookId);if(!bk){Toast.show('No cashbook');return;}
    let list=Store.bookEntries(bookId);
    if(filtered)list=Filters.apply(list,{ignoreBook:true});
    if(!list.length){Toast.show('Nothing to export');return;}
    const s=entrySummary(list);
    const html=`<div class="pdf">${this._header(bk.name,(filtered&&Filters.count()?'Filtered statement':'Full statement'),this._range(list))}${this._summary(s)}${this._table(list)}<div class="pf"><span>Generated by Cashbook</span><span>${list.length} ${list.length===1?'entry':'entries'}</span></div></div>`;
    this._print(html);Toast.show('Opening print / save as PDF…');
  },
  pickBookPDF(){Pickers.book(id=>{Export.cashbookPDF(id,false);},null,true);},
  entriesPDF(list,title){
    if(!list||!list.length){Toast.show('Nothing to export');return;}
    if(list.length===1){return this.entryPDF(list[0]);}
    const s=entrySummary(list);
    const html=`<div class="pdf">${this._header(title||'Selected entries',list.length+' entries',this._range(list))}${this._summary(s)}${this._table(list)}<div class="pf"><span>Generated by Cashbook</span><span>${list.length} entries</span></div></div>`;
    this._print(html);Toast.show('Opening print / save as PDF…');
  },
  entryPDF(e){
    const cat=Store.cat(e.categoryId);const bk=Store.book(e.cashbookId);const c=Store.catName(e.categoryId);
    const html=`<div class="pdf"><div class="receipt"><div class="rh"><div class="rt">${e.type==='in'?'Cash in':'Cash out'}</div><div class="ra">${e.type==='in'?'+':'−'}${fmt(e.amount)}</div>${e.note?`<div class="rn">${esc(e.note)}</div>`:''}</div><div class="rb">${c?`<div class="rr"><span class="l">Category</span><span class="v">${cat?cat.icon+' ':''}${esc(c)}</span></div>`:''}<div class="rr"><span class="l">Date</span><span class="v">${dateFull(e.date)}</span></div><div class="rr"><span class="l">Cashbook</span><span class="v">${esc(bk?bk.name:'')}</span></div></div></div><div class="pf" style="max-width:360px;margin:10px auto 0"><span>Generated by Cashbook</span><span>${ddmmyyyy(today())}</span></div></div>`;
    this._print(html);Toast.show('Opening print / save as PDF…');
  },
  // share single entry as image (canvas)
  async entryImage(e){
    const cat=Store.cat(e.categoryId);const bk=Store.book(e.cashbookId);const c=Store.catName(e.categoryId);
    const rows=[];if(c)rows.push(['Category',(cat?cat.icon+' ':'')+c]);rows.push(['Date',dateFull(e.date)]);rows.push(['Cashbook',bk?bk.name:'']);
    const scale=3,W=340,headH=e.note?134:104,H=headH+24+rows.length*38+44;
    const cv=document.createElement('canvas');cv.width=W*scale;cv.height=H*scale;const x=cv.getContext('2d');x.scale(scale,scale);
    x.fillStyle='#f5f6f8';x.fillRect(0,0,W,H);
    roundRect(x,16,16,W-32,H-32,22);x.fillStyle='#fff';x.fill();
    x.save();roundRect(x,16,16,W-32,headH,22);x.clip();
    const g=x.createLinearGradient(0,16,W,16+headH);g.addColorStop(0,'#1c2c4b');g.addColorStop(1,'#0f1828');x.fillStyle=g;x.fillRect(16,16,W-32,headH+22);x.restore();
    x.textAlign='center';
    x.fillStyle='rgba(255,255,255,.62)';x.font='700 11px -apple-system,Roboto,sans-serif';
    x.fillText((e.type==='in'?'CASH IN':'CASH OUT'),W/2,50);
    x.fillStyle=e.type==='in'?'#7fe3b6':'#ff9aa2';x.font='680 36px ui-monospace,"Roboto Mono",monospace';
    x.fillText((e.type==='in'?'+':'−')+fmt(e.amount),W/2,92);
    if(e.note){x.fillStyle='rgba(255,255,255,.92)';x.font='560 14px -apple-system,Roboto,sans-serif';x.fillText(clip(e.note,30),W/2,120);}
    let yy=headH+16+26;
    rows.forEach((r,i)=>{
      x.fillStyle='#959dab';x.font='500 13px -apple-system,Roboto,sans-serif';x.textAlign='left';x.fillText(r[0],36,yy);
      x.fillStyle='#0e1422';x.font='620 14px -apple-system,Roboto,sans-serif';x.textAlign='right';x.fillText(clip(r[1],24),W-36,yy);
      if(i<rows.length-1){x.strokeStyle='#eef0f3';x.beginPath();x.moveTo(36,yy+16);x.lineTo(W-36,yy+16);x.stroke();}
      yy+=38;
    });
    x.fillStyle='#c2c8d2';x.font='700 10px -apple-system,Roboto,sans-serif';x.textAlign='center';
    x.fillText('CASHBOOK',W/2,H-26);
    cv.toBlob(async blob=>{
      const file=new File([blob],'entry.png',{type:'image/png'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        try{await navigator.share({files:[file],title:'Cashbook entry'});}catch(err){}
      }else{
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cashbook-entry.png';a.click();
        Toast.show('Image saved');
      }
    },'image/png');
  }
};
function roundRect(x,a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath();}
function clip(s,n){s=String(s);return s.length>n?s.slice(0,n-1)+'…':s;}

/* add share buttons into editor when editing — invoked from long-press menu instead */
/* entry long-press context menu (share) */
function entryContext(id){
  const e=Store.entries.find(x=>x.id===id);if(!e)return;
  UI.showDialog(`<h3>Share entry</h3><p>Share this ${e.type==='in'?'cash in':'cash out'} of ${fmt(e.amount)}.</p><div style="display:flex;flex-direction:column;gap:9px"><button class="btn-ghost" style="padding:13px;border-radius:13px;font-weight:620" onclick="UI.dismiss();Export.entryImage(Store.entries.find(x=>x.id==='${id}'))">Share as image</button><button class="btn-ghost" style="padding:13px;border-radius:13px;font-weight:620" onclick="UI.dismiss();Export.entryPDF(Store.entries.find(x=>x.id==='${id}'))">Share as PDF</button><button class="btn-solid" style="padding:13px;border-radius:13px;font-weight:620" onclick="UI.dismiss();Editor.open('${id}')">Edit entry</button><button class="btn-ghost" onclick="UI.dismiss()">Cancel</button></div>`);
}

/* ============================================================
   BACKUP / RESTORE (JSON)
   ============================================================ */
const Backup={
  async export(){
    const data={v:1,exportedAt:Date.now(),cashbooks:Store.books,categories:Store.cats,entries:Store.entries};
    const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
    const fname='cashbook-backup-'+today()+'.json';
    const file=new File([blob],fname,{type:'application/json'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{await navigator.share({files:[file],title:'Cashbook backup'});return;}catch(e){}
    }
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;a.click();Toast.show('Backup saved');
  },
  importPick(){
    const inp=document.createElement('input');inp.type='file';inp.accept='application/json,.json';
    inp.onchange=()=>{const f=inp.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>this.confirm(rd.result);rd.readAsText(f);};
    inp.click();
  },
  confirm(text){
    let data;try{data=JSON.parse(text);}catch(e){Toast.show('Invalid backup file');return;}
    if(!data.cashbooks||!data.entries){Toast.show('Unrecognized file');return;}
    UI.showDialog(`<h3>Restore backup?</h3><p>This replaces all current data with the backup: ${data.cashbooks.length} cashbooks, ${data.entries.length} entries. Your current data will be lost.</p><div class="row"><button class="btn-ghost" onclick="UI.dismiss()">Cancel</button><button class="btn-danger" onclick="Backup._do()">Restore</button></div>`);
    this._pending=data;
  },
  async _do(){
    const d=this._pending;UI.dismiss();
    await Promise.all([clearStore('cashbooks'),clearStore('categories'),clearStore('entries')]);
    await DB.bulkPut('cashbooks',d.cashbooks);await DB.bulkPut('categories',d.categories||[]);await DB.bulkPut('entries',d.entries);
    await Store.load();UI.refresh();renderMore();Toast.show('Backup restored');haptic(14);
  }
};
function clearStore(s){return new Promise(res=>{const rq=DB._tx(s,'readwrite').clear();rq.onsuccess=()=>res();rq.onerror=()=>res();});}

/* ============================================================
   ONBOARDING
   ============================================================ */
function maybeOnboard(){
  if(Store.onboarded)return;
  UI.showDialog(`<div style="text-align:center"><div class="art" style="width:72px;height:72px;margin:0 auto 16px;border-radius:22px;display:grid;place-items:center;background:radial-gradient(120% 140% at 80% 0,#22335a,#0f1828)"><svg viewBox="0 0 24 24" fill="none" stroke="#eef2f8" stroke-width="1.8" style="width:34px;height:34px"><path d="M5 4h12a2 2 0 0 1 2 2v14H7a2 2 0 0 1-2-2z"/><path d="M9 9h6M9 13h4"/></svg></div>
  <h3 style="margin-bottom:6px">Welcome to Cashbook</h3><p style="margin-bottom:18px">Track cash in and out across as many cashbooks as you like. Everything stays on your device and works fully offline.</p>
  <button class="btn-solid" style="width:100%;padding:14px;border-radius:14px;font-weight:680" onclick="finishOnboard()">Start</button></div>`);
}
async function finishOnboard(){Store.onboarded=true;await DB.setMeta('onboarded',true);UI.dismiss();}

/* ============================================================
   BOOT
   ============================================================ */
async function boot(){
  try{
    await DB.open();await Store.load();
    UI.go('home');
    maybeOnboard();
  }catch(err){
    document.getElementById('homeContent').innerHTML='<div class="empty"><h3>Could not start</h3><p>Storage is unavailable. If you are in private browsing, switch to a normal window.</p></div>';
    console.error(err);
  }
  if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
}
// long-press on recent/search uses tap-to-edit; book list has long-press → select. Add context share via double role:
document.addEventListener('contextmenu',e=>{
  const ent=e.target.closest('.entry[data-id]');if(ent){e.preventDefault();}
});
boot();
